        /* ─────────────────────────────────────────────────────────────
           HINTS SYSTEM
        ────────────────────────────────────────────────────────────── */
        function renderHints(enigme) {
            if (!enigme.indices || !enigme.indices.length) return '';

            const labels = ['Indice 1', 'Indice 2', 'Solution'];
            const revealed = hintsUsed[enigme.id] || [];

            // Progressive: tab i only visible if i===0 or tab i-1 already revealed
            const tabs = enigme.indices.map((_, i) => {
                const isRevealed = revealed.includes(i);
                const isUnlocked = (i === 0) || revealed.includes(i - 1);
                if (!isUnlocked) return ''; // Don't render the tab at all
                const cls = isRevealed ? 'revealed' : '';

                if (isRevealed) {
                    return `<button class="hint-tab ${cls}" id="hint-tab-${i}" onclick="revealHint(${enigme.id}, ${i})">${labels[i] || 'Indice ' + (i + 1)}</button>`;
                } else {
                    return `<button class="hint-tab" id="hint-tab-${i}" onclick="confirmHint(${enigme.id}, ${i}, this)">${labels[i] || 'Indice ' + (i + 1)}</button>`;
                }
            }).join('');

            // Show the last revealed hint by default
            let contentHtml = '<div class="hint-content" id="hint-body"></div>';
            if (revealed.length > 0) {
                const lastIdx = revealed[revealed.length - 1];
                contentHtml = `<div class="hint-content visible" id="hint-body">${formatText(enigme.indices[lastIdx])}</div>`;
            }

            return `
        <div class="hints-section">
          <div class="hints-header">💡 Besoin d'aide ?</div>
          <div class="hints-tabs" id="hints-tabs-container">${tabs}</div>
          ${contentHtml}
        </div>
      `;
        }

        function confirmHint(enigmeId, hintIndex, btn) {
            if (btn.classList.contains('confirming')) return;
            btn.classList.add('confirming');
            btn.onclick = null;
            btn.innerHTML = `
                <span class="hint-confirm-btn" onclick="event.stopPropagation(); revealHint(${enigmeId}, ${hintIndex})" title="Valider">✅</span>
                <span class="hint-cancel-btn" onclick="event.stopPropagation(); cancelHint(${enigmeId}, ${hintIndex}, this)" title="Annuler">❌</span>
            `;
        }

        function cancelHint(enigmeId, hintIndex, element) {
            const btn = element.closest('.hint-tab');
            if (btn) {
                const labels = ['Indice 1', 'Indice 2', 'Solution'];
                btn.innerHTML = labels[hintIndex] || 'Indice ' + (hintIndex + 1);
                btn.classList.remove('confirming');
                btn.onclick = function () { confirmHint(enigmeId, hintIndex, this); };
            }
        }

        function revealHint(enigmeId, hintIndex) {
            if (!hintsUsed[enigmeId]) hintsUsed[enigmeId] = [];
            if (!hintsUsed[enigmeId].includes(hintIndex)) {
                hintsUsed[enigmeId].push(hintIndex);
                localStorage.setItem(LS_KEY_HINTS, JSON.stringify(hintsUsed));

                // Incrémenter le compteur global
                totalHintsCount++;
                localStorage.setItem(LS_KEY_HINTS_TOTAL, totalHintsCount);
                if (totalHintsCount === 1 && !localStorage.getItem(LS_KEY_HINT_BUBBLE)) {
                    localStorage.setItem(LS_KEY_HINT_BUBBLE, '1');
                    triggerHintNotifyBubble();
                }
            }

            const enigme = enigmes.find(e => e.id === enigmeId);
            if (!enigme) return;

            // Update tab styling
            const tab = document.getElementById('hint-tab-' + hintIndex);
            if (tab) {
                // Restore text if it was confirming
                const labels = ['Indice 1', 'Indice 2', 'Solution'];
                tab.innerHTML = labels[hintIndex] || 'Indice ' + (hintIndex + 1);
                tab.classList.remove('confirming');
                tab.onclick = function () { revealHint(enigmeId, hintIndex); };

                // Remove active from all
                document.querySelectorAll('.hint-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active', 'revealed');
            }

            // Si le prochain indice est désormais débloqué, on l'ajoute au DOM s'il n'y est pas encore
            if (hintIndex + 1 < enigme.indices.length) {
                const nextTabId = 'hint-tab-' + (hintIndex + 1);
                if (!document.getElementById(nextTabId)) {
                    const tabsContainer = document.getElementById('hints-tabs-container');
                    if (tabsContainer) {
                        const labels = ['Indice 1', 'Indice 2', 'Solution'];
                        const nextLabel = labels[hintIndex + 1] || 'Indice ' + (hintIndex + 2);
                        const newTab = document.createElement('button');
                        newTab.className = 'hint-tab';
                        newTab.id = nextTabId;
                        newTab.innerHTML = nextLabel;
                        newTab.onclick = function () { confirmHint(enigmeId, hintIndex + 1, this); };
                        tabsContainer.appendChild(newTab);
                    }
                }
            }

            // Show content
            const body = document.getElementById('hint-body');
            if (body) {
                body.className = 'hint-content visible';
                body.innerHTML = formatText(enigme.indices[hintIndex]);
            }

            // Update counter in DOM
            const counterEl = document.getElementById('hint-total-count');
            if (counterEl) counterEl.textContent = totalHintsCount;

            // Reveal next tab if it exists and isn't already shown
            const nextIndex = hintIndex + 1;
            if (nextIndex < enigme.indices.length && !document.getElementById('hint-tab-' + nextIndex)) {
                const labels = ['Indice 1', 'Indice 2', 'Solution'];
                const container = document.getElementById('hints-tabs-container');
                if (container) {
                    const newBtn = document.createElement('button');
                    newBtn.className = 'hint-tab';
                    newBtn.id = 'hint-tab-' + nextIndex;
                    newBtn.textContent = labels[nextIndex] || 'Indice ' + (nextIndex + 1);
                    newBtn.onclick = () => revealHint(enigmeId, nextIndex);
                    newBtn.style.animation = 'fade-in 0.4s ease';
                    container.appendChild(newBtn);
                }
            }
        }

        /* ─────────────────────────────────────────────────────────────
           VALIDATE ANSWER
        ────────────────────────────────────────────────────────────── */
        function validateAnswer() {
            const input = document.getElementById('answer-input');
            if (!input) return;

            const answer = input.value.trim().toUpperCase();
            const expected = enigmes[currentIndex].reponseAttendue;
            let isCorrect = false;

            if (Array.isArray(expected)) {
                isCorrect = expected.some(val => String(val).trim().toUpperCase() === answer);
            } else if (typeof expected === 'string') {
                isCorrect = answer === expected.trim().toUpperCase();
            }

            if (isCorrect) {
                showFeedback('success', '✅ Bonne réponse ! Bien joué.');
                input.disabled = true;
                const btn = document.getElementById('btn-validate');
                if (btn) btn.disabled = true;
                setTimeout(() => handleSuccess(), 1000);
            } else {
                showFeedback('error', '❌ Attention, une erreur vient d\'être ajoutée ! Plus il y a d\'erreurs, plus cela complique une des étapes finales !');
                input.classList.add('error');
                setTimeout(() => input.classList.remove('error'), 600);
            }
        }

        function validateDateAnswer() {
            const input = document.getElementById('date-input');
            if (!input || !input.value) {
                showFeedback('error', '📅 Sélectionne une date dans le calendrier.');
                return;
            }

            const answer = input.value; // format YYYY-MM-DD
            const expected = enigmes[currentIndex].reponseAttendue;

            // reponseAttendue can be an array of accepted dates or a single string
            const acceptedDates = Array.isArray(expected) ? expected : [expected];

            if (acceptedDates.includes(answer)) {
                showFeedback('success', '✅ Bonne date ! Bien joué.');
                input.disabled = true;
                input.classList.add('correct');
                const btn = document.getElementById('btn-validate');
                if (btn) btn.disabled = true;
                setTimeout(() => handleSuccess(), 1000);
            } else {
                showFeedback('error', '❌ Attention, une erreur vient d\'être ajoutée ! Plus il y a d\'erreurs, plus cela complique une des étapes finales !');
                input.classList.add('error');

        /* ────────────────────────── COUNTER PICKER LOGIC ───────────────────────── */
        function handleWheelScroll(wheel) {
            const itemHeight = 48;
            const scrollOffset = wheel.scrollTop;
            const selectedIndex = Math.round(scrollOffset / itemHeight);

            const items = wheel.querySelectorAll('.counter-item');
            items.forEach((item, idx) => {
                if (idx === selectedIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function selectWheelItem(item, idx) {
            const wheel = item.closest('.counter-wheel');
            if (wheel) {
                wheel.scrollTo({
                    top: idx * 48,
                    behavior: 'smooth'
                });
            }
        }

        function getCounterValue() {
            const itemHeight = 48;
            const wHundreds = document.getElementById('wheel-hundreds');
            const wTens = document.getElementById('wheel-tens');
            const wUnits = document.getElementById('wheel-units');

            if (!wHundreds || !wTens || !wUnits) return '000';

            const h = Math.round(wHundreds.scrollTop / itemHeight);
            const t = Math.round(wTens.scrollTop / itemHeight);
            const u = Math.round(wUnits.scrollTop / itemHeight);

            return `${h}${t}${u}`;
        }

        function validateCounterAnswer() {
            const answer = getCounterValue();
            const expected = enigmes[currentIndex].reponseAttendue;

            const acceptedAnswers = Array.isArray(expected) ? expected : [expected];
            const isCorrect = acceptedAnswers.some(val => String(val).trim() === answer);

            const picker = document.getElementById('counter-picker');
            const btn = document.getElementById('btn-validate');

            if (isCorrect) {
                showFeedback('success', '✅ Bonne réponse ! Le code est correct.');
                if (picker) picker.style.pointerEvents = 'none';
                if (btn) btn.disabled = true;
                setTimeout(() => handleSuccess(), 1000);
            } else {
                showFeedback('error', '❌ Le code est incorrect ! Une erreur vient d\'être ajoutée.');
                if (picker) {
                    picker.classList.add('error');
                    setTimeout(() => picker.classList.remove('error'), 600);
                }
            }
        }

        /* ────────────────────────── GEMS PUZZLE LOGIC ───────────────────────── */
        function selectGem(gemId) {
            if (window.event && window.event.stopPropagation) window.event.stopPropagation();
            if (!window._gemsSelected) window._gemsSelected = [];

            // Don't allow more than 2
            if (window._gemsSelected.length >= 2) return;

            // Don't allow same gem twice
            if (window._gemsSelected.includes(gemId)) return;

            // Add to selection
            window._gemsSelected.push(gemId);

            // Highlight the gem
            const hotspot = document.getElementById('gem-' + gemId);
            if (hotspot) hotspot.classList.add('selected');

            // Update selection display
            const enigme = enigmes[currentIndex];
            const gemData = enigme.gems.find(g => g.id === gemId);
            const slotIndex = window._gemsSelected.length - 1;
            const slot = document.getElementById('gem-slot-' + slotIndex);
            if (slot && gemData) {
                slot.textContent = gemData.emoji;
                slot.classList.add('filled');
            }

            // If 2 gems selected, validate after short delay
            if (window._gemsSelected.length === 2) {
                setTimeout(() => validateGems(), 500);
            }

        function validateGems() {
            const enigme = enigmes[currentIndex];
            const expected = enigme.reponseAttendue; // ["rouge", "bleu"]
            const selected = window._gemsSelected;

            const isCorrect = selected.length === expected.length &&
                [...selected].sort().join(',') === [...expected].sort().join(',');

            if (isCorrect) {
                // Mark gems as correct
                selected.forEach(gemId => {
                    const el = document.getElementById('gem-' + gemId);
                    if (el) {
                        el.classList.remove('selected');
                        el.classList.add('correct');
                    }
                });
                showFeedback('success', '✅ Bonne combinaison ! Les pierres s\'illuminent.');
                // Disable all gems
                document.querySelectorAll('.gem-hotspot').forEach(el => {
                    el.style.pointerEvents = 'none';

                setTimeout(() => handleSuccess(), 1200);

                    if (el) {
                        el.classList.remove('selected');
                        el.classList.add('wrong');

        /* ────────────────────────── GPS PROXIMITY LOGIC ───────────────────────── */
        function initProximity(enigme) {
            if (window._geoWatchId) { navigator.geolocation.clearWatch(window._geoWatchId); window._geoWatchId = null; }
            if (window._proximityTimer) { clearInterval(window._proximityTimer); window._proximityTimer = null; }

            let isFrozen = false;
            let inZoneSince = null;

            const $widget = document.getElementById('proximity-widget');
            const $status = document.getElementById('prox-status');
            const $dist = document.getElementById('prox-distance');
            const $coords = document.getElementById('prox-coords');
            const $acc = document.getElementById('prox-accuracy');
            const $radar = document.getElementById('prox-radar');

            if (DEBUG && $radar) {
                $radar.title = "DEBUG : Cliquez ici pour simuler que vous êtes sur place (distance = 0m)";
                $radar.style.cursor = "pointer";
                $radar.onclick = () => {
                    if (isFrozen) return;
                    processPosition(enigme.targetLat, enigme.targetLng, 2);
                };
            }

            if (!navigator.geolocation) {
                showProxError("La géolocalisation n'est pas supportée par votre navigateur.");
                return;
            }

            function processPosition(lat, lng, acc) {
                if (isFrozen) return;
                if ($coords) $coords.innerHTML = 'Lat: ' + lat.toFixed(6) + '°<br>Lng: ' + lng.toFixed(6) + '°';
                if ($acc) $acc.textContent = 'Précision GPS : ±' + Math.round(acc) + ' m';

                const dist = getDistanceFromLatLonInKm(lat, lng, enigme.targetLat, enigme.targetLng) * 1000;
                const distRound = Math.round(dist);
                if ($dist) $dist.textContent = distRound;

                if ($status) {
                    $status.classList.remove('searching');
                }

                // Color mapping: interpolate from blue (distance >= 500m) to red (distance <= 0m)
                const ratio = Math.max(0, Math.min(1, (500 - dist) / 500));
                const red = Math.round(37 + (239 - 37) * ratio);
                const green = Math.round(99 + (68 - 99) * ratio);
                const blue = Math.round(235 + (68 - 235) * ratio);
                const rgb = `${red}, ${green}, ${blue}`;

                if ($radar) {
                    $radar.style.background = `radial-gradient(circle, rgba(${rgb}, 0.3) 0%, rgba(5, 5, 15, 0.9) 70%)`;
                    $radar.style.borderColor = `rgba(${rgb}, 0.8)`;
                    $radar.style.boxShadow = `0 0 ${Math.round(20 + 40 * ratio)}px rgba(${rgb}, 0.5)`;
                }
                if ($dist) $dist.style.color = `rgb(${rgb})`;

                // Tolerance check
                if (dist <= enigme.toleranceMeters) {
                    if (!inZoneSince) {
                        inZoneSince = Date.now();
                        if ($status) $status.textContent = '📍 Zone atteinte ! Ne bougez plus (3s)…';
                        window._proximityTimer = setInterval(() => {
                            const elapsed = (Date.now() - inZoneSince) / 1000;
                            if (elapsed >= 3 && !isFrozen) {
                                isFrozen = true;
                                clearInterval(window._proximityTimer);
                                window._proximityTimer = null;
                                if (window._geoWatchId) { navigator.geolocation.clearWatch(window._geoWatchId); window._geoWatchId = null; }

                                if ($widget) $widget.classList.add('frozen');
                                if ($status) $status.textContent = '✅ Position validée !';

                                showFeedback('success', '📍 Cible atteinte avec succès ! Le souvenir se déverrouille…');
                                setTimeout(() => handleSuccess(), 1500);
                            } else if (!isFrozen && $status) {
                                $status.textContent = `📍 Zone atteinte ! Ne bougez plus (${Math.ceil(3 - elapsed)}s)…`;
                            }
                        }, 250);
                    }
                } else {
                    if (inZoneSince) {
                        inZoneSince = null;
                        if (window._proximityTimer) {
                            clearInterval(window._proximityTimer);
                            window._proximityTimer = null;
                        }
                        if ($status) $status.textContent = 'Signal GPS actif — Approchez-vous';
                    } else if ($status && !inZoneSince && $status.textContent === 'Recherche du signal GPS…') {
                        $status.textContent = 'Signal GPS actif — Approchez-vous';
                    }
                }
            }

            window._geoWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    processPosition(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy || 10);
                },
                (err) => {
                    let msg = "Erreur GPS : impossible d'obtenir votre position.";
                    if (err.code === 1) msg = "⚠️ Accès au GPS refusé. Veuillez toucher le bouton 'Autoriser le GPS' ci-dessous ou vérifier les réglages de votre navigateur.";
                    else if (err.code === 2) msg = "⚠️ Position indisponible. Vérifiez l'activation du GPS.";
                    else if (err.code === 3) msg = "⚠️ Délai d'attente dépassé pour le GPS.";
                    showProxError(msg);
                },
                { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
            );
        }

        function requestGpsPermission() {
            if (!navigator.geolocation) {
                showProxError("La géolocalisation n'est pas supportée par votre navigateur.");
                return;
            }
            const $status = document.getElementById('prox-status');
            const $err = document.getElementById('prox-error');
            if ($err) $err.classList.remove('visible');
            if ($status) {
                $status.textContent = 'Demande d\'autorisation GPS…';
                $status.classList.add('searching');
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    if ($err) $err.classList.remove('visible');
                    initProximity(enigmes[currentIndex]);
                    showFeedback('success', '📍 Autorisation GPS accordée avec succès !');
                },
                (err) => {
                    let msg = "Erreur GPS : impossible d'obtenir votre position.";
                    if (err.code === 1) {
                        msg = "⚠️ Autorisation refusée dans le navigateur ! Pour autoriser : sur iPhone (Safari), allez dans Réglages > Confidentialité et sécurité > Service de localisation > Safari > 'Lorsque l'app est active'. Sur Android (Chrome), touchez le cadenas 🔒 dans la barre d'adresse > Autorisations > Localisation > Autoriser. Ensuite, touchez à nouveau le bouton ci-dessous !";
                        showFeedback('error', '⚠️ Accès au GPS bloqué dans les réglages du navigateur.');
                    } else if (err.code === 2) {
                        msg = "⚠️ Position indisponible. Vérifiez que le GPS est activé sur votre téléphone.";
                    } else if (err.code === 3) {
                        msg = "⚠️ Délai d'attente dépassé pour le GPS. Réessayez à l'extérieur ou cliquez à nouveau.";
                        initProximity(enigmes[currentIndex]);
                    }
                    showProxError(msg);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
        }

        function showProxError(msg) {
            const $err = document.getElementById('prox-error');
            const $status = document.getElementById('prox-status');
            if ($status) $status.classList.remove('searching');
            if ($err) {
                $err.textContent = msg;
                $err.classList.add('visible');
            }
        }

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the earth in km
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }


        function handleChoice(index, value) {
            const expected = enigmes[currentIndex].reponseAttendue.trim().toUpperCase();
            const btn = document.getElementById('choice-' + index);

            if (value.trim().toUpperCase() === expected) {
                btn.classList.add('correct');
                showFeedback('success', '✅ Bonne réponse ! Bien joué.');
                // Disable all
                document.querySelectorAll('.btn-choice').forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; });
                setTimeout(() => handleSuccess(), 1000);
            } else {
                btn.classList.add('wrong');
                showFeedback('error', '❌ Mauvais choix. Essaie encore.');
                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 700);
            }
        }

        let _mosaicPressTimer = null;
        let _mosaicIsLongPress = false;
        let _mosaicStartX = 0;
        let _mosaicStartY = 0;

        function startMosaicPress(event, tileIndex) {
            if (event && event.button && event.button !== 0) return;
            cancelMosaicPress();

            const tileEl = document.getElementById(`mosaic-tile-${tileIndex}`);
            if (!tileEl || tileEl.classList.contains('valid-clicked') || tileEl.classList.contains('disabled')) return;

            _mosaicIsLongPress = false;
            if (event.touches && event.touches.length > 0) {
                _mosaicStartX = event.touches[0].clientX;
                _mosaicStartY = event.touches[0].clientY;
            } else if (event.clientX) {
                _mosaicStartX = event.clientX;
                _mosaicStartY = event.clientY;
            }

            _mosaicPressTimer = setTimeout(() => {
                _mosaicIsLongPress = true;
                if (navigator.vibrate) navigator.vibrate(40);
                showMosaicPreview(tileIndex);
            }, 280);
        }

        function moveMosaicPress(event) {
            if (!_mosaicPressTimer) return;
            let currentX = 0;
            let currentY = 0;
            if (event.touches && event.touches.length > 0) {
                currentX = event.touches[0].clientX;
                currentY = event.touches[0].clientY;
            } else if (event.clientX) {
                currentX = event.clientX;
                currentY = event.clientY;
            }
            if (Math.abs(currentX - _mosaicStartX) > 10 || Math.abs(currentY - _mosaicStartY) > 10) {
                cancelMosaicPress();
            }
        }

        function endMosaicPress(event, tileIndex) {
            if (_mosaicPressTimer) {
                clearTimeout(_mosaicPressTimer);
                _mosaicPressTimer = null;
            }
            if (_mosaicIsLongPress) {
                if (event && event.preventDefault) event.preventDefault();
                hideMosaicPreview();
                window._mosaicIgnoreNextClick = true;
                setTimeout(() => { window._mosaicIgnoreNextClick = false; }, 350);
            }
        }

        function cancelMosaicPress() {
            if (_mosaicPressTimer) {
                clearTimeout(_mosaicPressTimer);
                _mosaicPressTimer = null;
            }
            if (_mosaicIsLongPress) {
                hideMosaicPreview();
                window._mosaicIgnoreNextClick = true;
                setTimeout(() => { window._mosaicIgnoreNextClick = false; }, 350);
                _mosaicIsLongPress = false;
            }
        }

        function showMosaicPreview(tileIndex) {
            const enigma = enigmes[currentIndex];
            if (!enigma || !enigma.tiles || !enigma.tiles[tileIndex]) return;
            const tile = enigma.tiles[tileIndex];
            const srcUrl = `assets/Enigme Space Ensemble/${encodeURI(tile.file)}`;

            let overlay = document.getElementById('mosaic-preview-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'mosaic-preview-overlay';
                overlay.className = 'mosaic-preview-overlay';
                overlay.innerHTML = `
            <div class="mosaic-preview-card" onclick="event.stopPropagation()">
                <div class="mosaic-preview-img-wrapper">
                    <img id="mosaic-preview-img" src="" alt="Preview">
                </div>
                <div id="mosaic-preview-title" class="mosaic-preview-title"></div>
                <div class="mosaic-preview-hint">Relâchez votre doigt pour fermer</div>
            </div>
          `;
                overlay.addEventListener('click', hideMosaicPreview);
                document.body.appendChild(overlay);
            }

            const imgEl = document.getElementById('mosaic-preview-img');
            const titleEl = document.getElementById('mosaic-preview-title');
            if (imgEl) imgEl.src = srcUrl;
            if (titleEl) titleEl.textContent = tile.title || '';

            overlay.classList.add('active');
            window.addEventListener('touchend', hideMosaicPreview, { once: true });
            window.addEventListener('touchcancel', hideMosaicPreview, { once: true });
            window.addEventListener('mouseup', hideMosaicPreview, { once: true });
        }

        function hideMosaicPreview() {
            const overlay = document.getElementById('mosaic-preview-overlay');
            if (overlay) {
                overlay.classList.remove('active');
            }
            window._mosaicIgnoreNextClick = true;
            setTimeout(() => { window._mosaicIgnoreNextClick = false; }, 350);
        }

        function setMosaicGridZoom(level, btn) {
            const grid = document.getElementById('mosaic-grid');
            const wrapper = document.getElementById('mosaic-grid-wrapper');
            if (!grid) return;

            document.querySelectorAll('.btn-mosaic-zoom').forEach(b => b.classList.remove('active'));
            if (btn && btn.classList) {
                btn.classList.add('active');
            } else {
                const targetBtn = document.getElementById(`btn-zoom-${level}`);
                if (targetBtn) targetBtn.classList.add('active');
            }

            if (level === 1) {
                grid.style.width = '100%';
                grid.style.minWidth = 'auto';
                grid.style.gap = '6px';
            } else {
                const widthPct = Math.round(level * 100);
                grid.style.width = `${widthPct}%`;
                grid.style.minWidth = `${widthPct}%`;
                grid.style.gap = `${Math.round(6 * Math.sqrt(level))}px`;

                    const scrollLeft = (grid.scrollWidth - wrapper.clientWidth) / 2;
                    if (scrollLeft > 0 && wrapper.scrollLeft === 0) {
                        wrapper.scrollTo({ left: scrollLeft, behavior: 'smooth' });

                }, 50);
            }

        /* ─────────────────────────────────────────────────────────────

        ────────────────────────────────────────────────────────────── */
        let _lbZoom = 1;
        let _lbPanX = 0;
        let _lbPanY = 0;
        let _lbIsDragging = false;
        let _lbStartX = 0;
        let _lbStartY = 0;

        function openLightbox(src) {
            const $lb = document.getElementById('image-lightbox');
            const $img = document.getElementById('lightbox-img');
            if ($lb && $img) {
                _lbZoom = 1;
                _lbPanX = 0;
                _lbPanY = 0;
                $img.src = src;
                $lb.style.display = 'flex';
                updateLightboxTransform(false);
                setTimeout(() => updateLightboxTransform(true), 10);
            }
        }

        function closeLightbox() {
            const $lb = document.getElementById('image-lightbox');
            const $img = document.getElementById('lightbox-img');
            if ($lb && $img) {
                $img.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    $lb.style.display = 'none';
                    _lbZoom = 1;
                    _lbPanX = 0;
                    _lbPanY = 0;
                }, 150);
            }
        }

        function handleLightboxBackgroundClick(event) {
            if (event.target.id === 'image-lightbox' || event.target.id === 'lightbox-img-wrapper') {
                closeLightbox();
            }
        }

        function toggleImageZoom(event) {
            if (event && event.stopPropagation) event.stopPropagation();
            if (_lbIsDragging) return; // Don't  toggle if we were panning

            if (_lbZoom > 1) {
                resetLightboxZoom();
            } else {
                _lbZoom = 2.5;
                updateLightboxTransform(true);
            }
        }

        function zoomLightbox(delta) {
            _lbZoom = Math.max(1, Math.min(5, _lbZoom + delta));
            updateLightboxTransform(true);
        }

        function resetLightboxZoom() {
            _lbZoom = 1;
            _lbPanX = 0;
            _lbPanY = 0;
            updateLightboxTransform(true);
        }

        function updateLightboxTransform(smooth) {
            const $img = document.getElementById('lightbox-img');
            const $disp = document.getElementById('zoom-level-display');
            if (!$img) return;

            if (_lbZoom <= 1) {
                _lbZoom = 1;
                _lbPanX = 0;
                _lbPanY = 0;
            }

            $img.style.transition = smooth ? 'transform 0.25s cubic-bezier(0.25, 1, 0.5, 1)' : 'none';
            $img.style.transform = `scale(${_lbZoom}) translate(${_lbPanX}px, ${_lbPanY}px)`;
            $img.style.cursor = _lbZoom > 1 ? 'grab' : 'zoom-in';

            if ($disp) $disp.textContent = Math.round(_lbZoom * 100) + '%';
        }

        // Pan and drag handling for zoomed image
        document.addEventListener('DOMContentLoaded', () => {
            const $img = document.getElementById('lightbox-img');
            const $lb = document.getElementById('image-lightbox');
            if (!$img || !$lb) return;

            $img.addEventListener('mousedown', (e) => {
                if (_lbZoom <= 1) return;
                e.preventDefault();
                _lbIsDragging = false;
                _lbStartX = e.clientX - _lbPanX * _lbZoom;
                _lbStartY = e.clientY - _lbPanY * _lbZoom;
                $img.style.cursor = 'grabbing';
                $img.style.transition = 'none';
            });

            window.addEventListener('mousemove', (e) => {
                if (e.buttons !== 1 || _lbZoom <= 1 || $img.style.cursor !== 'grabbing') return;
                const dx = e.clientX - (_lbStartX + _lbPanX * _lbZoom);
                const dy = e.clientY - (_lbStartY + _lbPanY * _lbZoom);
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) _lbIsDragging = true;
                _lbPanX = (e.clientX - _lbStartX) / _lbZoom;
                _lbPanY = (e.clientY - _lbStartY) / _lbZoom;
                $img.style.transform = `scale(${_lbZoom}) translate(${_lbPanX}px, ${_lbPanY}px)`;
            });

            window.addEventListener('mouseup', () => {
                if (_lbZoom > 1) $img.style.cursor = 'grab';
            });

            // Touch support for mobile dragging
            $img.addEventListener('touchstart', (e) => {
                if (_lbZoom <= 1 || !e.touches[0]) return;
                _lbIsDragging = false;
                _lbStartX = e.touches[0].clientX - _lbPanX * _lbZoom;
                _lbStartY = e.touches[0].clientY - _lbPanY * _lbZoom;
                $img.style.transition = 'none';
            }, { passive: true });

            $img.addEventListener('touchmove', (e) => {
                if (_lbZoom <= 1 || !e.touches[0]) return;
                const touch = e.touches[0];
                const dx = touch.clientX - (_lbStartX + _lbPanX * _lbZoom);
                const dy = touch.clientY - (_lbStartY + _lbPanY * _lbZoom);
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) _lbIsDragging = true;
                _lbPanX = (touch.clientX - _lbStartX) / _lbZoom;
                _lbPanY = (touch.clientY - _lbStartY) / _lbZoom;
                $img.style.transform = `scale(${_lbZoom}) translate(${_lbPanX}px, ${_lbPanY}px)`;
            }, { passive: true });

            // Wheel zoom
            $lb.addEventListener('wheel', (e) => {
                if ($lb.style.display !== 'flex') return;
                e.preventDefault();
                const delta = e.deltaY < 0 ? 0.25 : -0.25;
                zoomLightbox(delta);
            }, { passive: false });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === '+' || e.key === '=') zoomLightbox(0.25);
            if (e.key === '-' || e.key === '_') zoomLightbox(-0.25);
            if (e.key === '0' || e.key === 'r') resetLightboxZoom();
        });

        function resetGame() {
            // Supprimer toutes les clés du jeu dans localStorage
            Object.keys(localStorage)
                .filter(k => k.startsWith('escapeGame_'))
                .forEach(k => localStorage.removeItem(k));
            currentIndex = 0;

            hintsUsed = {};

        /* ─────────────────────────────────────────────────────────────
           DRAWING CANVAS (for type "drawing")
        ────────────────────────────────────────────────────────────── */
        let canvasCtx = null;
        let isDrawing = false;
        let drawHistory = [];

        function initCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas) return;

            // Set actual size
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;

            canvasCtx = canvas.getContext('2d');
            canvasCtx.scale(2, 2);
            canvasCtx.strokeStyle = '#f1f5f9';
            canvasCtx.lineWidth = 3;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';

            // Save initial state
            drawHistory = [canvasCtx.getImageData(0, 0, canvas.width, canvas.height)];

            // Pointer events
            canvas.addEventListener('pointerdown', (e) => {
                isDrawing = true;
                canvasCtx.beginPath();
                const pos = getCanvasPos(canvas, e);
                canvasCtx.moveTo(pos.x, pos.y);
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!isDrawing) return;
                const pos = getCanvasPos(canvas, e);
                canvasCtx.lineTo(pos.x, pos.y);
                canvasCtx.stroke();
            });

            canvas.addEventListener('pointerup', () => {
                isDrawing = false;
                drawHistory.push(canvasCtx.getImageData(0, 0, canvas.width, canvas.height));
            });

            canvas.addEventListener('pointerleave', () => {
                isDrawing = false;
            });
        }

        function getCanvasPos(canvas, e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function clearCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas || !canvasCtx) return;
            canvasCtx.clearRect(0, 0, canvas.width / 2, canvas.height / 2);
            drawHistory = [canvasCtx.getImageData(0, 0, canvas.width, canvas.height)];
        }

        function undoCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas || !canvasCtx || drawHistory.length <= 1) return;
            drawHistory.pop();
            canvasCtx.putImageData(drawHistory[drawHistory.length - 1], 0, 0);
        }

        /* ─────────────────────────────────────────────────────────────
           CONFETTI 🎊
        ────────────────────────────────────────────────────────────── */
        function spawnConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            const colors = ['#10b981', '#7c3aed', '#2563eb', '#f59e0b', '#ef4444', '#ec4899', '#06b6d4'];

            for (let i = 0; i < 80; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (Math.random() * 8 + 6) + 'px';
                piece.style.height = (Math.random() * 8 + 6) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(piece);
            }

            setTimeout(() => container.remove(), 5000);
        }

        /* ─────────────────────────────────────────────────────────────
           UTILITIES
        ────────────────────────────────────────────────────────────── */
        function formatText(text) {
            return text.replace(/\n/g, '<br>');
        }

        function escapeAttr(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        /* ─────────────────────────────────────────────────────────────
           TYPEWRITER & STARS (from pour-toi version)
        ────────────────────────────────────────────────────────────── */
        function typewriter(element, text, speed = 30, initialDelay = 500, onComplete = null) {
            if (!element) return;
            element.innerHTML = '<span class="tw-text"></span><span class="tw-cursor"></span>';
            const textSpan = element.querySelector('.tw-text');
            let i = 0;
            setTimeout(() => {
                const interval = setInterval(() => {
                    if (i < text.length) {
                        textSpan.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++;
                    } else {
                        clearInterval(interval);
                        const cursor = element.querySelector('.tw-cursor');
                        if (cursor) setTimeout(() => cursor.style.display = 'none', 3000);
                        if (typeof onComplete === 'function') onComplete();
                    }
                }, speed);
            }, initialDelay);
        }

        function initStars(canvasId, options = {}) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const count = options.count || 100;
            const stars = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.8 + 0.2,
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleSpeed: Math.random() * 0.03 + 0.01,
                    twinkleVal: Math.random() * Math.PI
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    star.twinkleVal += star.twinkleSpeed;
                    const currentOpacity = star.opacity * (0.6 + 0.4 * Math.sin(star.twinkleVal));
                    ctx.fillStyle = `rgba(255, 255, 255, ${currentOpacity})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = canvas.height;
                        star.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        /* ─────────────────────────────────────────────────────────────
           BOSS FIGHT ENGINE ⚔️
        ────────────────────────────────────────────────────────────── */
        let bf = null;

        function startBossFight() {
            $app.innerHTML = `
                <div class="bf-wrapper" id="bf-wrapper">
                    <canvas id="bf-canvas" class="bf-canvas"></canvas>
                    <div class="bf-controls">
                        <div class="bf-joystick" id="bf-joystick-base">
                            <div class="bf-joystick-knob" id="bf-joystick-knob"></div>
                        </div>
                        <div class="bf-atk-buttons">
                            <button class="bf-btn bf-btn-lightning" id="bf-btn-lightning">⚡</button>
                            <button class="bf-btn bf-btn-moon" id="bf-btn-moon">🌙</button>
                            <button class="bf-btn bf-btn-nova" id="bf-btn-nova">💫</button>
                        </div>
                    </div>
                </div>
            `;
            const wrapper = document.getElementById('bf-wrapper');
            wrapper.addEventListener('touchstart', e => { if (e.target === wrapper || e.target.tagName === 'CANVAS') e.preventDefault(); }, { passive: false });
            wrapper.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
            initBFGame();
        }

        function initBFGame() {
            const canvas = document.getElementById('bf-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const cw = canvas.parentElement.clientWidth;
            const ch = Math.min(cw * 1.35, window.innerHeight * 0.62);
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = cw * dpr;
            canvas.height = ch * dpr;
            canvas.style.height = ch + 'px';
            ctx.scale(dpr, dpr);
            const malusHP = Math.max(3, totalErrorsCount * totalHintsCount);

            bf = {
                ctx, canvas, W: cw, H: ch, running: true, time: 0,
                shake: 0, flash: 0, flashColor: '#fff', introTimer: 1.5,
                eva: {
                    x: cw / 2, y: ch * 0.78, w: 28, h: 48,
                    speed: cw * 0.5, hp: 5, maxHp: 5,
                    dir: 0, facing: 1, inv: 0, atk: null,
                    cd: [0, 0, 0], trail: [], anim: 0
                },
                malus: {
                    x: cw / 2, y: ch * 0.18, w: 45, h: 60,
                    hp: malusHP, maxHp: malusHP,
                    atkTimer: 2.5, hurt: 0, anim: 0,
                    moveTarget: cw / 2, moveTimer: 0, phase: 0
                },
                projectiles: [], particles: [], dmgTexts: [],
                stars: Array.from({ length: 40 }, () => ({
                    x: Math.random() * cw, y: Math.random() * ch,
                    s: Math.random() * 1.5 + 0.5, t: Math.random() * 6.28,
                    sp: Math.random() * 0.02 + 0.005
                })),
                input: { moveX: 0 }
            };
            setupBFInput();
            bf._lastT = performance.now();
            bf._raf = requestAnimationFrame(bfLoop);
        }

        function setupBFInput() {
            const base = document.getElementById('bf-joystick-base');
            const knob = document.getElementById('bf-joystick-knob');
            let joyActive = false, joyCX = 0;
            if (base) {
                const jStart = (e) => {
                    e.preventDefault(); joyActive = true;
                    joyCX = base.getBoundingClientRect().left + base.clientWidth / 2;
                    jMove(e);
                };
                const jMove = (e) => {
                    if (!joyActive || !bf) return;
                    const t = e.touches ? e.touches[0] : e;
                    const dx = t.clientX - joyCX;
                    const max = base.clientWidth / 2 - 12;
                    const cl = Math.max(-max, Math.min(max, dx));
                    if (knob) knob.style.transform = `translateX(${cl}px)`;
                    bf.input.moveX = cl / max;
                };
                const jEnd = () => {
                    joyActive = false;
                    if (knob) knob.style.transform = '';
                    if (bf) bf.input.moveX = 0;
                };
                base.addEventListener('touchstart', jStart, { passive: false });
                base.addEventListener('touchmove', jMove, { passive: false });
                base.addEventListener('touchend', jEnd);
                base.addEventListener('touchcancel', jEnd);
                base.addEventListener('mousedown', jStart);
                document.addEventListener('mousemove', (e) => { if (joyActive) jMove(e); });
                document.addEventListener('mouseup', () => { if (joyActive) { joyActive = false; if (knob) knob.style.transform = ''; if (bf) bf.input.moveX = 0; } });
            }
            ['lightning', 'moon', 'nova'].forEach((t, i) => {
                const btn = document.getElementById('bf-btn-' + t);
                if (btn) {
                    btn.addEventListener('touchstart', (e) => { e.preventDefault(); bfDoAttack(i); }, { passive: false });
                    btn.addEventListener('click', () => bfDoAttack(i));
                }
            });
            const kd = (e) => {
                if (!bf || !bf.running) return;
                if (e.key === 'ArrowLeft' || e.key === 'a') bf.input.moveX = -1;
                if (e.key === 'ArrowRight' || e.key === 'd') bf.input.moveX = 1;
                if (e.key === '1' || e.key === 'j') bfDoAttack(0);
                if (e.key === '2' || e.key === 'k') bfDoAttack(1);
                if (e.key === '3' || e.key === 'l') bfDoAttack(2);
            };
            const ku = (e) => {
                if (!bf) return;
                if ((e.key === 'ArrowLeft' || e.key === 'a') && bf.input.moveX < 0) bf.input.moveX = 0;
                if ((e.key === 'ArrowRight' || e.key === 'd') && bf.input.moveX > 0) bf.input.moveX = 0;
            };
            window.addEventListener('keydown', kd);
            window.addEventListener('keyup', ku);
            bf._kd = kd; bf._ku = ku;
        }

        function bfDoAttack(idx) {
            if (!bf || !bf.running || bf.introTimer > 0 || bf.eva.cd[idx] > 0 || bf.eva.atk) return;
            const { eva, malus } = bf;
            const dmgs = [1, 2, 3], cds = [0.8, 2.5, 5], durs = [0.3, 0.5, 0.8];
            const names = ['lightning', 'moon', 'nova'];
            eva.atk = { type: names[idx], t: 0, dur: durs[idx], dmg: dmgs[idx] };
            eva.cd[idx] = cds[idx];

            if (idx === 0) {
                bf.projectiles.push({ type: 'lightning', x: eva.x, y: eva.y - 20, t: 0, dur: 0.3, dmg: 1, hit: false });
                for (let i = 0; i < 8; i++) {
                    const r = i / 8;
                    bfParticle(eva.x + (malus.x - eva.x) * r, (eva.y - 20) + (malus.y - eva.y + 20) * r,
                        (Math.random() - 0.5) * 80, (Math.random() - 0.5) * 80, 0.4, '#facc15', 3);
                }
            } else if (idx === 1) {
                bf.projectiles.push({ type: 'moon', x: eva.x, y: eva.y - 30, vx: 0, vy: -bf.H * 0.85, t: 0, dur: 0.8, dmg: 2, r: 18, hit: false });
            } else {
                bf.projectiles.push({ type: 'nova', x: eva.x, y: eva.y - 30, t: 0, dur: 0.8, dmg: 3, hit: false });
                bf.shake = 0.4; bf.flash = 0.2; bf.flashColor = '#f2d06b';
            }
            updateBFBtns();
        }

        function bfLoop(now) {
            if (!bf) return;
            const dt = Math.min((now - bf._lastT) / 1000, 0.05);
            bf._lastT = now;
            bf.time += dt;
            if (bf.running) bfUpdate(dt);
            bfRender();
            bf._raf = requestAnimationFrame(bfLoop);
        }

        function bfUpdate(dt) {
            const { eva, malus, W, H } = bf;
            if (bf.introTimer > 0) { bf.introTimer -= dt; return; }

            // Eva
            eva.dir = bf.input.moveX;
            eva.x += eva.dir * eva.speed * dt;
            eva.x = Math.max(20, Math.min(W - 20, eva.x));
            if (eva.dir !== 0) eva.facing = eva.dir > 0 ? 1 : -1;
            eva.inv = Math.max(0, eva.inv - dt);
            eva.anim += dt;
            if (Math.abs(eva.dir) > 0.1) eva.trail.push({ x: eva.x, y: eva.y, a: 0.4 });
            eva.trail = eva.trail.filter(p => (p.a -= dt * 1.5) > 0);
            if (eva.atk) { eva.atk.t += dt; if (eva.atk.t >= eva.atk.dur) eva.atk = null; }
            for (let i = 0; i < 3; i++) eva.cd[i] = Math.max(0, eva.cd[i] - dt);
            updateBFBtns();

            // Malus AI
            malus.phase = malus.hp <= malus.maxHp * 0.5 ? 1 : 0;
            malus.hurt = Math.max(0, malus.hurt - dt);
            malus.anim += dt;
            malus.moveTimer -= dt;
            if (malus.moveTimer <= 0) {
                malus.moveTarget = 40 + Math.random() * (W - 80);
                malus.moveTimer = malus.phase ? 0.8 + Math.random() : 1.5 + Math.random() * 2;
            }
            const ms = malus.phase ? 160 : 90;
            if (Math.abs(malus.x - malus.moveTarget) > 5)
                malus.x += Math.sign(malus.moveTarget - malus.x) * ms * dt;

            // Malus attacks
            malus.atkTimer -= dt;
            if (malus.atkTimer <= 0) {
                malus.atkTimer = (malus.phase ? 0.8 : 1.6) + Math.random() * 0.6;
                if (malus.phase && Math.random() < 0.35) {
                    for (let i = -1; i <= 1; i++)
                        bf.projectiles.push({ type: 'orb', x: malus.x, y: malus.y + 30, vx: i * 70, vy: H * 0.38, r: 8, dmg: 1, t: 0, dur: 3 });
                } else {
                    const dx = eva.x - malus.x, dy = eva.y - malus.y;
                    const d = Math.sqrt(dx * dx + dy * dy) || 1;
                    const sp = H * 0.42;
                    bf.projectiles.push({ type: 'orb', x: malus.x, y: malus.y + 30, vx: (dx / d) * sp, vy: (dy / d) * sp, r: 8, dmg: 1, t: 0, dur: 3 });
                }
                for (let i = 0; i < 4; i++)
                    bfParticle(malus.x + (Math.random() - 0.5) * 40, malus.y + 30, (Math.random() - 0.5) * 40, 20 + Math.random() * 30, 0.5, '#c4263d', 4);
            }

            // Update projectiles
            bf.projectiles = bf.projectiles.filter(p => {
                p.t += dt;
                if (p.t > p.dur) return false;
                if (p.type === 'orb') {
                    p.x += p.vx * dt; p.y += p.vy * dt;
                    if (eva.inv <= 0 && Math.abs(p.x - eva.x) < 22 && Math.abs(p.y - eva.y) < 28) {
                        eva.hp -= p.dmg; eva.inv = 1.0;
                        bf.shake = 0.3; bf.flash = 0.15; bf.flashColor = '#ef4444';
                        bf.dmgTexts.push({ x: eva.x, y: eva.y - 35, text: '-1', color: '#ef4444', t: 0.9 });
                        for (let i = 0; i < 10; i++)
                            bfParticle(eva.x, eva.y, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, 0.5, '#ef4444', 4);
                        if (eva.hp <= 0) bfEndGame(false);
                        return false;
                    }
                    if (Math.random() < 0.3) bfParticle(p.x, p.y, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, 0.3, '#8b1a2e', 3);
                }
                if (p.type === 'lightning' && !p.hit && p.t > 0.08) { p.hit = true; bfHitMalus(p.dmg); }
                if (p.type === 'moon') {
                    p.x += p.vx * dt; p.y += p.vy * dt;
                    bfParticle(p.x + (Math.random() - 0.5) * 10, p.y, (Math.random() - 0.5) * 30, Math.random() * 20, 0.4, '#93c5fd', 3);
                    if (!p.hit && Math.abs(p.x - malus.x) < 40 && Math.abs(p.y - malus.y) < 45) { p.hit = true; bfHitMalus(p.dmg); }
                }
                if (p.type === 'nova' && !p.hit && p.t > 0.2) {
                    p.hit = true; bfHitMalus(p.dmg);
                    for (let i = 0; i < 30; i++) {
                        const a = (i / 30) * Math.PI * 2, sp = 100 + Math.random() * 150;
                        bfParticle(malus.x, malus.y, Math.cos(a) * sp, Math.sin(a) * sp, 0.8, ['#f2d06b', '#facc15', '#fb923c', '#fff'][i % 4], 5);
                    }
                }
                return true;
            });

            // Update particles & damage texts
            bf.particles = bf.particles.filter(p => { p.t -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.96; p.vy *= 0.96; return p.t > 0; });
            bf.dmgTexts = bf.dmgTexts.filter(d => (d.t -= dt) > 0);
            bf.shake = Math.max(0, bf.shake - dt);
            bf.flash = Math.max(0, bf.flash - dt);

            // Ambient particles
            if (Math.random() < 0.15)
                bfParticle(eva.x + (Math.random() - 0.5) * 20, eva.y + (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 12, -8 - Math.random() * 15, 0.6, '#f2d06b', 2);
            if (Math.random() < 0.1)
                bfParticle(malus.x + (Math.random() - 0.5) * 40, malus.y + (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 12, 0.5, '#2a0a20', 3);
        }

        function bfHitMalus(dmg) {
            if (!bf) return;
            bf.malus.hp = Math.max(0, bf.malus.hp - dmg);
            bf.malus.hurt = 0.3;
            bf.shake = Math.max(bf.shake, 0.15);
            bf.dmgTexts.push({ x: bf.malus.x, y: bf.malus.y - 40, text: '-' + dmg, color: '#facc15', t: 0.9 });
            for (let i = 0; i < 6; i++)
                bfParticle(bf.malus.x + (Math.random() - 0.5) * 30, bf.malus.y, (Math.random() - 0.5) * 120, (Math.random() - 0.5) * 120, 0.5, '#c4263d', 4);
            if (bf.malus.hp <= 0) bfEndGame(true);
        }

        function bfParticle(x, y, vx, vy, life, color, size) {
            if (bf) bf.particles.push({ x, y, vx, vy, t: life, maxT: life, color, size });
        }

        function bfEndGame(win) {
            if (!bf) return;
            bf.running = false;
            if (win) {
                for (let i = 0; i < 50; i++) {
                    const a = (i / 50) * Math.PI * 2, sp = 50 + Math.random() * 200;
                    bfParticle(bf.malus.x, bf.malus.y, Math.cos(a) * sp, Math.sin(a) * sp, 1.2, ['#c4263d', '#8b1a2e', '#4a0f1a', '#ef4444'][i % 4], 6);
                }
                bf.flash = 0.5; bf.flashColor = '#f2d06b'; bf.shake = 0.6;
            }
            setTimeout(() => {
                const wrapper = document.getElementById('bf-wrapper');
                if (!wrapper) return;
                const ov = document.createElement('div');
                ov.className = 'bf-result ' + (win ? 'win' : 'lose');
                ov.innerHTML = win
                    ? `<h2>✨ Victoire ! ✨</h2><p style="color:var(--text-secondary);margin-bottom:20px;text-align:center;">Eva a vaincu Malus !</p><button class="btn btn-primary" onclick="bfCleanup();handleSuccess();">Continuer l'aventure ↗</button>`
                    : `<h2>💀 Défaite...</h2><p style="color:var(--text-secondary);margin-bottom:20px;text-align:center;">Eva a été vaincue...</p><button class="btn btn-primary" onclick="startBossFight()">⚔️ Réessayer</button>`;
                wrapper.appendChild(ov);
            }, win ? 1500 : 800);
        }

        function bfCleanup() {
            if (!bf) return;
            if (bf._raf) cancelAnimationFrame(bf._raf);
            if (bf._kd) window.removeEventListener('keydown', bf._kd);
            if (bf._ku) window.removeEventListener('keyup', bf._ku);
            bf = null;
        }

        function updateBFBtns() {
            if (!bf) return;
            const names = ['lightning', 'moon', 'nova'], maxCds = [0.8, 2.5, 5];
            names.forEach((n, i) => {
                const btn = document.getElementById('bf-btn-' + n);
                if (!btn) return;
                const cd = bf.eva.cd[i];
                btn.classList.toggle('on-cd', cd > 0);
                let ov = btn.querySelector('.bf-cd-overlay');
                if (!ov) { ov = document.createElement('div'); ov.className = 'bf-cd-overlay'; btn.appendChild(ov); }
                ov.style.height = cd > 0 ? (cd / maxCds[i] * 100) + '%' : '0';
            });
        }

        // ── BOSS FIGHT RENDERING ──
        function bfRender() {
            const { ctx, W, H, eva, malus, shake, time } = bf;
            ctx.save();
            if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 15, (Math.random() - 0.5) * shake * 15);

            // Background
            const bg = ctx.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0, '#0a0118'); bg.addColorStop(0.5, '#0d0a1f'); bg.addColorStop(1, '#050510');
            ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

            // Stars
            bf.stars.forEach(s => {
                s.t += s.sp;
                ctx.fillStyle = `rgba(255,255,255,${0.35 + 0.25 * Math.sin(s.t)})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
            });

            // Ground
            ctx.fillStyle = 'rgba(201,168,76,0.15)';
            ctx.fillRect(0, H * 0.88, W, 1);

            // Particles behind
            bf.particles.forEach(p => {
                ctx.globalAlpha = p.t / p.maxT;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.t / p.maxT), 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Eva trail
            eva.trail.forEach(t => {
                ctx.globalAlpha = t.a * 0.5;
                ctx.fillStyle = '#c9a84c';
                ctx.beginPath(); ctx.arc(t.x, t.y, 4, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Draw Malus
            bfDrawMalus(ctx, malus, time);
            // Draw Eva
            bfDrawEva(ctx, eva, time);

            // Draw projectiles
            bf.projectiles.forEach(p => {
                if (p.type === 'orb') bfDrawOrb(ctx, p);
                else if (p.type === 'lightning') bfDrawLightning(ctx, p, eva, malus);
                else if (p.type === 'moon') bfDrawMoonBlade(ctx, p);
                else if (p.type === 'nova') bfDrawNova(ctx, p, malus);
            });

            // Damage texts
            bf.dmgTexts.forEach(d => {
                ctx.globalAlpha = Math.min(1, d.t * 2);
                ctx.fillStyle = d.color;
                ctx.font = `bold ${W * 0.04}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                ctx.shadowColor = d.color; ctx.shadowBlur = 8;
                ctx.fillText(d.text, d.x, d.y - (0.9 - d.t) * 40);
                ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1;

            // HUD
            bfDrawHUD(ctx, W, eva, malus);

            // Intro text
            if (bf.introTimer > 0) {
                ctx.globalAlpha = Math.min(1, bf.introTimer / 0.3);
                ctx.fillStyle = '#f2d06b';
                ctx.font = `bold ${W * 0.11}px Cinzel, serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = '#f2d06b'; ctx.shadowBlur = 30;
                ctx.fillText('COMBAT !', W / 2, H / 2);
                ctx.shadowBlur = 0;
            }

            // Flash overlay
            if (bf.flash > 0) {
                ctx.globalAlpha = bf.flash * 1.5;
                ctx.fillStyle = bf.flashColor;
                ctx.fillRect(0, 0, W, H);
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function bfDrawEva(ctx, eva, time) {
            ctx.save();
            ctx.translate(eva.x, eva.y);
            if (eva.inv > 0 && Math.sin(time * 20) > 0) ctx.globalAlpha = 0.3;

            ctx.shadowColor = '#f2d06b'; ctx.shadowBlur = 18;
            const g = ctx.createLinearGradient(0, -32, 0, 18);
            g.addColorStop(0, '#fef08a'); g.addColorStop(0.4, '#f2d06b'); g.addColorStop(1, '#c9a84c');
            ctx.fillStyle = g;

            // Head
            ctx.beginPath(); ctx.arc(0, -28, 7, 0, Math.PI * 2); ctx.fill();
            // Body
            ctx.beginPath();
            ctx.moveTo(-9, -20); ctx.quadraticCurveTo(-11, 0, -7, 16);
            ctx.lineTo(7, 16); ctx.quadraticCurveTo(11, 0, 9, -20);
            ctx.closePath(); ctx.fill();
            // Legs
            ctx.fillRect(-6, 16, 4, 10); ctx.fillRect(2, 16, 4, 10);

            // Hair
            ctx.strokeStyle = '#fef08a'; ctx.lineWidth = 1.5; ctx.shadowBlur = 8;
            for (let i = 0; i < 3; i++) {
                const off = Math.sin(time * 3 + i) * 4;
                ctx.beginPath();
                ctx.moveTo(eva.facing > 0 ? -4 : 4, -33);
                ctx.quadraticCurveTo(eva.facing * (-12 - i * 4) + off, -28 + i * 3, eva.facing * (-8 - i * 6), -18 + i * 5);
                ctx.stroke();
            }

            // Attack arc
            if (eva.atk) {
                ctx.globalAlpha = 1 - eva.atk.t / eva.atk.dur;
                ctx.strokeStyle = eva.atk.type === 'lightning' ? '#facc15' : eva.atk.type === 'moon' ? '#93c5fd' : '#fb923c';
                ctx.lineWidth = 2.5; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 20;
                ctx.beginPath();
                const sa = -Math.PI / 2 + (eva.atk.t / eva.atk.dur) * Math.PI;
                ctx.arc(0, -10, 22, sa - 0.6, sa + 0.6); ctx.stroke();
            }

            // Name label
            ctx.shadowBlur = 0; ctx.globalAlpha = 0.6;
            ctx.fillStyle = '#f2d06b';
            ctx.font = `600 ${bf.W * 0.025}px Cinzel, serif`;
            ctx.textAlign = 'center';
            ctx.fillText('EVA', 0, 38);

            ctx.restore();
        }

        function bfDrawMalus(ctx, malus, time) {
            ctx.save();
            const fy = Math.sin(time * 2) * 6;
            ctx.translate(malus.x, malus.y + fy);
            if (malus.hurt > 0) ctx.globalAlpha = 0.5 + Math.sin(time * 30) * 0.3;

            ctx.shadowColor = '#c4263d'; ctx.shadowBlur = 25;
            const ag = ctx.createRadialGradient(0, 0, 5, 0, 0, 38);
            ag.addColorStop(0, malus.phase ? '#8b1a2e' : '#2a0a30');
            ag.addColorStop(0.5, '#1a0520'); ag.addColorStop(1, 'rgba(10,2,15,0)');
            ctx.fillStyle = ag;

            // Body
            ctx.beginPath();
            for (let i = 0; i < 12; i++) {
                const a = (i / 12) * Math.PI * 2;
                const r = 28 + Math.sin(time * 3 + i * 1.5) * 7;
                const px = Math.cos(a) * r, py = Math.sin(a) * r * 0.8;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath(); ctx.fill();

            // Core
            ctx.fillStyle = malus.phase ? '#4a0f1a' : '#0d0418';
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 25, 0, 0, Math.PI * 2); ctx.fill();

            // Eyes
            ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 12;
            ctx.fillStyle = malus.hurt > 0 ? '#fff' : '#ef4444';
            ctx.beginPath(); ctx.ellipse(-7, -4, 3.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(7, -4, 3.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();

            // Tendrils
            ctx.strokeStyle = malus.phase ? 'rgba(196,38,61,0.5)' : 'rgba(74,16,37,0.3)';
            ctx.lineWidth = 1.5; ctx.shadowBlur = 4;
            for (let i = 0; i < 4; i++) {
                const a = (i / 4) * Math.PI + Math.PI * 0.5, w = Math.sin(time * 2 + i * 2) * 8;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 22, Math.sin(a) * 18);
                ctx.quadraticCurveTo(Math.cos(a) * 36 + w, Math.sin(a) * 32, Math.cos(a) * 45 + w * 1.5, Math.sin(a) * 42);
                ctx.stroke();
            }

            // Name label
            if (malus.hp > 0) {
                ctx.shadowBlur = 0; ctx.globalAlpha = 0.6;
                ctx.fillStyle = '#c4263d';
                ctx.font = `600 ${bf.W * 0.025}px Cinzel, serif`;
                ctx.textAlign = 'center';
                ctx.fillText('MALUS', 0, 45);
            }
            ctx.restore();
        }

        function bfDrawOrb(ctx, p) {
            ctx.save(); ctx.translate(p.x, p.y);
            const g = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
            g.addColorStop(0, '#c4263d'); g.addColorStop(0.5, '#8b1a2e'); g.addColorStop(1, 'rgba(139,26,46,0)');
            ctx.shadowColor = '#c4263d'; ctx.shadowBlur = 12;
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function bfDrawLightning(ctx, p, eva, malus) {
            if (p.t > p.dur) return;
            ctx.save();
            ctx.globalAlpha = 1 - p.t / p.dur;
            ctx.strokeStyle = '#facc15'; ctx.lineWidth = 2.5;
            ctx.shadowColor = '#facc15'; ctx.shadowBlur = 18;
            ctx.beginPath(); ctx.moveTo(eva.x, eva.y - 22);
            for (let i = 1; i <= 6; i++) {
                const r = i / 6;
                ctx.lineTo(eva.x + (malus.x - eva.x) * r + (Math.random() - 0.5) * 28,
                    (eva.y - 22) + (malus.y - eva.y + 22) * r + (Math.random() - 0.5) * 12);
            }
            ctx.stroke();
            ctx.lineWidth = 1; ctx.globalAlpha *= 0.5;
            ctx.beginPath(); ctx.moveTo(eva.x + 3, eva.y - 20);
            for (let i = 1; i <= 6; i++) {
                const r = i / 6;
                ctx.lineTo(eva.x + (malus.x - eva.x) * r + (Math.random() - 0.5) * 35,
                    (eva.y - 20) + (malus.y - eva.y + 20) * r + (Math.random() - 0.5) * 18);
            }
            ctx.stroke(); ctx.restore();
        }

        function bfDrawMoonBlade(ctx, p) {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(bf.time * 8);
            ctx.shadowColor = '#93c5fd'; ctx.shadowBlur = 18;
            ctx.fillStyle = '#bfdbfe';
            ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI);
            ctx.arc(4, 0, p.r * 0.7, Math.PI, 0, true);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#dbeafe'; ctx.beginPath(); ctx.arc(0, 0, p.r * 0.4, 0, Math.PI); ctx.fill();
            ctx.restore();
        }

        function bfDrawNova(ctx, p, malus) {
            ctx.save();
            if (p.t < 0.2) {
                const r = p.t / 0.2;
                ctx.globalAlpha = r; ctx.fillStyle = '#fb923c';
                ctx.shadowColor = '#f2d06b'; ctx.shadowBlur = 30 * r;
                ctx.beginPath(); ctx.arc(p.x, p.y, 14 * r, 0, Math.PI * 2); ctx.fill();
            } else {
                const r = (p.t - 0.2) / (p.dur - 0.2), rad = 18 + r * 55;
                ctx.globalAlpha = 1 - r;
                const g = ctx.createRadialGradient(malus.x, malus.y, 0, malus.x, malus.y, rad);
                g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#fef08a');
                g.addColorStop(0.6, '#f2d06b'); g.addColorStop(1, 'rgba(242,208,107,0)');
                ctx.fillStyle = g; ctx.shadowColor = '#f2d06b'; ctx.shadowBlur = 35;
                ctx.beginPath(); ctx.arc(malus.x, malus.y, rad, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#fef08a'; ctx.lineWidth = 1.5;
                for (let i = 0; i < 8; i++) {
                    const a = (i / 8) * Math.PI * 2 + bf.time * 3;
                    ctx.beginPath(); ctx.moveTo(malus.x, malus.y);
                    ctx.lineTo(malus.x + Math.cos(a) * rad * 1.3, malus.y + Math.sin(a) * rad * 1.3);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        function bfDrawHUD(ctx, W, eva, malus) {
            const bw = W * 0.35, bh = 8, y = 14, pad = 10;
            ctx.shadowBlur = 0;
            // Eva HP
            ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(pad, y, bw, bh);
            const eg = ctx.createLinearGradient(pad, 0, pad + bw, 0);
            eg.addColorStop(0, '#f2d06b'); eg.addColorStop(1, '#c9a84c');
            ctx.fillStyle = eg; ctx.fillRect(pad, y, bw * Math.max(0, eva.hp / eva.maxHp), bh);
            ctx.strokeStyle = 'rgba(201,168,76,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(pad, y, bw, bh);
            ctx.fillStyle = '#f2d06b'; ctx.font = `600 ${W * 0.024}px Inter, sans-serif`;
            ctx.textAlign = 'left'; ctx.fillText(`Eva  ${eva.hp}/${eva.maxHp}`, pad, y - 3);
            // Malus HP
            const mx = W - pad - bw;
            ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(mx, y, bw, bh);
            const mg = ctx.createLinearGradient(mx, 0, mx + bw, 0);
            mg.addColorStop(0, '#c4263d'); mg.addColorStop(1, '#8b1a2e');
            ctx.fillStyle = mg; ctx.fillRect(mx, y, bw * Math.max(0, malus.hp / malus.maxHp), bh);
            ctx.strokeStyle = 'rgba(196,38,61,0.4)'; ctx.strokeRect(mx, y, bw, bh);
            ctx.fillStyle = '#ef4444'; ctx.textAlign = 'right';
            ctx.fillText(`Malus  ${malus.hp}/${malus.maxHp}`, W - pad, y - 3);
        }

        /* ─────────────────────────────────────────────────────────────
           BOOT 🚀
        ────────────────────────────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
