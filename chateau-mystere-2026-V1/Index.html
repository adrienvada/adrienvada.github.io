        .date-picker-input {
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            display: block;
            padding: 10px 14px;
            font-size: 1.1rem;
            font-family: var(--font-display);
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            color: var(--clr-gold-bright);
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: var(--radius-md);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            color-scheme: dark;
            -webkit-appearance: none;
            appearance: none;
        }

        .date-picker-input:focus {
            border-color: var(--clr-gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15), 0 0 20px rgba(201, 168, 76, 0.1);
        }

        .date-picker-input.error {
            border-color: var(--error-red);
            box-shadow: 0 0 0 4px var(--error-red-dim);
            animation: shake 0.5s ease;
        }

        .date-picker-input.correct {
            border-color: var(--neon-green);
            box-shadow: 0 0 0 4px #10b98122;
        }

        /* ────────────────────────── COUNTER PICKER (COMBINATION LOCK) ──────────────── */
        .counter-picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin: 24px auto;
            position: relative;
            max-width: 280px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(201, 168, 76, 0.3);
            border-radius: var(--radius-lg);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .counter-picker-container::before {
            content: '';
            position: absolute;
            left: 10px;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            height: 48px;
            border-top: 1.5px solid rgba(242, 208, 107, 0.5);
            border-bottom: 1.5px solid rgba(242, 208, 107, 0.5);
            background: rgba(201, 168, 76, 0.08);
            pointer-events: none;
            border-radius: 4px;
            z-index: 1;
        }

        .counter-picker-container.error {
            border-color: var(--error-red);
            box-shadow: 0 0 0 4px var(--error-red-dim), inset 0 0 20px rgba(0, 0, 0, 0.8);
            animation: shake 0.5s ease;
        }

        .counter-wheel {
            position: relative;
            width: 60px;
            height: 144px;
            /* Show exactly 3 items: 48px * 3 = 144px */
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            z-index: 2;
        }

        .counter-wheel::-webkit-scrollbar {
            display: none;
        }

        .counter-wheel-scroll {
            padding: 48px 0;
            /* padding equal to item height so first and last item can center */
        }

        .counter-item {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-muted);
            scroll-snap-align: center;
            transition: color 0.2s, transform 0.2s, text-shadow 0.2s;
            user-select: none;
            cursor: pointer;
        }

        .counter-item.active {
            color: var(--clr-gold-bright);
            text-shadow: 0 0 10px rgba(242, 208, 107, 0.6);
            transform: scale(1.15);
        }

        /* ────────────────────────── SLOTS PICKER (FRUIT SLOT MACHINE) ──────────────── */
        .slots-picker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 24px auto;
            max-width: 440px;
        }

        .slots-headers {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 320px;
            margin-bottom: 6px;
            color: var(--text-muted);
            opacity: 0.5;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .slots-headers span {
            flex: 1;
            text-align: center;
        }

        .slots-picker-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            position: relative;
            width: 100%;
            max-width: 320px;
            padding: 12px 10px;
            background: linear-gradient(145deg, rgba(15, 12, 25, 0.85), rgba(5, 5, 12, 0.95));
            border: 2px solid rgba(201, 168, 76, 0.45);
            border-radius: var(--radius-lg);
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9), 0 0 20px rgba(201, 168, 76, 0.15);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .slots-picker-container::before {
            content: '';
            position: absolute;
            left: 8px;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            height: 48px;
            border-top: 2px solid rgba(242, 208, 107, 0.75);
            border-bottom: 2px solid rgba(242, 208, 107, 0.75);
            background: linear-gradient(90deg, rgba(201, 168, 76, 0.05) 0%, rgba(201, 168, 76, 0.18) 50%, rgba(201, 168, 76, 0.05) 100%);
            pointer-events: none;
            border-radius: 6px;
            box-shadow: 0 0 12px rgba(242, 208, 107, 0.2);
            z-index: 1;
        }

        .slots-picker-container.error {
            border-color: var(--error-red);
            box-shadow: 0 0 0 4px var(--error-red-dim), inset 0 0 20px rgba(0, 0, 0, 0.8);
            animation: shake 0.5s ease;
        }

        .slots-picker-container .counter-wheel {
            flex: 1;
            width: auto;
            min-width: 75px;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }

        .slots-picker-container .counter-item {
            font-size: 2.1rem;
            white-space: nowrap;
        }

        .slots-picker-container .counter-item.active {
            transform: scale(1.25);
            filter: drop-shadow(0 0 10px rgba(242, 208, 107, 0.75));
        }

        /* ────────────────────────── HINT COUNTER BADGE ─────────────────────── */
        .hint-counter {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-left: var(--gap-sm);
        }

        .hint-counter .count {
            color: var(--accent-violet);
            font-weight: 800;
        }

        /* ────────────────────────── GEMS PUZZLE (Enigma 5) ─────────────────────── */
        .gems-puzzle-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto var(--gap-lg);
            user-select: none;
            -webkit-user-select: none;
        }

        .gems-puzzle-container img {
            width: 100%;
            display: block;
            border-radius: var(--radius-md);
        }

        .gem-hotspot {
            position: absolute;
            width: 11%;
            height: 11%;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            z-index: 5;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
            transform: rotate(45deg);
        }

        .gem-hotspot::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 6px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .gem-hotspot:hover {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: rotate(45deg) scale(1.15);
        }

        .gem-hotspot.selected {
            border-color: rgba(254, 240, 138, 0.9);
            box-shadow: 0 0 20px rgba(254, 240, 138, 0.6), 0 0 40px rgba(201, 168, 76, 0.3);
            animation: gem-pulse 1.5s ease-in-out infinite;
            transform: rotate(45deg) scale(1.1);
        }

        .gem-hotspot.selected::before {
            border-color: rgba(254, 240, 138, 0.4);
        }

        .gem-hotspot.correct {
            border-color: var(--neon-green) !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.7), 0 0 50px rgba(16, 185, 129, 0.3) !important;
            animation: gem-success 0.6s ease forwards !important;
        }

        .gem-hotspot.wrong {
            border-color: var(--error-red) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.7), 0 0 50px rgba(239, 68, 68, 0.3) !important;
            animation: shake 0.5s ease, gem-wrong-fade 0.8s ease 0.5s forwards !important;
        }

        @keyframes gem-pulse {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(254, 240, 138, 0.6), 0 0 40px rgba(201, 168, 76, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(254, 240, 138, 0.9), 0 0 60px rgba(201, 168, 76, 0.5);
            }
        }

        @keyframes gem-success {
            0% {
                transform: rotate(45deg) scale(1.1);
            }

            50% {
                transform: rotate(45deg) scale(1.25);
            }

            100% {
                transform: rotate(45deg) scale(1.1);
            }
        }

        @keyframes gem-wrong-fade {
            to {
                border-color: transparent;
                box-shadow: none;
            }
        }

        @keyframes gem-pop-in {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .gems-selection-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: var(--gap-md) auto;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            max-width: 300px;
            width: fit-content;
            min-width: 80px;
            min-height: 66px;
            box-sizing: border-box;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gem-slot {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px dashed rgba(201, 168, 76, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .gem-slot.filled {
            border-style: solid;
            border-color: rgba(201, 168, 76, 0.6);
            background: rgba(201, 168, 76, 0.1);
        }

        .gem-slot-separator {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .gems-instruction {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: var(--gap-sm);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .gems-reset-btn {
            display: block;
            margin: var(--gap-sm) auto 0;
            padding: 6px 16px;
            font-size: 0.72rem;
            font-family: var(--font-ui);
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }

        .gems-reset-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-secondary);
        }

        /* ────────────────────────── GPS PROXIMITY PUZZLE ─────────────────────── */
        .proximity-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--gap-md);
            margin: var(--gap-md) auto;
            max-width: 360px;
        }

        .proximity-radar {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, rgba(5, 5, 15, 0.9) 70%);
            border: 2px solid rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.8s ease, border-color 0.8s ease, box-shadow 0.8s ease;
            overflow: hidden;
        }

        .proximity-radar::before {
            content: '';
            position: absolute;
            inset: 15%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        .proximity-radar::after {
            content: '';
            position: absolute;
            inset: 35%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }

        .proximity-radar .radar-sweep {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(255, 255, 255, 0.06) 30deg, transparent 60deg);
            animation: radar-spin 3s linear infinite;
        }

        @keyframes radar-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .proximity-distance {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .proximity-distance-value {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            color: #93c5fd;
            text-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
            transition: color 0.8s ease, text-shadow 0.8s ease;
            line-height: 1;
        }

        .proximity-distance-unit {
            font-family: var(--font-ui);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .proximity-coords {
            font-family: var(--font-ui);
            font-size: 0.72rem;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
            text-align: center;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            line-height: 1.6;
            letter-spacing: 0.5px;
            width: 100%;
            transition: border-color 0.5s ease;
        }

        .proximity-status {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-align: center;
            transition: color 0.5s ease;
            min-height: 1.4em;
        }

        .proximity-status.searching {
            animation: pulse-text 2s ease-in-out infinite;
        }

        @keyframes pulse-text {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .proximity-widget.frozen .proximity-radar {
            border-color: var(--neon-green) !important;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.5), 0 0 80px rgba(16, 185, 129, 0.2) !important;
        }

        .proximity-widget.frozen .radar-sweep {
            animation: none;
        }

        .proximity-widget.frozen .proximity-distance-value {
            color: var(--neon-green) !important;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.6) !important;
        }

        .proximity-widget.frozen .proximity-coords {
            border-color: rgba(16, 185, 129, 0.4);
        }

        .proximity-error-msg {
            font-family: var(--font-ui);
            font-size: 0.82rem;
            color: var(--error-red);
            text-align: center;
            padding: 12px;
            background: var(--error-red-dim);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            display: none;
        }

        .proximity-error-msg.visible {
            display: block;
        }

        .proximity-accuracy {
            font-family: var(--font-ui);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 4px;
        }

        /* ────────────────────────── PIANO PUZZLE ────────────────────────── */
        .piano-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 24px auto;
            max-width: 440px;
            width: 100%;
        }

        .piano-keyboard {
            display: flex;
            position: relative;
            width: 340px;
            height: 220px;
            margin: 20px auto;
            padding: 10px;
            background: rgba(15, 12, 25, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            border: 2px solid rgba(201, 168, 76, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(201, 168, 76, 0.15);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .piano-sound-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 auto 6px;
            padding: 7px 16px;
            background: rgba(15, 12, 25, 0.55);
            border: 1px solid rgba(201, 168, 76, 0.35);
            border-radius: 50px;
            color: rgba(201, 168, 76, 0.65);
            font-family: var(--font-body, sans-serif);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.3s ease;
            width: fit-content;
            text-transform: uppercase;
        }

        .piano-sound-toggle:hover {
            border-color: rgba(201, 168, 76, 0.7);
            color: rgba(201, 168, 76, 1);
            background: rgba(201, 168, 76, 0.08);
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.15);
        }

        .piano-sound-toggle.active {
            border-color: rgba(201, 168, 76, 0.8);
            color: rgba(201, 168, 76, 1);
            background: rgba(201, 168, 76, 0.12);
            box-shadow: 0 0 16px rgba(201, 168, 76, 0.2);
        }

        .piano-sound-toggle .psound-icon {
            font-size: 1rem;
            line-height: 1;
        }

        .piano-keyboard.disabled {
            pointer-events: none;
        }

        .piano-key {
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .piano-key.white {
            width: 40px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 0 0 6px 6px;
            z-index: 1;
            position: relative;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .piano-key.white.active {
            background: rgba(201, 168, 76, 0.2);
            box-shadow: inset 0 0 15px rgba(201, 168, 76, 0.4);
        }

        .piano-key.black {
            width: 24px;
            height: 120px;
            background: rgba(10, 8, 16, 0.95);
            border: 1px solid rgba(201, 168, 76, 0.45);
            border-radius: 0 0 4px 4px;
            z-index: 5;
            position: absolute;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .piano-key.black.active {
            background: rgba(201, 168, 76, 0.5);
            box-shadow: inset 0 0 10px rgba(242, 208, 107, 0.7);
        }

        .piano-key.success-active {
            background: linear-gradient(135deg, var(--clr-gold), var(--clr-gold-bright)) !important;
            border-color: var(--clr-gold-bright) !important;
            animation: pulseGoldKey 1s infinite alternate;
            z-index: 6;
        }

        .piano-key.success-active .key-label {
            color: #fff !important;
            opacity: 1 !important;
            font-weight: 700;
        }

        .key-label {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-display);
            font-size: 1.15rem;
            color: var(--clr-gold);
            opacity: 0.07;
            pointer-events: none;
            transition: opacity 0.3s, color 0.3s;
        }

        @keyframes pulseGoldKey {
            from {
                box-shadow: 0 0 15px rgba(242, 208, 107, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.7);
            }

            to {
                box-shadow: 0 0 30px rgba(242, 208, 107, 0.95), inset 0 0 15px rgba(255, 255, 255, 1);
            }
        }

        /* ──────────────────────── VICTORY ADDITIONS (CYLUMES & VIENS SEULE) ────────────────────────── */
        .victory-image-wrapper {
            position: relative;
            margin: var(--gap-md) auto var(--gap-lg) auto;
            max-width: 100%;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeInScale 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .victory-image-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.85);
        }

        .victory-image {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .viens-seule-container {
            position: relative;
            margin: var(--gap-lg) auto 0 auto;
            width: 380px;
            max-width: 100%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        #viens-seule-canvas {
            display: block;
            max-width: 100%;
            height: auto;
            overflow: visible;
        }

        /* Ambient glow under the canvas particles */
        .viens-seule-container::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 45px;
            background: radial-gradient(ellipse, rgba(16, 185, 129, 0.12), rgba(196, 116, 140, 0.08), transparent 70%);
            filter: blur(14px);
            z-index: 1;
            pointer-events: none;
            animation: bgGlowPulse 8s ease-in-out infinite alternate;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.96);
                filter: blur(8px);
            }

            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        @keyframes bgGlowPulse {
            0% {
                transform: scale(0.85);
                opacity: 0.4;
            }

            100% {
                transform: scale(1.25);
                opacity: 0.8;
            }
        }

        /* ────────────────────────── HANGMAN PUZZLE ────────────────────────── */
        .hangman-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 16px auto;
            max-width: 480px;
            width: 100%;
        }

        .hangman-heart-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 14px auto 18px;
            width: 100px;
            height: 100px;
        }

        .hangman-heart {
            width: 82px;
            height: 82px;
            color: var(--clr-gold);
            filter: drop-shadow(0 0 16px rgba(201, 168, 76, 0.65));
            transition: color 0.3s ease, filter 0.3s ease;
        }

        .hangman-heart.error-shake {
            color: #ef4444 !important;
            filter: drop-shadow(0 0 22px rgba(239, 68, 68, 0.9)) !important;
            animation: shake 0.5s ease-in-out;
        }

        .hangman-error-float {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ef4444;
            font-weight: 800;
            font-size: 1.3rem;
            text-shadow: 0 0 12px rgba(239, 68, 68, 0.85);
            pointer-events: none;
            z-index: 10;
            animation: hangmanErrorFloat 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes hangmanErrorFloat {
            0% {
                opacity: 0;
                transform: translate(-50%, -30%) scale(0.75);
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -70%) scale(1.15);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -210%) scale(0.95);
            }
        }

        .hangman-word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px 5px;
            margin: 6px auto 24px;
            max-width: 450px;
            width: 100%;
        }

        .hangman-letter-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 26px;
            height: 40px;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--clr-gold-bright);
            border-bottom: 3px solid var(--clr-gold);
            user-select: none;
            transition: transform 0.25s ease, color 0.25s ease;
        }

        .hangman-letter-box.hyphen {
            border-bottom: none;
            color: var(--clr-gold);
            width: 16px;
            font-size: 1.4rem;
        }

        .hangman-letter-box.revealed {
            animation: hangmanLetterPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes hangmanLetterPop {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hangman-keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 460px;
            margin: 8px auto 6px;
            padding: 0 2px;
        }

        .hangman-keyboard-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }

        .hangman-key {
            flex: 1;
            height: 46px;
            min-width: 28px;
            max-width: 42px;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            background: var(--bg-card-hover);
            color: var(--text-primary);
            font-size: 1.08rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
            transition: all 0.2s ease;
            padding: 0;
        }

        .hangman-key:active:not(:disabled) {
            transform: scale(0.92);
            background: var(--clr-gold);
            color: #000;
        }

        .hangman-key:disabled {
            opacity: 0.35;
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.25);
            cursor: default;
            box-shadow: none;
            transform: none;
        }

        .hangman-key.guessed-correct:disabled {
            opacity: 0.85;
            background: rgba(201, 168, 76, 0.22);
            border-color: var(--clr-gold);
            color: var(--clr-gold-bright);
        }

        .hangman-key.guessed-wrong:disabled {
            opacity: 0.35;
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.25);
            color: rgba(239, 68, 68, 0.6);
        }

        @media (max-width: 420px) {
            .hangman-letter-box {
                width: 17px;
                height: 35px;
                font-size: 1.12rem;
                border-bottom-width: 2.5px;
            }

            .hangman-letter-box.hyphen {
                width: 11px;
            }

            .hangman-word-container {
                gap: 6px 3px;
            }

            .hangman-keyboard-row {
                gap: 3px;
            }

            .hangman-key {
                height: 44px;
                min-width: 24px;
                font-size: 1rem;
            }
        }

        /* ───────────────────────── GAMIFICATION & AUDIO CSS ───────────────────────── */
        .achievement-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100000;
            background: rgba(15, 23, 42, 0.95);
            border: 1.5px solid var(--clr-gold-bright);
            box-shadow: 0 10px 30px rgba(201, 168, 76, 0.35);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #fff;
            font-family: var(--font-ui);
            animation: toast-slide-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            max-width: 360px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        @keyframes toast-slide-in {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.9);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toast-slide-out {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
        }

        .achievement-toast-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 8px rgba(242, 208, 107, 0.6));
        }

        .achievement-toast-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--clr-gold-bright);
            margin-bottom: 2px;
        }

        .achievement-toast-desc {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .cursor-star {
            position: fixed;
            pointer-events: none;
            z-index: 999999;
            color: #facc15;
            font-size: 14px;
            transform: translate(-50%, -50%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease-out;
            text-shadow: 0 0 6px rgba(250, 204, 21, 0.8);
        }

        .achievements-modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
            margin-top: 20px;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .achievement-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .achievement-item.unlocked {
            background: rgba(201, 168, 76, 0.08);
            border-color: rgba(201, 168, 76, 0.5);
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.15);
        }

        .achievement-item.unlocked .ach-icon {
            filter: drop-shadow(0 0 8px rgba(242, 208, 107, 0.8));
        }

        .achievement-item:not(.unlocked) {
            opacity: 0.5;
            filter: grayscale(1);
        }

        /* ─────────────────────────────────────────────────────────────
           PORTAL SHOCKWAVE & GOLDEN SCAN (PROPOSITION 1)
        ────────────────────────────────────────────────────────────── */
        .portal-shockwave-container {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .portal-bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(242, 208, 107, 0.28) 0%, rgba(201, 168, 76, 0.12) 45%, transparent 80%);
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }

        .portal-ring {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 3px solid rgba(242, 208, 107, 0.45);
            box-shadow: 0 0 35px 10px rgba(242, 208, 107, 0.35), inset 0 0 20px rgba(255, 232, 152, 0.25);
            opacity: 0;
            transform: scale(1);
        }

        .portal-scan-beam {
            position: absolute;
            left: 0;
            right: 0;
            top: -30px;
            height: 18px;
            background: linear-gradient(to bottom, transparent, rgba(255, 232, 152, 0.8), rgba(242, 208, 107, 0.65), transparent);
            box-shadow: 0 0 40px 14px rgba(242, 208, 107, 0.5);
            opacity: 0;
        }

        .portal-active .portal-bg-glow {
            opacity: 1;
            transition: opacity 0.2s ease-in;
        }

        .portal-active .portal-ring {
            animation: portal-ring-expand 0.55s cubic-bezier(0.1, 0.85, 0.2, 1) forwards;
        }

        .portal-active .portal-scan-beam {
            animation: portal-scan-sweep 0.65s cubic-bezier(0.25, 1, 0.5, 1) 0.1s forwards;
        }

        @keyframes portal-ring-expand {
            0% {
                opacity: 0.65;
                transform: scale(1);
                border-color: rgba(242, 208, 107, 0.55);
                border-width: 4px;
            }

            50% {
                opacity: 0.4;
                border-color: rgba(242, 208, 107, 0.35);
                border-width: 2px;
            }

            100% {
                opacity: 0;
                transform: scale(140);
                border-color: rgba(242, 208, 107, 0.1);
                border-width: 1px;
            }
        }

        @keyframes portal-scan-sweep {
            0% {
                opacity: 0;
                top: -30px;
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 0.9;
            }

            100% {
                opacity: 0;
                top: 105%;
            }
        }

        .enigma-portal-reveal {
            animation: portal-card-reveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes portal-card-reveal {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
                box-shadow: 0 0 65px 20px rgba(242, 208, 107, 0.75);
                border-color: #ffe898;
            }

            40% {
                box-shadow: 0 0 50px 14px rgba(242, 208, 107, 0.55);
                border-color: var(--clr-gold-bright);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.85), 0 0 35px rgba(201, 168, 76, 0.15), inset 0 0 50px rgba(5, 4, 10, 0.9);
                border-color: rgba(201, 168, 76, 0.45);
            }
        }
    </style>
</head>

<body>
    <canvas id="stars-canvas"></canvas>
    <div class="hero-bg" id="hero-bg"></div>

    <!-- ═══════════════════════ FIXED HEADER ═══════════════════════ -->
    <header id="header" class="hidden">
        <div class="header-inner">
            <div id="header-chrono-wrap" class="hidden" style="position: relative;">
                <div class="chrono-label">Temps restant</div>
                <div id="chrono" class="chrono">72:00:00</div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px; margin-left: auto;">
                <div id="errors-badge" class="step-badge hidden"
                    style="border-color: rgba(239, 68, 68, 0.3); color: var(--text-secondary); position: relative;"
                    title="Nombre total d'erreurs commises">
                    <span id="errors-badge-content" style="display: inline-flex; align-items: center; gap: 4px;">❌ <span
                            id="error-total-count" style="color: var(--error-red); font-weight: 700;">0</span></span>
                </div>
                <div id="hints-badge" class="step-badge hidden"
                    style="border-color: rgba(201, 168, 76, 0.3); color: var(--text-secondary); position: relative;"
                    title="Nombre total d'indices utilisés">
                    <span id="hints-badge-content" style="display: inline-flex; align-items: center; gap: 4px;">💡 <span
                            id="hint-total-count"
                            style="color: var(--clr-gold-bright); font-weight: 700;">0</span></span>
                </div>
                <div id="step-badge" class="step-badge">
                    Étape <span class="current" id="step-current">1</span><span id="step-total-wrap" class="hidden"
                        style="display: inline-block;">/<span id="step-total">1</span></span>
                </div>
                <div id="achievements-badge" class="step-badge"
                    style="border-color: rgba(201, 168, 76, 0.4); color: var(--text-secondary); cursor: pointer;"
                    onclick="ChateauAchievements.showModal()" title="Consulter la galerie des succès">
                    <span style="display: inline-flex; align-items: center; gap: 4px;">🏆 <span id="achievements-count"
                            style="color: var(--clr-gold-bright); font-weight: 700;">0</span></span>
                </div>
                <div id="audio-toggle-btn" class="step-badge"
                    style="border-color: rgba(201, 168, 76, 0.4); color: var(--text-secondary); cursor: pointer; padding: 6px 10px;"
                    onclick="ChateauAudio.showMenu(event)" title="Régler le volume sonore (Musique & SFX)">
                    <span id="audio-icon" style="font-size: 0.9rem;">🔊</span>
                </div>
            </div>
        </div>
    </header>
    <div id="progress-bar-wrapper" class="hidden">
        <div id="progress-bar" style="width: 0%;"></div>
    </div>

    <!-- ═══════════════════════ MAIN APP ═══════════════════════════ -->
    <main id="app"></main>

    <!-- ═══════════════════════ LIGHTBOX MODAL & ZOOM ═══════════════════════ -->
    <div id="image-lightbox" onclick="handleLightboxBackgroundClick(event)"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.92); z-index: 10000; display: none; align-items: center; justify-content: center; overflow: hidden; backdrop-filter: blur(8px); user-select: none;">

        <div class="lightbox-close-btn" onclick="closeLightbox()" title="Fermer (Échap)">&times;</div>

        <div class="lightbox-zoom-controls" onclick="event.stopPropagation()">
            <button onclick="zoomLightbox(-0.5)" title="Dézoomer">−</button>
            <span id="zoom-level-display">100%</span>
            <button onclick="zoomLightbox(0.5)" title="Zoomer">+</button>
            <button onclick="resetLightboxZoom()" title="Réinitialiser le zoom">↺</button>
        </div>

        <div id="lightbox-img-wrapper"
            style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <img id="lightbox-img" src="" alt="Enigma Image" onclick="toggleImageZoom(event)"
                style="max-width: 95%; max-height: 95vh; border-radius: 8px; box-shadow: 0 0 30px rgba(201, 168, 76, 0.4); object-fit: contain; transform: scale(1) translate(0px, 0px); transition: transform 0.3s ease; cursor: zoom-in; transform-origin: center center;">
        </div>
    </div>

    <!-- ═══════════════════════ AUDIO SETTINGS MODAL ═══════════════════════ -->
    <div id="audio-settings-modal" onclick="if(event.target===this) ChateauAudio.closeMenu()"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 22, 0.92); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 20px;">
        <div class="enigma-card"
            style="max-width: 460px; width: 100%; display: flex; flex-direction: column; position: relative; border: 1px solid rgba(201, 168, 76, 0.4); box-shadow: var(--shadow-gold), var(--shadow-card); background: var(--bg-card-solid); border-radius: var(--radius-lg); padding: 28px;">
            <div class="lightbox-close-btn" onclick="ChateauAudio.closeMenu()" title="Fermer"
                style="position: absolute; top: 16px; right: 16px; cursor: pointer;">&times;</div>
            <h2
                style="color: var(--clr-gold-bright); font-size: 1.5rem; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; font-family: var(--font-display);">
                🔊 Réglages Audio</h2>
            <p style="color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 24px;">Ajustez l'ambiance sonore
                et les effets de l'aventure.</p>

            <!-- Music Volume Slider -->
            <div
                style="margin-bottom: 20px; background: rgba(15, 16, 53, 0.6); padding: 18px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <span
                        style="display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--clr-cream); font-family: var(--font-ui);">
                        <span style="font-size: 1.2rem;">🎵</span> Musique d'ambiance
                    </span>
                    <span id="music-vol-display"
                        style="color: var(--clr-gold-bright); font-weight: 700; font-family: var(--font-ui); background: rgba(201, 168, 76, 0.15); padding: 3px 10px; border-radius: 6px; font-size: 0.9rem;">30%</span>

        const LS_KEY_ERROR_BUBBLE = 'escapeGame_errorBubbleShown';

        /* ─────────────────────────────────────────────────────────────
           STATE
        ────────────────────────────────────────────────────────────── */
        let currentIndex = 0;
        let startTime = null;
        let timerInterval = null;
        let lockInterval = null;
        let hintsUsed = {};  // { enigmeId: [0, 1] }  — tabs revealed
        let totalHintsCount = 0; // Compteur global d'indices demandés
        let totalErrorsCount = 0; // Compteur global d'erreurs commises

        /* ─────────────────────────────────────────────────────────────
           DOM REFS
        ────────────────────────────────────────────────────────────── */
        const $app = document.getElementById('app');
        const $header = document.getElementById('header');
        const $progressW = document.getElementById('progress-bar-wrapper');
        const $progress = document.getElementById('progress-bar');
        const $chrono = document.getElementById('chrono');
        const $stepCur = document.getElementById('step-current');
        const $stepTotal = document.getElementById('step-total');
        const $debugPanel = document.getElementById('debug-panel');

        // Raccourci clavier Alt+D ou Ctrl+Shift+D pour activer/désactiver le debug
        window.addEventListener('keydown', (e) => {
            if ((e.altKey && e.key.toLowerCase() === 'd') || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'd')) {
                DEBUG = !DEBUG;
                if ($debugPanel) {
                    $debugPanel.classList.toggle('visible', DEBUG);
                    if (DEBUG) initDebugSelect();
                }
                alert(DEBUG ? "🛠️ Mode Debug ACTIVÉ ! (Menu en bas à droite)" : "🔒 Mode Debug DÉSACTIVÉ");
                renderEnigma(currentIndex);
            }
        });

        /* ─────────────────────────────────────────────────────────────
           MOTEUR SONORE CHIPTUNE & FÉERIQUE (Web Audio API)
        ────────────────────────────────────────────────────────────── */
        const ChateauAudio = {
            ctx: null,
            muted: localStorage.getItem('escapeGame_audioMuted') === 'true',
            musicVolume: localStorage.getItem('escapeGame_musicVolume') !== null ? parseFloat(localStorage.getItem('escapeGame_musicVolume')) / 100 : 0.30,
            sfxVolume: localStorage.getItem('escapeGame_sfxVolume') !== null ? parseFloat(localStorage.getItem('escapeGame_sfxVolume')) / 100 : 0.50,
            ambientAudio: null,
            currentLoopFile: null,
            _interactionListenerAdded: false,
            lastUnlockTime: 0,
            lastErrorTime: 0,
            init() {
                if (!this.ctx) {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (AudioCtx) this.ctx = new AudioCtx();
                }
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
                if (!this.ambientAudio) {
                    this.ambientAudio = new Audio();
                    this.ambientAudio.loop = true;
                    this.updateMusicVolume();
                }
                if (!this._interactionListenerAdded) {
                    this._interactionListenerAdded = true;
                    const startOnInteract = () => {
                        if (this.ctx && this.ctx.state === 'suspended') {
                            this.ctx.resume();
                        }
                        this.tryPlayAmbience();
                    };
                    window.addEventListener('click', startOnInteract, { passive: true });
                    window.addEventListener('touchstart', startOnInteract, { passive: true });
                    window.addEventListener('keydown', startOnInteract, { passive: true });
                }
                this.updateIcon();
            },
            getLoopFileForEnigma(index) {
                let id = typeof index === 'number' ? index + 1 : (typeof currentIndex === 'number' ? currentIndex + 1 : 1);
                if (typeof enigmes !== 'undefined' && typeof index === 'number' && enigmes[index] && enigmes[index].id) {
                    id = enigmes[index].id;
                } else if (typeof enigmes !== 'undefined' && typeof currentIndex === 'number' && enigmes[currentIndex] && enigmes[currentIndex].id) {
                    id = enigmes[currentIndex].id;
                }
                if (id < 4) return 'assets/sons/boucle 1.mp3';
                if (id < 8) return 'assets/sons/boucle 2.mp3';
                if (id < 15) return 'assets/sons/boucle 3.mp3';
                if (id === 15) return 'assets/sons/boucle 4 boss.mp3';
                return 'assets/sons/boucle 5 final.mp3';
            },
            updateAmbience(index) {
                this.init();
                const targetFile = this.getLoopFileForEnigma(index);
                if (this.currentLoopFile !== targetFile) {
                    this.currentLoopFile = targetFile;
                    if (this.ambientAudio) {
                        this.ambientAudio.src = targetFile;
                        this.ambientAudio.loop = true;
                        this.tryPlayAmbience();
                    }
                } else {
                    this.tryPlayAmbience();
                }
            },
            tryPlayAmbience() {
                if (!this.ambientAudio || !this.currentLoopFile) return;
                this.updateMusicVolume();
                if (this.muted || this.musicVolume <= 0) {
                    this.ambientAudio.pause();
                } else {
                    if (this.ambientAudio.paused) {
                        this.ambientAudio.play().catch(e => {
                            // En attente d'une interaction utilisateur globale pour déclencher l'audio
                        });
                    }
                }
            },
            updateMusicVolume() {
                if (this.ambientAudio) {
                    this.ambientAudio.volume = this.muted ? 0 : this.musicVolume;
                }
            },
            toggleMute() {
                this.init();
                this.muted = !this.muted;
                localStorage.setItem('escapeGame_audioMuted', this.muted);
                this.updateIcon();
                this.tryPlayAmbience();
                this.playClick(true);
                this.syncMenuUI();
            },
            toggleMuteFromMenu() {
                this.toggleMute();
            },
            setMusicVolume(val) {
                const vol = Math.max(0, Math.min(100, parseInt(val, 10))) / 100;
                this.musicVolume = vol;
                localStorage.setItem('escapeGame_musicVolume', Math.round(vol * 100));
                if (vol > 0 && this.muted) {
                    this.muted = false;
                    localStorage.setItem('escapeGame_audioMuted', this.muted);
                    this.updateIcon();
                }
                this.updateMusicVolume();
                this.tryPlayAmbience();
                const disp = document.getElementById('music-vol-display');
                if (disp) disp.textContent = Math.round(vol * 100) + '%';
                this.syncMenuUI();
            },
            setSfxVolume(val) {
                const vol = Math.max(0, Math.min(100, parseInt(val, 10))) / 100;
                this.sfxVolume = vol;
                localStorage.setItem('escapeGame_sfxVolume', Math.round(vol * 100));
                if (vol > 0 && this.muted) {
                    this.muted = false;
                    localStorage.setItem('escapeGame_audioMuted', this.muted);
                    this.updateIcon();
                }
                const disp = document.getElementById('sfx-vol-display');
                if (disp) disp.textContent = Math.round(vol * 100) + '%';
                this.playClick(true);
                this.syncMenuUI();
            },
            showMenu(e) {
                if (e) e.stopPropagation();
                this.init();
                const modal = document.getElementById('audio-settings-modal');
                if (!modal) return;
                this.syncMenuUI();
                modal.style.display = 'flex';
            },
            closeMenu() {
                const modal = document.getElementById('audio-settings-modal');
                if (modal) modal.style.display = 'none';
            },
            syncMenuUI() {
                const musicSlider = document.getElementById('music-vol-slider');
                const musicDisp = document.getElementById('music-vol-display');
                if (musicSlider && document.activeElement !== musicSlider) musicSlider.value = Math.round(this.musicVolume * 100);
                if (musicDisp) musicDisp.textContent = Math.round(this.musicVolume * 100) + '%';

                const sfxSlider = document.getElementById('sfx-vol-slider');
                const sfxDisp = document.getElementById('sfx-vol-display');
                if (sfxSlider && document.activeElement !== sfxSlider) sfxSlider.value = Math.round(this.sfxVolume * 100);
                if (sfxDisp) sfxDisp.textContent = Math.round(this.sfxVolume * 100) + '%';

                const muteBtn = document.getElementById('audio-menu-mute-btn');
                if (muteBtn) {
                    muteBtn.innerHTML = this.muted
                        ? `<span>🔊</span> <span>Réactiver le son</span>`
                        : `<span>🔇</span> <span>Couper tout le son</span>`;
                }
            },
            updateIcon() {
                const icon = document.getElementById('audio-icon');
                if (icon) icon.textContent = this.muted ? '🔇' : '🔊';
            },
            _getSfxMult() {
                return this.muted ? 0 : (this.sfxVolume !== undefined ? this.sfxVolume : 0.5) / 0.5;
            },
            _playTone(freq, type, dur, gainVal = 0.1, freqEnd = null, forcePlay = false) {
                if (this.muted && !forcePlay) return;
                this.init();
                if (!this.ctx) return;
                const mult = forcePlay && this.muted ? 1 : this._getSfxMult();
                if (mult <= 0 && !forcePlay) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    if (freqEnd !== null) {
                        osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), this.ctx.currentTime + dur);
                    }
                    gain.gain.setValueAtTime(gainVal * mult, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + dur);
                } catch (e) { }
            },
            playClick(forcePlay = false) { this._playTone(600, 'sine', 0.03, 0.05, 300, forcePlay); },
            playLockTick() { this._playTone(850, 'triangle', 0.02, 0.04, 400); },
            playSuccess(force = false) {
                if (this.muted && !force) return;
                const now = Date.now();
                const playWav = force || (now - this.lastUnlockTime > 1500);
                if (playWav) {
                    this.lastUnlockTime = now;
                    try {
                        const audio = new Audio('assets/sons/unlocked.wav');
                        const mult = force && this.muted ? 1 : (this.muted ? 0 : (this.sfxVolume !== undefined ? this.sfxVolume / 0.7 : 1));
                        audio.volume = Math.min(1, Math.max(0, 0.85 * mult));
                        if (audio.volume > 0 || force) {
                            audio.play().catch(e => { });
                        }
                    } catch (e) { }
                }
            },
            playError(force = false) {
                if (this.muted && !force) return;
                const now = Date.now();
                const playWav = force || (now - this.lastErrorTime > 1200);
                if (playWav) {
                    this.lastErrorTime = now;
                    try {
                        const audio = new Audio('assets/sons/locked.wav');
                        const mult = force && this.muted ? 1 : (this.muted ? 0 : (this.sfxVolume !== undefined ? this.sfxVolume / 0.7 : 1));
                        audio.volume = Math.min(1, Math.max(0, 0.85 * mult));
                        if (audio.volume > 0 || force) {
                            audio.play().catch(e => { });
                        }
                    } catch (e) { }
                }
            },
            playAchievement() {
                if (this.muted) return;
                this.playClick();
            },
            playChiptuneError() {
                if (this.muted) return;
                this.init();
                if (!this.ctx) return;
                this._playTone(150, 'sawtooth', 0.25, 0.15, 60);
                setTimeout(() => this._playTone(130, 'sawtooth', 0.25, 0.15, 50), 100);
            },
            playLaser() { this._playTone(1100, 'square', 0.15, 0.06, 180); },
            playHit() { this._playTone(180, 'triangle', 0.15, 0.12, 40); },
            playBossHit() {
                if (this.muted) return;
                this.init();
                if (!this.ctx) return;
                this._playTone(320, 'sawtooth', 0.22, 0.12, 50);
                this._playTone(140, 'square', 0.18, 0.1, 40);
            },
            playBreak() {
                if (this.muted) return;
                this.init();
                if (!this.ctx) return;
                [400, 320, 240, 160].forEach((freq, idx) => {
                    setTimeout(() => this._playTone(freq, 'sawtooth', 0.2, 0.15, freq * 0.5), idx * 80);
                });
            },
            playVictory() {
                if (this.muted) return;
                this.init();
                if (!this.ctx) return;
                const notes = [523.25, 659.25, 783.99, 659.25, 1046.50];
                const delays = [0, 120, 240, 360, 500];
                const durs = [0.2, 0.2, 0.2, 0.2, 0.6];
                notes.forEach((freq, i) => {
                    setTimeout(() => this._playTone(freq, 'sine', durs[i], 0.14), delays[i]);
                });
            }
        };

        /* ─────────────────────────────────────────────────────────────
           TRAÎNÉE D'ÉTOILLES AU CURSEUR / TACTILE
        ────────────────────────────────────────────────────────────── */
        const ChateauCursor = {
            lastTime: 0,
            init() {
                const spawn = (x, y) => {
                    const now = performance.now();
                    if (now - this.lastTime < 35) return;
                    this.lastTime = now;
                    const el = document.createElement('div');
                    el.className = 'cursor-star';
                    el.textContent = ['✦', '✧', '★', '◇'][Math.floor(Math.random() * 4)];
                    el.style.left = x + 'px';
                    el.style.top = y + 'px';
                    el.style.color = Math.random() < 0.5 ? '#facc15' : '#c9a84c';
                    el.style.fontSize = (10 + Math.random() * 8) + 'px';
                    document.body.appendChild(el);
                    requestAnimationFrame(() => {
                        el.style.transform = `translate(${(Math.random() - 0.5) * 36}px, ${-20 - Math.random() * 25}px) scale(0.2) rotate(${(Math.random() - 0.5) * 180}deg)`;
                        el.style.opacity = '0';
                    });
                    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 600);
                };
                window.addEventListener('mousemove', (e) => spawn(e.clientX, e.clientY), { passive: true });
                window.addEventListener('touchmove', (e) => {
                    if (e.touches && e.touches[0]) spawn(e.touches[0].clientX, e.touches[0].clientY);
                }, { passive: true });
            }
        };

        /* ─────────────────────────────────────────────────────────────
           SYSTÈME DE SUCCÈS (ACHIEVEMENTS)
        ────────────────────────────────────────────────────────────── */
        const ChateauAchievements = {
            list: [
                { id: 'lynx', title: 'Mémoire amoureuse', desc: 'Résoudre l\'énigme 12 sans cliquer sur une mauvaise case', icon: '🎯' },
                { id: 'speed', title: 'Coup de foudre', desc: 'Résoudre une énigme rapidement en moins de 5 minutes', icon: '⚡' },
                { id: 'zero_fault', title: 'Parfaite moitié', desc: 'Résoudre une énigme sans faire d\'erreur', icon: '✨' },
                { id: 'intouchable', title: 'Intouchable', desc: 'Sortir du combat indemne', icon: '🛡️' },
                { id: 'orgasme_finish', title: 'L\'Amour Vaincra', desc: 'Donner le coup de grâce en utilisant l\'orgasme 💋', icon: '💋' },
                { id: 'curieux', title: 'Curieux', desc: 'Utiliser un indice', icon: '🔍' }
            ],
            unlocked: new Set(JSON.parse(localStorage.getItem('escapeGame_achievements') || '[]')),
            unlock(id) {
                if (this.unlocked.has(id)) return;
                const ach = this.list.find(a => a.id === id);
                if (!ach) return;
                this.unlocked.add(id);
                localStorage.setItem('escapeGame_achievements', JSON.stringify([...this.unlocked]));
                ChateauAudio.playAchievement();
                this.updateCount();
                this.showToast(ach);
            },
            updateCount() {
                const el = document.getElementById('achievements-count');
                if (el) el.textContent = this.unlocked.size;
            },
            showToast(ach) {
                const toast = document.createElement('div');
                toast.className = 'achievement-toast';
                toast.innerHTML = `
                    <div class="achievement-toast-icon">${ach.icon}</div>
                    <div>
                        <div class="achievement-toast-title">🏆 Succès Déverrouillé !</div>
                        <div style="font-weight:700; color:#fff; font-size:0.86rem;">${ach.title}</div>
                        <div class="achievement-toast-desc">${ach.desc}</div>
                    </div>
                `;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.animation = 'toast-slide-out 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                    setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 400);
                }, 4500);
            },
            showModal() {
                const modal = document.getElementById('achievements-modal');
                const content = document.getElementById('achievements-modal-content');
                const progress = document.getElementById('ach-modal-progress');
                if (!modal || !content) return;
                if (progress) progress.textContent = `${this.unlocked.size}/${this.list.length}`;
                content.innerHTML = this.list.map(ach => {
                    const isUnlocked = this.unlocked.has(ach.id);
                    return `
                        <div class="achievement-item ${isUnlocked ? 'unlocked' : ''}">
                            <div class="ach-icon" style="font-size: 2.2rem;">${isUnlocked ? ach.icon : '🔒'}</div>
                            <div>
                                <div style="font-weight: 800; font-size: 0.96rem; color: ${isUnlocked ? 'var(--clr-gold-bright)' : 'var(--text-primary)'}; margin-bottom: 4px;">
                                    ${ach.title}
                                </div>
                                <div style="font-size: 0.78rem; color: var(--text-secondary); line-height: 1.3;">
                                    ${ach.desc}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                modal.style.display = 'flex';
                ChateauAudio.playClick();
            },
            closeModal() {
                const modal = document.getElementById('achievements-modal');
                if (modal) modal.style.display = 'none';
                ChateauAudio.playClick();
            }
        };

        /* ─────────────────────────────────────────────────────────────
           INIT
        ────────────────────────────────────────────────────────────── */
        function init() {
            // Debug
            if (DEBUG && $debugPanel) {
                $debugPanel.classList.add('visible');
                initDebugSelect();
            }

            // Init starfield background
            if (typeof initStars === 'function') {
                initStars('stars-canvas', { count: 120, twinkle: true });
            }
            ChateauAudio.updateIcon();
            ChateauCursor.init();
            ChateauAchievements.updateCount();

            // Guard: no enigmes
            if (!enigmes.length) {
                renderEmpty();
                return;
            }

            // Restore state
            const savedIndex = localStorage.getItem(LS_KEY_INDEX);
            const savedStart = localStorage.getItem(LS_KEY_START);
            const savedHints = localStorage.getItem(LS_KEY_HINTS);
            const savedDone = localStorage.getItem(LS_KEY_FINISHED);

            if (savedHints) {
                try { hintsUsed = JSON.parse(savedHints); } catch (e) { hintsUsed = {}; }
            }

            const savedHintsTotal = localStorage.getItem(LS_KEY_HINTS_TOTAL);
            if (savedHintsTotal) {
                totalHintsCount = parseInt(savedHintsTotal, 10) || 0;
            }

            const savedErrorsTotal = localStorage.getItem(LS_KEY_ERRORS_TOTAL);
            if (savedErrorsTotal) {
                totalErrorsCount = parseInt(savedErrorsTotal, 10) || 0;
            }

            if (savedDone === 'victory') {
                renderVictory();
                return;
            }

            if (savedStart) {
                startTime = parseInt(savedStart, 10);
            }

            if (savedIndex !== null) {
                currentIndex = parseInt(savedIndex, 10);
                if (currentIndex >= enigmes.length) {
                    renderVictory();
                    return;
                }
            }

            // First visit — show welcome
            if (!savedStart) {
                renderWelcome();
                return;
            }

            // Resume
            showHeader();
            startChrono();
            renderEnigma(currentIndex);
        }

        /* ─────────────────────────────────────────────────────────────
           WELCOME
        ────────────────────────────────────────────────────────────── */

        </div>

            <div class="seal-container">
              <img src="assets/unlock_seal.jpg" alt="Commencer le jeu" class="seal-img" onerror="this.src='assets/chateau%20de%20loin.jpg'">
            </div>
            <p class="seal-prompt">Alors prête ?</p>
          </div>

          <div class="footer-anniversary reveal" data-delay="4">
            <div class="heart-metal-container">
              <svg class="heart-svg" viewBox="0 0 24 24" fill="url(#gold-metal-grad)" stroke="#ffe898" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">

                  </linearGradient>
                </defs>
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                <path d="M12 17l-5-4.5C5 10.5 3.5 9 3.5 7.5 3.5 5.8 4.8 4.5 6.5 4.5c1.2 0 2.4.7 3 1.8l2.5 4.5 2.5-4.5c.6-1.1 1.8-1.8 3-1.8 1.7 0 3 1.3 3 3 0 1.5-1.5 3-3.5 5L12 17z" fill="none" stroke="rgba(255, 232, 152, 0.45)" stroke-width="0.5"/>

        }

        function startWelcomeSequence(overlay) {
            // On lance la musique dès le clic (qui est maintenant autorisé par le navigateur)
            ChateauAudio.updateAmbience(0);

            // Effet de fondu sur l'enveloppe
            overlay.style.opacity = '0';

            setTimeout(() => {
                overlay.remove();
                document.getElementById('welcome-content').style.display = 'block';

                // Lancement de l'animation d'écriture une fois l'écran révélé
                const twEl = document.getElementById('welcome-tw');
                if (twEl && typeof typewriter === 'function') {
                    typewriter(twEl, "Mon amour, pour notre anniversaire de rencontre, je t'ai préparé un Escape Game secret. \n Prends ton temps. \n Ou pas. \n Seule. Ou avec de l'aide. \n Fais comme tu veux. \n \n Ou comme tu peux...", 35, 400);

            }, 800);

        function startGame() {
            ChateauAudio.playSuccess(true);
            triggerPortalTransition();
            startTime = Date.now();
            localStorage.setItem(LS_KEY_START, startTime);
            localStorage.setItem(LS_KEY_INDEX, 0);
            showHeader();
            startChrono();
            renderEnigma(0);

        /* ─────────────────────────────────────────────────────────────
           HEADER / CHRONO
        ────────────────────────────────────────────────────────────── */
        function showHeader() {
            if ($header) $header.classList.remove('hidden');
            if ($progressW) $progressW.classList.remove('hidden');
            updateChronoVisibility();
            updateProgress();
