<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0f1d">
    <meta name="description"
        content="Escape Game interactif — Nuit électrique au château. Résous les énigmes avant la fin du temps imparti.">
    <title>🏰 Nuit Électrique au Château — Escape Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        /* ───────────────────────────── RESET & BASE ───────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Palette */
            --bg-deep: #0a0f1d;
            --bg-card: #1e2538cc;
            --bg-card-solid: #1e2538;
            --neon-green: #10b981;
            --neon-green-dim: #10b98155;
            --error-red: #ef4444;
            --error-red-dim: #ef444430;
            --accent-violet: #7c3aed;
            --accent-blue: #2563eb;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --border-subtle: #ffffff12;
            --glow-green: 0 0 20px #10b98144, 0 0 60px #10b98122;
            --glow-violet: 0 0 20px #7c3aed44, 0 0 60px #7c3aed22;

            /* Spacing */
            --gap-xs: 4px;
            --gap-sm: 8px;
            --gap-md: 16px;
            --gap-lg: 24px;
            --gap-xl: 32px;
            --gap-2xl: 48px;

            /* Radius */
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;

            /* Safe areas */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        html {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            overflow-x: hidden;
        }

        body {
            min-height: 100dvh;
            background: var(--bg-deep);
            position: relative;
        }

        /* Starfield background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1.5px 1.5px at 20% 30%, #ffffff22, transparent),
                radial-gradient(1px 1px at 40% 70%, #ffffff18, transparent),
                radial-gradient(1.2px 1.2px at 60% 20%, #ffffff15, transparent),
                radial-gradient(1px 1px at 80% 50%, #ffffff12, transparent),
                radial-gradient(1.8px 1.8px at 10% 80%, #ffffff10, transparent),
                radial-gradient(1px 1px at 90% 10%, #ffffff0d, transparent),
                radial-gradient(1.4px 1.4px at 50% 90%, #ffffff18, transparent),
                radial-gradient(1px 1px at 30% 50%, #ffffff10, transparent),
                radial-gradient(ellipse at 50% 0%, #1e1b4b33 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ───────────────────────── FIXED HEADER (Chrono) ──────────────────────── */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: calc(var(--safe-top) + var(--gap-sm)) var(--gap-md) var(--gap-sm);
            background: linear-gradient(180deg, #0a0f1dee 0%, #0a0f1dcc 70%, transparent 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 480px;
            margin: 0 auto;
        }

        .chrono {
            font-size: 1.55rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--neon-green);
            text-shadow: var(--glow-green);
            letter-spacing: 2px;
        }

        .chrono-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
        }

        .step-badge {
            display: flex;
            align-items: center;
            gap: var(--gap-xs);
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-subtle);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .step-badge .current {
            color: var(--neon-green);
            font-weight: 800;
        }

        /* Progress bar */
        #progress-bar-wrapper {
            position: fixed;
            top: calc(var(--safe-top) + 56px);
            left: 0;
            right: 0;
            z-index: 99;
            height: 3px;
            background: var(--border-subtle);
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-violet), var(--accent-blue), var(--neon-green));
            border-radius: 0 3px 3px 0;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 12px var(--neon-green-dim);
        }

        /* ────────────────────────── MAIN CONTENT  ──────────────────────────────── */
        #app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: calc(var(--safe-top) + 72px) var(--gap-md) calc(var(--safe-bottom) + var(--gap-xl));
            min-height: 100dvh;
        }

        /* ────────────────────────── ENIGMA CARD ───────────────────────────────── */
        .enigma-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: var(--gap-lg);
            animation: card-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .enigma-step {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-violet);
            margin-bottom: var(--gap-sm);
        }

        .enigma-title {
            font-size: 1.4rem;
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: var(--gap-md);
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .enigma-description {
            font-size: 0.92rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: var(--gap-lg);
        }

        .enigma-image {
            width: 100%;
            border-radius: var(--radius-md);
            margin-bottom: var(--gap-lg);
            border: 1px solid var(--border-subtle);
            object-fit: cover;
        }

        /* ───────────────────────── INPUT & BUTTONS ────────────────────────────── */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: var(--gap-sm);
            margin-bottom: var(--gap-md);
        }

        .input-answer {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-primary);
            background: #0d1117;
            border: 2px solid var(--border-subtle);
            border-radius: var(--radius-md);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-answer::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .input-answer:focus {
            border-color: var(--accent-violet);
            box-shadow: 0 0 0 4px #7c3aed22;
        }

        .input-answer.error {
            border-color: var(--error-red);
            box-shadow: 0 0 0 4px var(--error-red-dim);
            animation: shake 0.5s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-5px);
            }

            80% {
                transform: translateX(5px);
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--gap-sm);
            padding: 14px 24px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s, opacity 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            width: 100%;
            color: #fff;
            background: linear-gradient(135deg, var(--accent-violet) 0%, var(--accent-blue) 100%);
            box-shadow: 0 4px 20px #7c3aed33;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 30px #7c3aed55;
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Choice buttons for type "choice" */
        .choices-grid {
            display: flex;
            flex-direction: column;
            gap: var(--gap-sm);
            margin-bottom: var(--gap-md);
        }

        .btn-choice {
            width: 100%;
            padding: 14px 18px;
            font-size: 0.92rem;
            font-family: inherit;
            font-weight: 600;
            color: var(--text-primary);
            background: #0d1117;
            border: 2px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s, transform 0.15s;
            text-align: left;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-choice:active {
            transform: scale(0.98);
        }

        .btn-choice.selected {
            border-color: var(--accent-violet);
            background: #7c3aed18;
        }

        .btn-choice.correct {
            border-color: var(--neon-green);
            background: #10b98118;
        }

        .btn-choice.wrong {
            border-color: var(--error-red);
            background: var(--error-red-dim);
            animation: shake 0.5s ease;
        }

        /* ──────────────────────── FEEDBACK MESSAGE ────────────────────────────── */
        .feedback {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: var(--gap-md);
            display: none;
            animation: fade-in 0.3s ease;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.error {
            display: block;
            color: var(--error-red);
            background: var(--error-red-dim);
            border: 1px solid #ef444433;
        }

        .feedback.success {
            display: block;
            color: var(--neon-green);
            background: #10b98118;
            border: 1px solid #10b98133;
        }

        /* ────────────────────────── HINT SYSTEM ───────────────────────────────── */
        .hints-section {
            margin-top: var(--gap-lg);
            border-top: 1px solid var(--border-subtle);
            padding-top: var(--gap-md);
        }

        .hints-header {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: var(--gap-sm);
        }

        .hints-tabs {
            display: flex;
            gap: var(--gap-sm);
            margin-bottom: var(--gap-md);
        }

        .hint-tab {
            flex: 1;
            padding: 10px 8px;
            font-size: 0.72rem;
            font-family: inherit;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            background: transparent;
            border: 1.5px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
            text-align: center;
        }

        .hint-tab:hover {
            border-color: var(--text-muted);
        }

        .hint-tab.active {
            color: var(--accent-violet);
            border-color: var(--accent-violet);
            background: #7c3aed12;
        }

        .hint-tab.revealed {
            color: var(--text-secondary);
            border-color: var(--text-muted);
        }

        .hint-content {
            font-size: 0.88rem;
            line-height: 1.65;
            color: var(--text-secondary);
            padding: 14px 16px;
            background: #0d111788;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            display: none;
            animation: fade-in 0.4s ease;
        }

        .hint-content.visible {
            display: block;
        }

        .hint-locked {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.82rem;
            padding: 20px;
        }

        .hint-locked .lock-icon {
            display: block;
            font-size: 1.4rem;
            margin-bottom: var(--gap-xs);
        }

        /* ──────────────────────── TEMPORAL LOCK SCREEN ────────────────────────── */
        .lock-screen {
            text-align: center;
            padding: var(--gap-2xl) var(--gap-md);
        }

        .lock-screen .lock-icon-big {
            font-size: 4rem;
            margin-bottom: var(--gap-lg);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 0.7;
                filter: drop-shadow(0 0 8px var(--accent-violet));
            }

            50% {
                opacity: 1;
                filter: drop-shadow(0 0 20px var(--accent-violet));
            }
        }

        .lock-screen h2 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: var(--gap-sm);
        }

        .lock-screen p {
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.6;
            margin-bottom: var(--gap-lg);
        }

        .lock-countdown {
            display: flex;
            justify-content: center;
            gap: var(--gap-md);
        }

        .lock-countdown-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .lock-countdown-value {
            font-size: 2rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            color: var(--accent-violet);
            text-shadow: var(--glow-violet);
            min-width: 56px;
            padding: 10px 8px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
        }

        .lock-countdown-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        /* ────────────────────────── END SCREENS ───────────────────────────────── */
        .end-screen {
            text-align: center;
            padding: var(--gap-2xl) var(--gap-md);
            animation: card-in 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .end-screen .emoji-big {
            font-size: 5rem;
            margin-bottom: var(--gap-lg);
        }

        .end-screen h1 {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: var(--gap-md);
        }

        .end-screen p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 340px;
            margin: 0 auto var(--gap-lg);
        }

        .end-screen.victory h1 {
            background: linear-gradient(135deg, var(--neon-green), #34d399, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .end-screen.failure h1 {
            color: var(--error-red);
        }

        .success-stats {
            display: flex;
            justify-content: center;
            gap: var(--gap-lg);
            margin-bottom: var(--gap-lg);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: var(--glow-green);
        }

        .stat-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ────────────────────────── WELCOME SCREEN ────────────────────────────── */
        .welcome-screen {
            text-align: center;
            padding: var(--gap-2xl) 0;
            animation: card-in 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .welcome-screen .castle-icon {
            font-size: 5rem;
            margin-bottom: var(--gap-lg);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .welcome-screen h1 {
            font-size: 1.7rem;
            font-weight: 900;
            line-height: 1.25;
            margin-bottom: var(--gap-sm);
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-violet) 50%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-screen p {
            font-size: 0.92rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: var(--gap-lg);
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }

        .welcome-rules {
            text-align: left;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: var(--gap-md);
            margin-bottom: var(--gap-xl);
        }

        .welcome-rules li {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: var(--gap-sm);
            list-style: none;
            padding-left: 24px;
            position: relative;
        }

        .welcome-rules li::before {
            content: '⚡';
            position: absolute;
            left: 0;
        }

        .welcome-rules li:last-child {
            margin-bottom: 0;
        }

        /* ────────────────────────── DEBUG BUTTON ──────────────────────────────── */
        #debug-btn {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 16px);
            right: 16px;
            z-index: 200;
            padding: 10px 16px;
            font-size: 0.72rem;
            font-family: inherit;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fbbf24;
            background: #78350f;
            border: 2px solid #fbbf24;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: none;
            -webkit-tap-highlight-color: transparent;
        }

        #debug-btn.visible {
            display: block;
        }

        /* ────────────────────────── DRAWING CANVAS ────────────────────────────── */
        .drawing-area {
            margin-bottom: var(--gap-md);
        }

        .drawing-area canvas {
            width: 100%;
            height: 240px;
            border-radius: var(--radius-md);
            border: 2px solid var(--border-subtle);
            background: #0d1117;
            touch-action: none;
        }

        .drawing-toolbar {
            display: flex;
            gap: var(--gap-sm);
            margin-top: var(--gap-sm);
        }

        .drawing-toolbar .btn {
            flex: 1;
            padding: 10px;
            font-size: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        /* ────────────────────────── CONFETTI (Victory) ────────────────────────── */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 300;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110dvh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ────────────────────────── UTILITY ───────────────────────────────────── */
        .hidden {
            display: none !important;
        }

        .mt-sm {
            margin-top: var(--gap-sm);
        }

        .mt-md {
            margin-top: var(--gap-md);
        }

        .mt-lg {
            margin-top: var(--gap-lg);
        }

        /* ────────────────────────── DATE PICKER ──────────────────────────── */
        .date-picker-group {
            display: flex;
            flex-direction: column;
            gap: var(--gap-sm);
            margin-bottom: var(--gap-md);
        }

        .date-picker-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-primary);
            background: #0d1117;
            border: 2px solid var(--border-subtle);
            border-radius: var(--radius-md);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            color-scheme: dark;
            -webkit-appearance: none;
        }

        .date-picker-input:focus {
            border-color: var(--accent-violet);
            box-shadow: 0 0 0 4px #7c3aed22;
        }

        .date-picker-input.error {
            border-color: var(--error-red);
            box-shadow: 0 0 0 4px var(--error-red-dim);
            animation: shake 0.5s ease;
        }

        .date-picker-input.correct {
            border-color: var(--neon-green);
            box-shadow: 0 0 0 4px #10b98122;
        }

        /* ────────────────────────── HINT COUNTER BADGE ─────────────────────── */
        .hint-counter {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-left: var(--gap-sm);
        }

        .hint-counter .count {
            color: var(--accent-violet);
            font-weight: 800;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <!-- ═══════════════════════ FIXED HEADER ═══════════════════════ -->
    <header id="header" class="hidden">
        <div class="header-inner">
            <div>
                <div class="chrono-label">Temps restant</div>
                <div id="chrono" class="chrono">72:00:00</div>
            </div>
            <div id="step-badge" class="step-badge">
                Étape <span class="current" id="step-current">1</span> / <span id="step-total">?</span>
            </div>
        </div>
    </header>
    <div id="progress-bar-wrapper" class="hidden">
        <div id="progress-bar" style="width: 0%;"></div>
    </div>

    <!-- ═══════════════════════ MAIN APP ═══════════════════════════ -->
    <main id="app"></main>

    <!-- ═══════════════════════ DEBUG BUTTON ════════════════════════ -->
    <button id="debug-btn" onclick="skipStep()">⚡ Passer l'étape</button>

    <!-- ═══════════════════════ JAVASCRIPT ══════════════════════════ -->
    <script>
        'use strict';

        /* ─────────────────────────────────────────────────────────────
           DONNÉES DES ÉNIGMES (à remplir)
           Structure de chaque objet :
           {
             id:               Number,
             type:             "text" | "gps" | "choice" | "drawing",
             titre:            String,
             description:      String,
             image:            String (optionnel, chemin vers l'image),
             reponseAttendue:  String (pour text/gps) ou String (pour choice),
             choix:            Array<String> (requis pour type "choice"),
             indices:          [String, String, String]
           }
        ────────────────────────────────────────────────────────────── */
        const enigmes = [
            // ── Exemple d'énigme « texte » ──
            // {
            //   id: 1,
            //   type: "text",
            //   titre: "Le portail du crépuscule",
            //   description: "En approchant de la grille rouillée du château, tu remarques une inscription gravée dans la pierre...\n\nQuel mot ouvre le portail ?",
            //   image: null,
            //   reponseAttendue: "LUMIERE",
            //   indices: [
            //     "C'est ce qui chasse les ténèbres…",
            //     "Thomas Edison en fut un maître.",
            //     "La réponse est : LUMIERE"
            //   ]
            // },

            // ── Exemple d'énigme « choix multiples » ──
            // {
            //   id: 2,
            //   type: "choice",
            //   titre: "La salle des blasons",
            //   description: "Quatre blasons ornent le mur. Un seul dissimule le mécanisme secret.",
            //   image: "assets/blasons.jpg",
            //   reponseAttendue: "Le Lion",
            //   choix: ["L'Aigle", "Le Lion", "Le Serpent", "Le Loup"],
            //   indices: [
            //     "Le courage est sa vertu…",
            //     "C'est le roi des animaux.",
            //     "La réponse est : Le Lion"
            //   ]
            // },
            {
                id: 1,
                type: "date",
                titre: "Premiers contacts",
                description: `<div style="text-align: center;">Bienvenu Eva,</div>Tu as été sélectionnée pour enquêter sur un des évènements les plus magiques et mystérieuses du château du Meux. On m'a dit que tu étais bien informée. Pour vérifier que tu es la bonne personne, merci de rentrer la date dont je parle.`,
                image: "assets/chateau de loin.jpg",
                reponseAttendue: ["2024-07-19", "2024-07-20", "2024-07-21"],
                indices: [
                    "Demander un indice à ce stade c'est abusé.",
                    "Franchement ?",
                    "Ca commençait le 19 juillet. Mais je donne pas l'année, faut pas pousser."
                ]
            },

            {
                id: 2,
                type: "choice",
                titre: "La coupe des couleurs",
                description: "Quatre blasons ornent le mur. Un seul dissimule le mécanisme secret.",
                image: "assets/blasons.jpg",
                reponseAttendue: "Le Lion",
                choix: ["L'Aigle", "Le Lion", "Le Serpent", "Le Loup"],
                indices: [
                    "Le courage est sa vertu…",
                    "C'est le roi des animaux.",
                    "La réponse est : Le Lion"
                ]
            },

            {
                id: 2,
                type: "choice",
                titre: "La coupe des couleurs",
                description: "Quatre blasons ornent le mur. Un seul dissimule le mécanisme secret.",
                image: "assets/blasons.jpg",
                reponseAttendue: "Le Lion",
                choix: ["L'Aigle", "Le Lion", "Le Serpent", "Le Loup"],
                indices: [
                    "Le courage est sa vertu…",
                    "C'est le roi des animaux.",
                    "La réponse est : Le Lion"
                ]
            },
        ];


        /* ─────────────────────────────────────────────────────────────
           CONFIGURATION
        ────────────────────────────────────────────────────────────── */
        const GAME_DURATION_MS = 72 * 60 * 60 * 1000;                       // 72 h
        const FINAL_UNLOCK_DATE = new Date('2026-07-19T02:00:00').getTime();  // Dimanche 19 juillet 2026, 02:00
        const DEBUG = new URLSearchParams(location.search).has('debug');
        const LS_KEY_INDEX = 'escapeGame_currentIndex';
        const LS_KEY_START = 'escapeGame_startTime';
        const LS_KEY_HINTS = 'escapeGame_hints';
        const LS_KEY_HINTS_TOTAL = 'escapeGame_hintsTotal';
        const LS_KEY_FINISHED = 'escapeGame_finished';

        /* ─────────────────────────────────────────────────────────────
           STATE
        ────────────────────────────────────────────────────────────── */
        let currentIndex = 0;
        let startTime = null;
        let timerInterval = null;
        let lockInterval = null;
        let hintsUsed = {};  // { enigmeId: [0, 1] }  — tabs revealed
        let totalHintsCount = 0; // Compteur global d'indices demandés

        /* ─────────────────────────────────────────────────────────────
           DOM REFS
        ────────────────────────────────────────────────────────────── */
        const $app = document.getElementById('app');
        const $header = document.getElementById('header');
        const $progressW = document.getElementById('progress-bar-wrapper');
        const $progress = document.getElementById('progress-bar');
        const $chrono = document.getElementById('chrono');
        const $stepCur = document.getElementById('step-current');
        const $stepTotal = document.getElementById('step-total');
        const $debugBtn = document.getElementById('debug-btn');

        /* ─────────────────────────────────────────────────────────────
           INIT
        ────────────────────────────────────────────────────────────── */
        function init() {
            // Debug
            if (DEBUG) $debugBtn.classList.add('visible');

            // Guard: no enigmes
            if (!enigmes.length) {
                renderEmpty();
                return;
            }

            // Restore state
            const savedIndex = localStorage.getItem(LS_KEY_INDEX);
            const savedStart = localStorage.getItem(LS_KEY_START);
            const savedHints = localStorage.getItem(LS_KEY_HINTS);
            const savedDone = localStorage.getItem(LS_KEY_FINISHED);

            if (savedHints) {
                try { hintsUsed = JSON.parse(savedHints); } catch (e) { hintsUsed = {}; }
            }

            const savedHintsTotal = localStorage.getItem(LS_KEY_HINTS_TOTAL);
            if (savedHintsTotal) {
                totalHintsCount = parseInt(savedHintsTotal, 10) || 0;
            }

            if (savedDone === 'victory') {
                renderVictory();
                return;
            }

            if (savedStart) {
                startTime = parseInt(savedStart, 10);
                // Check expiry
                if (!DEBUG && Date.now() - startTime >= GAME_DURATION_MS) {
                    renderFailure();
                    return;
                }
            }

            if (savedIndex !== null) {
                currentIndex = parseInt(savedIndex, 10);
                if (currentIndex >= enigmes.length) {
                    renderVictory();
                    return;
                }
            }

            // First visit — show welcome
            if (!savedStart) {
                renderWelcome();
                return;
            }

            // Resume
            showHeader();
            startChrono();
            renderEnigma(currentIndex);
        }

        /* ─────────────────────────────────────────────────────────────
           WELCOME
        ────────────────────────────────────────────────────────────── */
        function renderWelcome() {
            $app.innerHTML = `
        <div class="welcome-screen">
          <div class="castle-icon">🏰</div>
          <h1>Joyeux anniversaire !</h1>
          <p>Mon amour, pour notre anniversaire de rencontre, je t'ai préparé un Escape Game.</p>
          <p>Attention, lorsque l'aventure commencera, tu auras un temps imparti. Il faut réussir à résoudre toutes les énigmes à temps, sinon le trésor ne sera plus disponible....</p>

          <ul class="welcome-rules">
            <li>Résous chaque énigme pour débloquer la suivante</li>
            <li>Le chrono démarre dès que tu appuies sur « Commencer »</li>
          </ul>
          <button class="btn btn-primary" id="btn-start" onclick="startGame()">
            ⚡ Alors, prête ?
          </button>
        </div>
      `;
        }

        function startGame() {
            startTime = Date.now();
            localStorage.setItem(LS_KEY_START, startTime);
            localStorage.setItem(LS_KEY_INDEX, 0);
            showHeader();
            startChrono();
            renderEnigma(0);
        }

        /* ─────────────────────────────────────────────────────────────
           HEADER / CHRONO
        ────────────────────────────────────────────────────────────── */
        function showHeader() {
            $header.classList.remove('hidden');
            $progressW.classList.remove('hidden');
            $stepTotal.textContent = enigmes.length;
            updateProgress();
        }

        function updateProgress() {
            $stepCur.textContent = currentIndex + 1;
            const pct = (currentIndex / enigmes.length) * 100;
            $progress.style.width = pct + '%';
        }

        function startChrono() {
            if (timerInterval) clearInterval(timerInterval);
            tickChrono();
            timerInterval = setInterval(tickChrono, 1000);
        }

        function tickChrono() {
            const elapsed = Date.now() - startTime;
            const remaining = GAME_DURATION_MS - elapsed;

            if (remaining <= 0 && !DEBUG) {
                clearInterval(timerInterval);
                renderFailure();
                return;
            }

            const absRemaining = Math.max(0, remaining);
            const h = Math.floor(absRemaining / 3600000);
            const m = Math.floor((absRemaining % 3600000) / 60000);
            const s = Math.floor((absRemaining % 60000) / 1000);

            $chrono.textContent =
                String(h).padStart(2, '0') + ':' +
                String(m).padStart(2, '0') + ':' +
                String(s).padStart(2, '0');

            // Color urgency
            if (remaining < 3600000) {
                $chrono.style.color = 'var(--error-red)';
                $chrono.style.textShadow = '0 0 20px var(--error-red), 0 0 60px #ef444422';
            } else {
                $chrono.style.color = '';
                $chrono.style.textShadow = '';
            }
        }

        /* ─────────────────────────────────────────────────────────────
           RENDER ENIGMA
        ────────────────────────────────────────────────────────────── */
        function renderEnigma(index) {
            const e = enigmes[index];
            if (!e) return;

            // Temporal lock check for final enigma
            const isFinalEnigma = (index === enigmes.length - 1) && (enigmes.length > 1);
            if (isFinalEnigma && !DEBUG && Date.now() < FINAL_UNLOCK_DATE) {
                renderTemporalLock();
                return;
            }

            updateProgress();

            const imageHtml = e.image
                ? `<img src="${e.image}" alt="${e.titre}" class="enigma-image" loading="lazy">`
                : '';

            let interactionHtml = '';

            switch (e.type) {
                case 'date':
                    interactionHtml = `
            <div class="date-picker-group">
              <input type="date" class="date-picker-input" id="date-input">
            </div>
            <button class="btn btn-primary" id="btn-validate" onclick="validateDateAnswer()">
              Valider la date
            </button>
          `;
                    break;

                case 'choice':
                    interactionHtml = `
            <div class="choices-grid" id="choices-grid">
              ${(e.choix || []).map((c, i) => `
                <button class="btn-choice" id="choice-${i}" onclick="handleChoice(${i}, '${escapeAttr(c)}')">${c}</button>
              `).join('')}
            </div>
          `;
                    break;

                case 'drawing':
                    interactionHtml = `
            <div class="drawing-area">
              <canvas id="draw-canvas" width="600" height="480"></canvas>
              <div class="drawing-toolbar">
                <button class="btn" onclick="clearCanvas()">🗑 Effacer</button>
                <button class="btn" onclick="undoCanvas()">↩ Annuler</button>
              </div>
            </div>
            <div class="input-group">
              <input type="text" class="input-answer" id="answer-input"
                     placeholder="Ta réponse…"
                     autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <button class="btn btn-primary" id="btn-validate" onclick="validateAnswer()">
              Valider ma réponse
            </button>
          `;
                    break;

                case 'gps':
                case 'text':
                default:
                    interactionHtml = `
            <div class="input-group">
              <input type="text" class="input-answer" id="answer-input"
                     placeholder="Ta réponse…"
                     autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <button class="btn btn-primary" id="btn-validate" onclick="validateAnswer()">
              Valider ma réponse
            </button>
          `;
                    break;
            }

            $app.innerHTML = `
        <div class="enigma-card">
          <span class="enigma-step">Étape ${index + 1} sur ${enigmes.length}</span>
          <h1 class="enigma-title">${e.titre}</h1>
          <div class="enigma-description">${formatText(e.description)}</div>
          ${imageHtml}
          ${interactionHtml}
          <div class="feedback" id="feedback"></div>
          ${renderHints(e)}
        </div>
      `;

            // Focus input
            const input = document.getElementById('answer-input');
            if (input) {
                input.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter') validateAnswer();
                });
            }

            // Init drawing canvas
            if (e.type === 'drawing') initCanvas();
        }

        /* ─────────────────────────────────────────────────────────────
           HINTS SYSTEM
        ────────────────────────────────────────────────────────────── */
        function renderHints(enigme) {
            if (!enigme.indices || !enigme.indices.length) return '';

            const labels = ['Indice 1', 'Indice 2', 'Solution'];
            const revealed = hintsUsed[enigme.id] || [];

            // Progressive: tab i only visible if i===0 or tab i-1 already revealed
            const tabs = enigme.indices.map((_, i) => {
                const isRevealed = revealed.includes(i);
                const isUnlocked = (i === 0) || revealed.includes(i - 1);
                if (!isUnlocked) return ''; // Don't render the tab at all
                const cls = isRevealed ? 'revealed' : '';
                return `<button class="hint-tab ${cls}" id="hint-tab-${i}" onclick="revealHint(${enigme.id}, ${i})">${labels[i] || 'Indice ' + (i + 1)}</button>`;
            }).join('');

            const counterHtml = `<span class="hint-counter">(Total utilisés : <span class="count" id="hint-total-count">${totalHintsCount}</span>)</span>`;

            // Show the last revealed hint by default
            let contentHtml = '<div class="hint-locked" id="hint-body"><span class="lock-icon">🔒</span>Appuie sur un onglet pour révéler un indice</div>';
            if (revealed.length > 0) {
                const lastIdx = revealed[revealed.length - 1];
                contentHtml = `<div class="hint-content visible" id="hint-body">${formatText(enigme.indices[lastIdx])}</div>`;
            }

            return `
        <div class="hints-section">
          <div class="hints-header">💡 Besoin d'aide ? ${counterHtml}</div>
          <div class="hints-tabs" id="hints-tabs-container">${tabs}</div>
          ${contentHtml}
        </div>
      `;
        }

        function revealHint(enigmeId, hintIndex) {
            if (!hintsUsed[enigmeId]) hintsUsed[enigmeId] = [];
            if (!hintsUsed[enigmeId].includes(hintIndex)) {
                hintsUsed[enigmeId].push(hintIndex);
                localStorage.setItem(LS_KEY_HINTS, JSON.stringify(hintsUsed));

                // Incrémenter le compteur global
                totalHintsCount++;
                localStorage.setItem(LS_KEY_HINTS_TOTAL, totalHintsCount);
            }

            const enigme = enigmes.find(e => e.id === enigmeId);
            if (!enigme) return;

            // Update tab styling
            const tab = document.getElementById('hint-tab-' + hintIndex);
            if (tab) {
                // Remove active from all
                document.querySelectorAll('.hint-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active', 'revealed');
            }

            // Show content
            const body = document.getElementById('hint-body');
            if (body) {
                body.className = 'hint-content visible';
                body.innerHTML = formatText(enigme.indices[hintIndex]);
            }

            // Update counter in DOM
            const counterEl = document.getElementById('hint-total-count');
            if (counterEl) counterEl.textContent = totalHintsCount;

            // Reveal next tab if it exists and isn't already shown
            const nextIndex = hintIndex + 1;
            if (nextIndex < enigme.indices.length && !document.getElementById('hint-tab-' + nextIndex)) {
                const labels = ['Indice 1', 'Indice 2', 'Solution'];
                const container = document.getElementById('hints-tabs-container');
                if (container) {
                    const newBtn = document.createElement('button');
                    newBtn.className = 'hint-tab';
                    newBtn.id = 'hint-tab-' + nextIndex;
                    newBtn.textContent = labels[nextIndex] || 'Indice ' + (nextIndex + 1);
                    newBtn.onclick = () => revealHint(enigmeId, nextIndex);
                    newBtn.style.animation = 'fade-in 0.4s ease';
                    container.appendChild(newBtn);
                }
            }
        }

        /* ─────────────────────────────────────────────────────────────
           VALIDATE ANSWER
        ────────────────────────────────────────────────────────────── */
        function validateAnswer() {
            const input = document.getElementById('answer-input');
            if (!input) return;

            const answer = input.value.trim().toUpperCase();
            const expected = enigmes[currentIndex].reponseAttendue;
            const expectedStr = (typeof expected === 'string') ? expected.trim().toUpperCase() : '';

            if (answer === expectedStr) {
                showFeedback('success', '✅ Bonne réponse ! Bien joué.');
                input.disabled = true;
                const btn = document.getElementById('btn-validate');
                if (btn) btn.disabled = true;
                setTimeout(() => advanceToNext(), 1200);
            } else {
                showFeedback('error', '❌ Ce n\'est pas la bonne réponse. Essaie encore.');
                input.classList.add('error');
                setTimeout(() => input.classList.remove('error'), 600);
            }
        }

        function validateDateAnswer() {
            const input = document.getElementById('date-input');
            if (!input || !input.value) {
                showFeedback('error', '📅 Sélectionne une date dans le calendrier.');
                return;
            }

            const answer = input.value; // format YYYY-MM-DD
            const expected = enigmes[currentIndex].reponseAttendue;

            // reponseAttendue can be an array of accepted dates or a single string
            const acceptedDates = Array.isArray(expected) ? expected : [expected];

            if (acceptedDates.includes(answer)) {
                showFeedback('success', '✅ Bonne date ! Bien joué.');
                input.disabled = true;
                input.classList.add('correct');
                const btn = document.getElementById('btn-validate');
                if (btn) btn.disabled = true;
                setTimeout(() => advanceToNext(), 1200);
            } else {
                showFeedback('error', '❌ Ce n\'est pas la bonne date. Essaie encore.');
                input.classList.add('error');
                setTimeout(() => input.classList.remove('error'), 600);
            }
        }

        function handleChoice(index, value) {
            const expected = enigmes[currentIndex].reponseAttendue.trim().toUpperCase();
            const btn = document.getElementById('choice-' + index);

            if (value.trim().toUpperCase() === expected) {
                btn.classList.add('correct');
                showFeedback('success', '✅ Bonne réponse ! Bien joué.');
                // Disable all
                document.querySelectorAll('.btn-choice').forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; });
                setTimeout(() => advanceToNext(), 1200);
            } else {
                btn.classList.add('wrong');
                showFeedback('error', '❌ Mauvais choix. Essaie encore.');
                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 700);
            }
        }

        function showFeedback(type, message) {
            const $fb = document.getElementById('feedback');
            if (!$fb) return;
            $fb.className = 'feedback ' + type;
            $fb.textContent = message;
        }

        /* ─────────────────────────────────────────────────────────────
           ADVANCE
        ────────────────────────────────────────────────────────────── */
        function advanceToNext() {
            currentIndex++;
            localStorage.setItem(LS_KEY_INDEX, currentIndex);

            if (currentIndex >= enigmes.length) {
                localStorage.setItem(LS_KEY_FINISHED, 'victory');
                renderVictory();
            } else {
                renderEnigma(currentIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        /* ─────────────────────────────────────────────────────────────
           DEBUG — SKIP
        ────────────────────────────────────────────────────────────── */
        function skipStep() {
            advanceToNext();
        }

        /* ─────────────────────────────────────────────────────────────
           TEMPORAL LOCK
        ────────────────────────────────────────────────────────────── */
        function renderTemporalLock() {
            updateProgress();

            $app.innerHTML = `
        <div class="lock-screen">
          <div class="lock-icon-big">🔐</div>
          <h2>Étape finale verrouillée</h2>
          <p>L'ultime énigme sera déverrouillée à la date prévue. Patience, le moment approche…</p>
          <div class="lock-countdown" id="lock-countdown"></div>
          <button class="btn btn-primary mt-lg" onclick="resetGame()">🔄 Recommencer l'aventure</button>
        </div>
      `;

            if (lockInterval) clearInterval(lockInterval);
            tickLockCountdown();
            lockInterval = setInterval(tickLockCountdown, 1000);
        }

        function tickLockCountdown() {
            const diff = FINAL_UNLOCK_DATE - Date.now();
            if (diff <= 0) {
                clearInterval(lockInterval);
                renderEnigma(currentIndex);
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            const $lc = document.getElementById('lock-countdown');
            if (!$lc) return;

            $lc.innerHTML = `
        <div class="lock-countdown-unit">
          <div class="lock-countdown-value">${String(d).padStart(2, '0')}</div>
          <div class="lock-countdown-label">Jours</div>
        </div>
        <div class="lock-countdown-unit">
          <div class="lock-countdown-value">${String(h).padStart(2, '0')}</div>
          <div class="lock-countdown-label">Heures</div>
        </div>
        <div class="lock-countdown-unit">
          <div class="lock-countdown-value">${String(m).padStart(2, '0')}</div>
          <div class="lock-countdown-label">Minutes</div>
        </div>
        <div class="lock-countdown-unit">
          <div class="lock-countdown-value">${String(s).padStart(2, '0')}</div>
          <div class="lock-countdown-label">Secondes</div>
        </div>
      `;
        }

        /* ─────────────────────────────────────────────────────────────
           END SCREENS
        ────────────────────────────────────────────────────────────── */
        function renderVictory() {
            clearInterval(timerInterval);
            $header.classList.add('hidden');
            $progressW.classList.add('hidden');

            const elapsed = startTime ? Date.now() - startTime : 0;
            const totalH = Math.floor(elapsed / 3600000);
            const totalM = Math.floor((elapsed % 3600000) / 60000);
            const totalHintsCount = Object.values(hintsUsed).reduce((sum, arr) => sum + arr.length, 0);

            $app.innerHTML = `
        <div class="end-screen victory">
          <div class="emoji-big">🎉</div>
          <h1>Félicitations !</h1>
          <p>Tu as percé tous les mystères du château. L'aventure touche à sa fin… ou peut-être ne fait-elle que commencer.</p>
          <div class="success-stats">
            <div class="stat">
              <div class="stat-value">${totalH}h ${String(totalM).padStart(2, '0')}m</div>
              <div class="stat-label">Temps total</div>
            </div>
            <div class="stat">
              <div class="stat-value">${enigmes.length}</div>
              <div class="stat-label">Énigmes résolues</div>
            </div>
            <div class="stat">
              <div class="stat-value">${totalHintsCount}</div>
              <div class="stat-label">Indices utilisés</div>
            </div>
          </div>
          <button class="btn btn-primary" onclick="resetGame()">🔄 Recommencer</button>
        </div>
      `;

            spawnConfetti();
        }

        function renderFailure() {
            clearInterval(timerInterval);
            $header.classList.add('hidden');
            $progressW.classList.add('hidden');

            $app.innerHTML = `
        <div class="end-screen failure">
          <div class="emoji-big">💀</div>
          <h1>Temps écoulé…</h1>
          <p>Les portes du château se sont refermées à jamais. Le mystère reste entier. Peut-être auras-tu une autre chance…</p>
          <button class="btn btn-primary mt-lg" onclick="resetGame()">🔄 Recommencer</button>
        </div>
      `;
        }

        function renderEmpty() {
            $app.innerHTML = `
        <div class="end-screen">
          <div class="emoji-big">🏰</div>
          <h1>Nuit Électrique au Château</h1>
          <p>Les énigmes ne sont pas encore configurées. Remplissez le tableau <code>enigmes</code> dans le code source pour lancer l'aventure.</p>
        </div>
      `;
        }

        /* ─────────────────────────────────────────────────────────────
           RESET
        ────────────────────────────────────────────────────────────── */
        function resetGame() {
            // Supprimer toutes les clés du jeu dans localStorage
            Object.keys(localStorage)
                .filter(k => k.startsWith('escapeGame_'))
                .forEach(k => localStorage.removeItem(k));
            currentIndex = 0;
            startTime = null;
            hintsUsed = {};
            totalHintsCount = 0;
            location.reload();
        }

        /* ─────────────────────────────────────────────────────────────
           DRAWING CANVAS (for type "drawing")
        ────────────────────────────────────────────────────────────── */
        let canvasCtx = null;
        let isDrawing = false;
        let drawHistory = [];

        function initCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas) return;

            // Set actual size
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;

            canvasCtx = canvas.getContext('2d');
            canvasCtx.scale(2, 2);
            canvasCtx.strokeStyle = '#f1f5f9';
            canvasCtx.lineWidth = 3;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';

            // Save initial state
            drawHistory = [canvasCtx.getImageData(0, 0, canvas.width, canvas.height)];

            // Pointer events
            canvas.addEventListener('pointerdown', (e) => {
                isDrawing = true;
                canvasCtx.beginPath();
                const pos = getCanvasPos(canvas, e);
                canvasCtx.moveTo(pos.x, pos.y);
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!isDrawing) return;
                const pos = getCanvasPos(canvas, e);
                canvasCtx.lineTo(pos.x, pos.y);
                canvasCtx.stroke();
            });

            canvas.addEventListener('pointerup', () => {
                isDrawing = false;
                drawHistory.push(canvasCtx.getImageData(0, 0, canvas.width, canvas.height));
            });

            canvas.addEventListener('pointerleave', () => {
                isDrawing = false;
            });
        }

        function getCanvasPos(canvas, e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function clearCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas || !canvasCtx) return;
            canvasCtx.clearRect(0, 0, canvas.width / 2, canvas.height / 2);
            drawHistory = [canvasCtx.getImageData(0, 0, canvas.width, canvas.height)];
        }

        function undoCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas || !canvasCtx || drawHistory.length <= 1) return;
            drawHistory.pop();
            canvasCtx.putImageData(drawHistory[drawHistory.length - 1], 0, 0);
        }

        /* ─────────────────────────────────────────────────────────────
           CONFETTI 🎊
        ────────────────────────────────────────────────────────────── */
        function spawnConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            const colors = ['#10b981', '#7c3aed', '#2563eb', '#f59e0b', '#ef4444', '#ec4899', '#06b6d4'];

            for (let i = 0; i < 80; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (Math.random() * 8 + 6) + 'px';
                piece.style.height = (Math.random() * 8 + 6) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(piece);
            }

            setTimeout(() => container.remove(), 5000);
        }

        /* ─────────────────────────────────────────────────────────────
           UTILITIES
        ────────────────────────────────────────────────────────────── */
        function formatText(text) {
            return text.replace(/\n/g, '<br>');
        }

        function escapeAttr(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        /* ─────────────────────────────────────────────────────────────
           BOOT 🚀
        ────────────────────────────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
