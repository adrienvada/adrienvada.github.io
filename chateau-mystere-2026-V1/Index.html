            wrapper.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
            initBFGame(diff);
        }

        function initBFGame(diff) {
            const canvas = document.getElementById('bf-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const cw = canvas.parentElement.clientWidth;
            const ch = Math.min(cw * 1.35, window.innerHeight * 0.62);
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = cw * dpr;
            canvas.height = ch * dpr;
            canvas.style.height = ch + 'px';
            ctx.scale(dpr, dpr);
            const baseHP = Math.max(3, totalErrorsCount * totalHintsCount);
            const easyBonus = diff === 'easy' ? 10 : diff === 'normal' ? 5 : 0;
            const malusMult = diff === 'easy' ? 1 : diff === 'normal' ? 2 : 3;
            const evaMaxHp = 5 + easyBonus;
            const malusHP = Math.max(3, baseHP * malusMult);
            const diffLabel = diff === 'easy' ? '🌿 Facile' : diff === 'normal' ? '⚔️ Normal' : '🔥 Difficile';

            bf = {
                ctx, canvas, W: cw, H: ch, running: true, time: 0,
                shake: 0, flash: 0, flashColor: '#fff', introTimer: 1.5,
                difficulty: diff, diffLabel,
                qtes: [], // <-- AJOUT : Tableau pour stocker les pastilles actives
                qteSpawnTimer: 2.0 + Math.random() * 5, // <-- AJOUT : Délai avant la 1ère pastil
                eva: {
                    x: cw / 2, y: ch * 0.78, w: 28, h: 48,
                    speed: cw * 0.5, hp: evaMaxHp, maxHp: evaMaxHp,
                    dir: 0, facing: 1, inv: 0, atk: null,
                    cd: [0, 0, 0, 0], trail: [], anim: 0,
                    shield: { active: false, timer: 0, healAccum: 0 }
                },
                hitStopTimer: 0, zoomEffect: 0,
                malus: {
                    x: cw / 2, y: ch * 0.18, w: 45, h: 60,
                    hp: malusHP, maxHp: malusHP,
                    breakMax: Math.round(malusHP * 0.45), breakHp: 0, isStunned: false, stunTimer: 0,
                    atkTimer: 2.5, hurt: 0, anim: 0,
                    moveTarget: cw / 2, moveTimer: 0, phase: 0,
                    spiralAngle: 0, isPaused: false, pauseTimer: 0,
                    currentPattern: 'aimed', patternIndex: 0
                },
                projectiles: [], particles: [], dmgTexts: [],
                stars: Array.from({ length: 60 }, () => ({
                    x: Math.random() * cw, y: Math.random() * ch,
                    s: Math.random() * 1.8 + 0.3, t: Math.random() * 6.28,
                    sp: Math.random() * 0.02 + 0.005,
                    layer: Math.floor(Math.random() * 3)
                })),
                nebulae: Array.from({ length: 5 }, () => ({
                    x: Math.random() * cw, y: Math.random() * ch,
                    rx: 40 + Math.random() * 80, ry: 30 + Math.random() * 60,
                    color: ['rgba(139,26,46,0.04)', 'rgba(167,139,250,0.03)', 'rgba(201,168,76,0.03)',
                        'rgba(59,130,246,0.04)', 'rgba(244,114,182,0.03)'][Math.floor(Math.random() * 5)],
                    drift: (Math.random() - 0.5) * 8, phase: Math.random() * Math.PI * 2
                })),
                runes: Array.from({ length: 8 }, () => ({
                    x: Math.random() * cw, y: Math.random() * ch,
                    char: '✦⬡◇△⊕☆✧⟡'[Math.floor(Math.random() * 8)],
                    speed: 5 + Math.random() * 15, opacity: 0, fadeIn: true,
                    size: 6 + Math.random() * 8,
                    color: ['#c9a84c', '#a78bfa', '#93c5fd', '#f472b6'][Math.floor(Math.random() * 4)]
                })),
                input: { moveX: 0 }
            };
            setupBFInput();
            bf._lastT = performance.now();
            bf._raf = requestAnimationFrame(bfLoop);
        }

        function setupBFInput() {
            const base = document.getElementById('bf-joystick-base');
            const knob = document.getElementById('bf-joystick-knob');
            let joyActive = false, joyCX = 0;
            if (base) {
                const jStart = (e) => {
                    e.preventDefault(); joyActive = true;
                    joyCX = base.getBoundingClientRect().left + base.clientWidth / 2;
                    jMove(e);
                };
                const jMove = (e) => {
                    if (!joyActive || !bf) return;
                    const t = e.touches ? e.touches[0] : e;
                    const dx = t.clientX - joyCX;
                    const max = base.clientWidth / 2 - 12;
                    const cl = Math.max(-max, Math.min(max, dx));
                    if (knob) knob.style.transform = `translateX(${cl}px)`;
                    bf.input.moveX = cl / max;
                };
                const jEnd = () => {
                    joyActive = false;
                    if (knob) knob.style.transform = '';
                    if (bf) bf.input.moveX = 0;
                };
                base.addEventListener('touchstart', jStart, { passive: false });
                base.addEventListener('touchmove', jMove, { passive: false });
                base.addEventListener('touchend', jEnd);
                base.addEventListener('touchcancel', jEnd);
                base.addEventListener('mousedown', jStart);
                document.addEventListener('mousemove', (e) => { if (joyActive) jMove(e); });
                document.addEventListener('mouseup', () => { if (joyActive) { joyActive = false; if (knob) knob.style.transform = ''; if (bf) bf.input.moveX = 0; } });
            }
            ['lightning', 'bottle', 'moon', 'shield'].forEach((t, i) => {
                const btn = document.getElementById('bf-btn-' + t);
                if (btn) {
                    btn.addEventListener('touchstart', (e) => { e.preventDefault(); bfDoAttack(i); }, { passive: false });
                    btn.addEventListener('click', () => bfDoAttack(i));
                }
            });
            const kd = (e) => {
                if (!bf || !bf.running) return;
                if (e.key === 'ArrowLeft' || e.key === 'a') bf.input.moveX = -1;
                if (e.key === 'ArrowRight' || e.key === 'd') bf.input.moveX = 1;
                if (e.key === '1' || e.key === 'j') bfDoAttack(0);
                if (e.key === '2' || e.key === 'k') bfDoAttack(1);
                if (e.key === '3' || e.key === 'l') bfDoAttack(2);
                if (e.key === '4' || e.key === 'h') bfDoAttack(3);
            };
            const ku = (e) => {
                if (!bf) return;
                if ((e.key === 'ArrowLeft' || e.key === 'a') && bf.input.moveX < 0) bf.input.moveX = 0;
                if ((e.key === 'ArrowRight' || e.key === 'd') && bf.input.moveX > 0) bf.input.moveX = 0;
            };
            window.addEventListener('keydown', kd);
            window.addEventListener('keyup', ku);
            bf._kd = kd; bf._ku = ku;
            // --- GESTION DES CLICS POUR LES PASTILLES RYTHMIQUES (QTE) ---
            const canvas = document.getElementById('bf-canvas');
            if (canvas) {
                const handleQteTap = (e) => {
                    if (!bf || !bf.running) return;
                    // On ne fait un preventDefault que si on a touché une pastille pour ne pas bloquer les autres actions
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                    // Convertir la position de l'écran vers les coordonnées internes du jeu
                    const x = (clientX - rect.left) * (bf.W / rect.width);
                    const y = (clientY - rect.top) * (bf.H / rect.height);

                    // Vérifier si on a touché un QTE actif
                    for (let i = bf.qtes.length - 1; i >= 0; i--) {
                        let qte = bf.qtes[i];
                        if (qte.state !== 'active') continue;

                        let dist = Math.sqrt((x - qte.x) ** 2 + (y - qte.y) ** 2);
                        if (dist < 35) { // Zone de clic
                            e.preventDefault(); // On bloque le comportement par défaut (scroll, etc)

                            // Vérifier si le timing est bon (la fin du timer)
                            if (qte.progress > 0.82 && qte.progress < 1.0) {
                                qte.state = 'success';

                                // Récompense : reset cooldown aléatoire (1 = bottle, 2 = moon, 3 = shield)
                                const skills = [1, 2, 3];
                                const chosenSkill = skills[Math.floor(Math.random() * skills.length)];
                                bf.eva.cd[chosenSkill] = 0;

                                // Animation du bouton rechargé
                                const skillNames = ['lightning', 'bottle', 'moon', 'shield'];
                                const btn = document.getElementById('bf-btn-' + skillNames[chosenSkill]);
                                if (btn) {
                                    btn.classList.remove('bf-ready-flash');
                                    void btn.offsetWidth;
                                    btn.classList.add('bf-ready-flash');
                                }

                                // Effets visuels et sonores
                                ChateauAudio.playAchievement();
                                for (let p = 0; p < 12; p++) {
                                    const a = Math.random() * Math.PI * 2;
                                    bfParticle(qte.x, qte.y, Math.cos(a) * 80, Math.sin(a) * 80, 0.6, '#10b981', 3);
                                }
                                bf.dmgTexts.push({ x: qte.x, y: qte.y - 20, text: 'PARFAIT !', color: '#10b981', t: 1.0 });
                            } else {
                                // Échec (cliqué trop tôt)
                                qte.state = 'failed';
                                ChateauAudio.playError();
                                bf.dmgTexts.push({ x: qte.x, y: qte.y - 20, text: 'Trop tôt !', color: '#ef4444', t: 0.8 });
                            }
                        }
                    }
                };
                canvas.addEventListener('mousedown', handleQteTap);
                canvas.addEventListener('touchstart', handleQteTap, { passive: false });
            }
        }

        function bfDoAttack(idx) {
            if (!bf || !bf.running || bf.introTimer > 0) return;
            const { eva, malus } = bf;
            if (eva.orgasme && eva.orgasme.active && idx !== 3) return;
            if (eva.cd[idx] > 0 || (eva.atk && idx !== 3)) return;

            if (idx === 0) {
                ChateauAudio.playClick();
                // ⚡ Éclair d'Amour — cone check ±15°
                eva.cd[0] = 0.8;
                eva.atk = { type: 'lightning', t: 0, dur: 0.3, dmg: 1 };
                const dx = malus.x - eva.x, dy = malus.y - eva.y;
                const angle = Math.atan2(dy, dx);
                const coneCenter = -Math.PI / 2;
                let angleDiff = angle - coneCenter;
                if (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                if (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                const inCone = Math.abs(angleDiff) < Math.PI / 12; // ±15°
                bf.projectiles.push({ type: 'lightning', x: eva.x, y: eva.y - 20, t: 0, dur: 0.3, dmg: 1, hit: false, inCone });
                for (let i = 0; i < 8; i++) {
                    const r = i / 8;
                    if (inCone) {
                        bfParticle(eva.x + (malus.x - eva.x) * r, (eva.y - 20) + (malus.y - eva.y + 20) * r,
                            (Math.random() - 0.5) * 80, (Math.random() - 0.5) * 80, 0.4, '#facc15', 3);
                    } else {
                        const sa = coneCenter + (Math.random() - 0.5) * Math.PI / 2;
                        const dist = 30 + Math.random() * 60;
                        bfParticle(eva.x + Math.cos(sa) * dist, eva.y + Math.sin(sa) * dist,
                            Math.cos(sa) * 40, Math.sin(sa) * 40, 0.25, 'rgba(250,204,21,0.4)', 2);
                    }
                }
            } else if (idx === 1) {
                ChateauAudio.playClick();
                // 🧴 Lancer d'Alcoo Ménager — straight shot
                eva.cd[1] = 2;
                eva.atk = { type: 'bottle', t: 0, dur: 0.4, dmg: 3 };
                bf.projectiles.push({ type: 'bottle', x: eva.x, y: eva.y - 30, vx: 0, vy: -bf.H * 0.95, t: 0, dur: 1.5, dmg: 3, r: 10, hit: false, spin: 0 });
            } else if (idx === 2) {
                ChateauAudio.playLaser();
                // 🌙 Laku Noc — moon blade (10 dmg, large hitbox)
                eva.cd[2] = 15;
                eva.atk = { type: 'moon', t: 0, dur: 0.8, dmg: 10 };
                eva.shout = { text: 'Laku noć !', t: 1.3, color: '#93c5fd' };
                bf.projectiles.push({ type: 'moon', x: eva.x, y: eva.y - 30, vx: 0, vy: -bf.H * 0.85, t: 0, dur: 0.8, dmg: 10, r: 40, hit: false });
                bf.shake = 0.3; bf.flash = 0.2; bf.flashColor = '#93c5fd';
            } else if (idx === 3) {
                // 💋 Orgasme — reflect orbs back toward Malus
                if (eva.orgasme && eva.orgasme.active) return;
                ChateauAudio.playAchievement();
                eva.cd[3] = 18;
                eva.orgasme = { active: true, timer: 5 };
                eva.atk = null;
                bf.flash = 0.2; bf.flashColor = '#f472b6';
                for (let i = 0; i < 30; i++) {
                    const a = (i / 30) * Math.PI * 2;
                    bfParticle(eva.x + Math.cos(a) * 38, eva.y + Math.sin(a) * 38,
                        Math.cos(a) * 70, Math.sin(a) * 70, 1.0,
                        ['#f472b6', '#ec4899', '#fb7185', '#fda4af', '#fff'][i % 5], 5);
                }
            }
            updateBFBtns();
        }

        function bfMalusAttack(pattern) {
            if (!bf) return;
            const { eva, malus, W, H } = bf;
            const sp = H * 0.42;
            if (pattern === 'aimed') {
                const dx = eva.x - malus.x, dy = eva.y - malus.y;
                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                bf.projectiles.push({ type: 'orb', x: malus.x, y: malus.y + 30, vx: (dx / d) * sp, vy: (dy / d) * sp, r: 8, dmg: 1, t: 0, dur: 3 });
            } else if (pattern === 'spread3') {
                for (let i = -1; i <= 1; i++)
                    bf.projectiles.push({ type: 'orb', x: malus.x, y: malus.y + 30, vx: i * 70, vy: sp, r: 8, dmg: 1, t: 0, dur: 3 });
            } else if (pattern === 'spiral') {
                const sa = malus.spiralAngle || 0;
                for (let i = 0; i < 3; i++) {
                    const a = sa + (i / 3) * Math.PI * 2;
                    bf.projectiles.push({
                        type: 'orb', x: malus.x, y: malus.y + 30,
                        vx: Math.cos(a) * sp * 0.7, vy: Math.sin(a) * sp * 0.7,
                        r: 7, dmg: 1, t: 0, dur: 3.5, spiral: true, baseAngle: a, spd: sp * 0.55
                    });
                }
                malus.spiralAngle = (malus.spiralAngle || 0) + 0.6;
            } else if (pattern === 'sun') {
                const count = malus.phase === 3 ? 14 : malus.phase === 2 ? 11 : 8;
                for (let i = 0; i < count; i++) {
                    const a = (i / count) * Math.PI * 2;
                    bf.projectiles.push({
                        type: 'orb', x: malus.x, y: malus.y + 30,
                        vx: Math.cos(a) * sp * 0.6, vy: Math.sin(a) * sp * 0.6,
                        r: 6, dmg: 1, t: 0, dur: 2.8
                    });
                }
            } else if (pattern === 'wave') {
                const dx = eva.x - malus.x, dy = eva.y - malus.y;
                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                for (let i = -2; i <= 2; i++) {
                    bf.projectiles.push({
                        type: 'orb', x: malus.x + i * 12, y: malus.y + 30,
                        vx: (dx / d) * sp * 0.8, vy: (dy / d) * sp * 0.8,
                        r: 7, dmg: 1, t: 0, dur: 3, wave: true, waveOff: i * 0.4
                    });
                }
            } else if (pattern === 'heart') {
                for (let i = 0; i < 16; i++) {
                    const t = (i / 16) * Math.PI * 2;
                    const hx = 16 * Math.pow(Math.sin(t), 3);
                    const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    const d = Math.sqrt(hx * hx + hy * hy) || 1;
                    const speed = sp * (0.6 + (d / 18) * 0.35);
                    bf.projectiles.push({
                        type: 'orb', x: malus.x + hx * 1.5, y: malus.y + 30 + hy * 1.5,
                        vx: (hx / d) * speed, vy: (hy / d) * speed,
                        r: 7, dmg: 1, t: 0, dur: 3.2
                    });
                }
            } else if (pattern === 'pentagram') {
                const order = [0, 2, 4, 1, 3, 0];
                for (let s = 0; s < 5; s++) {
                    const a1 = -Math.PI / 2 + order[s] * (Math.PI * 2 / 5);
                    const a2 = -Math.PI / 2 + order[s + 1] * (Math.PI * 2 / 5);
                    const x1 = Math.cos(a1), y1 = Math.sin(a1);
                    const x2 = Math.cos(a2), y2 = Math.sin(a2);
                    for (let step = 0; step < 3; step++) {
                        const f = step / 3;
                        const px = x1 + (x2 - x1) * f;
                        const py = y1 + (y2 - y1) * f;
                        const d = Math.sqrt(px * px + py * py) || 1;
                        bf.projectiles.push({
                            type: 'orb', x: malus.x + px * 15, y: malus.y + 30 + py * 15,
                            vx: (px / d) * sp * 0.7, vy: (py / d) * sp * 0.7,
                            r: 7, dmg: 1, t: 0, dur: 3.2
                        });
                    }
                }
            } else if (pattern === 'laser') {
                bf.projectiles.push({ type: 'laser', x: malus.x, y: malus.y + 30, targetX: eva.x, t: 0, chargeDur: 1.0, fireDur: 1.2, dur: 2.2, dmg: 1, hit: false });
                ChateauAudio.playLockTick();
            }
            for (let i = 0; i < 4; i++)
                bfParticle(malus.x + (Math.random() - 0.5) * 40, malus.y + 30,
                    (Math.random() - 0.5) * 40, 20 + Math.random() * 30, 0.5, '#c4263d', 4);
        }

        function bfLoop(now) {
            if (!bf) return;
            const dt = Math.min((now - bf._lastT) / 1000, 0.05);
            bf._lastT = now;
            bf.time += dt;
            if (bf.running) bfUpdate(dt);
            bfRender();
            bf._raf = requestAnimationFrame(bfLoop);
        }

        function bfUpdate(dt) {
            const { eva, malus, W, H } = bf;
            if (bf.introTimer > 0) { bf.introTimer -= dt; return; }
            if (bf.hitStopTimer > 0) { bf.hitStopTimer -= dt; return; }
            if (bf.zoomEffect && bf.zoomEffect > 0) bf.zoomEffect = Math.max(0, bf.zoomEffect - dt * 0.15);

            // ── Eva Movement ──
            eva.dir = bf.input.moveX;
            eva.x += eva.dir * eva.speed * dt;
            eva.x = Math.max(20, Math.min(W - 20, eva.x));
            if (eva.dir !== 0) eva.facing = eva.dir > 0 ? 1 : -1;
            eva.inv = Math.max(0, eva.inv - dt);
            eva.anim += dt;
            if (eva.shout) { eva.shout.t -= dt; if (eva.shout.t <= 0) eva.shout = null; }
            if (Math.abs(eva.dir) > 0.1) eva.trail.push({ x: eva.x, y: eva.y, a: 0.4 });
            eva.trail = eva.trail.filter(p => (p.a -= dt * 1.5) > 0);
            if (eva.atk) { eva.atk.t += dt; if (eva.atk.t >= eva.atk.dur) eva.atk = null; }
            for (let i = 0; i < 4; i++) {
                const prev = eva.cd[i];
                eva.cd[i] = Math.max(0, eva.cd[i] - dt);
                if (prev > 0 && eva.cd[i] <= 0) {
                    const names = ['lightning', 'bottle', 'moon', 'shield'];
                    const btn = document.getElementById('bf-btn-' + names[i]);
                    if (btn) { btn.classList.remove('bf-ready-flash'); void btn.offsetWidth; btn.classList.add('bf-ready-flash'); }
                }
            }

            // ── Orgasme Update ──
            if (eva.orgasme && eva.orgasme.active) {
                eva.orgasme.timer -= dt;
                // Heal: 50% of maxHp over 5s = 10% per second, rounded up
                const healRate = Math.ceil(eva.maxHp * 0.1);
                eva.orgasme.healAccum = (eva.orgasme.healAccum || 0) + healRate * dt;
                while (eva.orgasme.healAccum >= 1 && eva.hp < eva.maxHp) {
                    eva.hp = Math.min(eva.maxHp, eva.hp + 1);
                    eva.orgasme.healAccum -= 1;
                    bf.dmgTexts.push({ x: eva.x + (Math.random() - 0.5) * 20, y: eva.y - 45, text: '+1 ♥', color: '#f472b6', t: 1.0 });
                }
                // Pulse particles around Eva
                if (Math.random() < 0.5) {
                    const a = Math.random() * Math.PI * 2;
                    bfParticle(eva.x + Math.cos(a) * 40, eva.y + Math.sin(a) * 40,
                        Math.cos(a) * 15 + (Math.random() - 0.5) * 10, Math.sin(a) * 15 - Math.random() * 8, 0.6, '#f472b6', 2.5);
                }
                // Reflect any orbs that enter the circular hitbox (r=42)
                bf.projectiles.forEach(p => {
                    if (p.type !== 'orb' || p.reflected) return;
                    const dx = p.x - eva.x, dy = p.y - eva.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 42) {
                        p.reflected = true;
                        // Direction from Eva toward Malus
                        const tdx = malus.x - eva.x, tdy = malus.y - eva.y;
                        const td = Math.sqrt(tdx * tdx + tdy * tdy) || 1;
                        const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy) * 1.2;
                        p.vx = (tdx / td) * spd; p.vy = (tdy / td) * spd;
                        p.dmg = 1; p.dur = p.t + 2;
                        // Splash particles
                        for (let i = 0; i < 8; i++)
                            bfParticle(p.x, p.y, (Math.random() - 0.5) * 120, (Math.random() - 0.5) * 120, 0.4, '#f472b6', 3);
                    }
                });
                if (eva.orgasme.timer <= 0) {
                    eva.orgasme = null;
                }
            }
            updateBFBtns();

            // ── Malus AI ──
            const prevPhase = malus.phase;
            malus.phase = malus.hp <= malus.maxHp * 0.1 ? 3 : malus.hp <= malus.maxHp * 0.5 ? 2 : malus.hp <= malus.maxHp * 0.75 ? 1 : 0;
            // Phase transition effect
            if (malus.phase > prevPhase) {
                bf.shake = 0.8; bf.flash = 0.5;
                bf.flashColor = malus.phase === 3 ? '#ef4444' : malus.phase === 2 ? '#c4263d' : '#8b1a2e';
                for (let i = 0; i < 35; i++) {
                    const a = (i / 35) * Math.PI * 2, spd = 80 + Math.random() * 180;
                    bfParticle(malus.x, malus.y, Math.cos(a) * spd, Math.sin(a) * spd, 1.2,
                        malus.phase === 3
                            ? ['#ef4444', '#dc2626', '#f87171', '#fca5a5'][i % 4]
                            : malus.phase === 2
                                ? ['#dc2626', '#f87171', '#ef4444', '#fca5a5'][i % 4]
                                : ['#c4263d', '#8b1a2e', '#4a0f1a', '#ef4444'][i % 4], 6);
                }
                if (malus.phase === 3) {
                    bf.zoomEffect = 0.08;
                    bf.hitStopTimer = 0.4;
                    malus.phase2IntroQueue = ['pentagram'];
                    malus.currentPattern = 'heart';
                    malus.isPaused = false;
                    malus.atkTimer = 0.02;
                }
            }

            malus.hurt = Math.max(0, malus.hurt - dt);
            malus.anim += dt;
            if (malus.isStunned) {
                malus.stunTimer -= dt;
                malus.hurt = 0.1;
                if (Math.random() < 0.4) {
                    bfParticle(malus.x + (Math.random() - 0.5) * 30, malus.y - 25, (Math.random() - 0.5) * 30, -15 - Math.random() * 20, 0.6, '#facc15', 3.5);
                }
                if (malus.stunTimer <= 0) malus.isStunned = false;
            } else {
                malus.moveTimer -= dt;
                if (malus.moveTimer <= 0) {
                    malus.moveTarget = 40 + Math.random() * (W - 80);
                    malus.moveTimer = malus.phase === 3 ? 0.3 + Math.random() * 0.35
                        : malus.phase === 2 ? 0.5 + Math.random() * 0.4
                            : malus.phase === 1 ? 0.8 + Math.random() * 0.6 : 1.4 + Math.random() * 1.5;
                }
                const ms = malus.phase === 3 ? 250 : malus.phase === 2 ? 200 : malus.phase === 1 ? 150 : 90;
                if (Math.abs(malus.x - malus.moveTarget) > 5)
                    malus.x += Math.sign(malus.moveTarget - malus.x) * ms * dt;

                // ── Malus Attacks (4 phases) ──
                if (malus.phase === 3) {
                    // Phase 3 (10% -> 0%): ultimate rage stage! starts with heart -> pentagram -> fast rotation
                    if (malus.isPaused) {
                        malus.pauseTimer -= dt;
                        if (malus.pauseTimer <= 0) {
                            malus.isPaused = false;
                            if (malus.phase2IntroQueue && malus.phase2IntroQueue.length > 0) {
                                malus.currentPattern = malus.phase2IntroQueue.shift();
                            } else {
                                const patterns = ['aimed', 'spiral', 'sun', 'spread3', 'wave', 'laser', 'heart', 'pentagram'];
                                malus.patternIndex = (malus.patternIndex + 1) % patterns.length;
                                malus.currentPattern = patterns[malus.patternIndex];
                            }
                            bf.flash = 0.1; bf.flashColor = '#c4263d';
                        }
                    } else {
                        malus.atkTimer -= dt;
                        if (malus.atkTimer <= 0) {
                            malus.atkTimer = 0.1 + Math.random() * 0.16;
                            bfMalusAttack(malus.currentPattern);
                            if (Math.random() < 0.12) {
                                malus.isPaused = true;
                                malus.pauseTimer = 0.2 + Math.random() * 0.9;
                            }
                        }
                    }
                } else if (malus.phase === 2) {
                    // Phase 2 (50% -> 10%): fast attacks + spiral/sun/spread3/laser/echo/wave
                    malus.atkTimer -= dt;
                    malus.spiralAngle = (malus.spiralAngle || 0) + dt * 4;
                    if (malus.atkTimer <= 0) {
                        malus.atkTimer = 0.38 + Math.random() * 0.42;
                        const r = Math.random();
                        if (r < 0.2) bfMalusAttack('spiral');
                        else if (r < 0.38) bfMalusAttack('sun');
                        else if (r < 0.56) bfMalusAttack('spread3');
                        else if (r < 0.74) bfMalusAttack('laser');
                        else if (r < 0.9) bfMalusAttack('wave');
                        else bfMalusAttack('aimed');
                    }
                } else if (malus.phase === 1) {
                    // Phase 1 (75% -> 50%): faster + spiral/sun/spread3
                    malus.atkTimer -= dt;
                    malus.spiralAngle = (malus.spiralAngle || 0) + dt * 3;
                    if (malus.atkTimer <= 0) {
                        malus.atkTimer = 0.55 + Math.random() * 0.5;
                        const r = Math.random();
                        if (r < 0.25) bfMalusAttack('spiral');
                        else if (r < 0.48) bfMalusAttack('sun');
                        else if (r < 0.72) bfMalusAttack('spread3');
                        else bfMalusAttack('aimed');
                    }
                } else {
                    // Phase 0 (100% -> 75%): normal
                    malus.atkTimer -= dt;
                    if (malus.atkTimer <= 0) {
                        malus.atkTimer = 1.5 + Math.random() * 0.6;
                        bfMalusAttack('aimed');
                    }
                }
            }

            // ── Update Projectiles ──
            bf.projectiles = bf.projectiles.filter(p => {
                p.t += dt;
                if (p.t > p.dur) return false;
                // --- AJOUT : Le point de départ du laser suit Malus ---
                if (p.type === 'laser') {
                    p.x = malus.x;
                    p.y = malus.y + 30; // 30 pixels plus bas pour correspondre au sprite de Malus
                }
                // ------------------------------------------------------
                if (p.type === 'orb') {
                    if (p.spiral) {
                        p.baseAngle += dt * 2.2;
                        p.vx = Math.cos(p.baseAngle) * p.spd;
                        p.vy = Math.sin(p.baseAngle) * p.spd;
                    }
                    if (p.wave) p.vx += Math.sin(bf.time * 9 + p.waveOff) * 250 * dt;
                    p.x += p.vx * dt; p.y += p.vy * dt;
                    // Hit Eva
                    if (eva.inv <= 0 && !eva.shield.active && Math.abs(p.x - eva.x) < 22 && Math.abs(p.y - eva.y) < 28) {
                        eva.hp -= p.dmg; eva.inv = 1.0;
                        bf.shake = 0.3; bf.flash = 0.15; bf.flashColor = '#ef4444';
                        bf.dmgTexts.push({ x: eva.x, y: eva.y - 35, text: '-1', color: '#ef4444', t: 0.9 });
                        for (let i = 0; i < 10; i++)
                            bfParticle(eva.x, eva.y, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, 0.5, '#ef4444', 4);
                        if (eva.hp <= 0) bfEndGame(false);
                        return false;
                    }
                    // Orgasme reflection (handled in update loop above; skip orbs already reflected or consumed)
                    if (p.reflected && Math.abs(p.x - malus.x) < 40 && Math.abs(p.y - malus.y) < 50) {
                        bfHitMalus(p.dmg);
                        for (let i = 0; i < 12; i++)
                            bfParticle(malus.x, malus.y, (Math.random() - 0.5) * 150, (Math.random() - 0.5) * 150, 0.6, '#f472b6', 4);
                        return false;
                    }
                    if (Math.random() < 0.25) bfParticle(p.x, p.y, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, 0.3, '#8b1a2e', 3);
                }
                if (p.type === 'lightning' && !p.hit && p.t > 0.08) {
                    p.hit = true;
                    if (p.inCone) bfHitMalus(p.dmg);
                    else bf.dmgTexts.push({ x: eva.x, y: eva.y - 55, text: 'Raté !', color: '#888', t: 0.7 });
                }
                if (p.type === 'bottle') {
                    p.x += p.vx * dt; p.y += p.vy * dt;
                    p.spin = (p.spin || 0) + dt * 8;
                    if (Math.random() < 0.5)
                        bfParticle(p.x + (Math.random() - 0.5) * 6, p.y + 5, (Math.random() - 0.5) * 15, Math.random() * 20, 0.3, '#a78bfa', 2.5);
                    if (!p.hit && Math.abs(p.x - malus.x) < 35 && Math.abs(p.y - malus.y) < 45) {
                        p.hit = true; bfHitMalus(p.dmg);
                        for (let i = 0; i < 15; i++) {
                            const a = (i / 15) * Math.PI * 2, spd = 60 + Math.random() * 80;
                            bfParticle(malus.x, malus.y, Math.cos(a) * spd, Math.sin(a) * spd, 0.5, '#a78bfa', 3);
                        }
                    }
                }
                if (p.type === 'moon') {
                    p.x += p.vx * dt; p.y += p.vy * dt;
                    bfParticle(p.x + (Math.random() - 0.5) * 16, p.y, (Math.random() - 0.5) * 40, Math.random() * 25, 0.4, '#93c5fd', 4);
                    if (!p.hit && Math.abs(p.x - malus.x) < 55 && Math.abs(p.y - malus.y) < 65) {
                        p.hit = true; bfHitMalus(p.dmg);
                        bf.shake = 0.6; bf.flash = 0.35; bf.flashColor = '#93c5fd';
                        for (let i = 0; i < 40; i++) {
                            const a = (i / 40) * Math.PI * 2, spd = 120 + Math.random() * 180;
                            bfParticle(malus.x, malus.y, Math.cos(a) * spd, Math.sin(a) * spd, 1.0,
                                ['#93c5fd', '#bfdbfe', '#dbeafe', '#fff', '#e0f2fe'][i % 5], 6);
                        }
                    }
                }
                if (p.type === 'laser') {
                    if (p.t > p.chargeDur && p.t <= p.chargeDur + p.fireDur && !p.hit && eva.inv <= 0 && !eva.shield.active) {
                        if (Math.abs(eva.x - p.targetX) < 22) {
                            p.hit = true;
                            eva.hp -= p.dmg; eva.inv = 1.0;
                            bf.shake = 0.4; bf.flash = 0.2; bf.flashColor = '#ef4444';
                            bf.dmgTexts.push({ x: eva.x, y: eva.y - 35, text: '-1', color: '#ef4444', t: 0.9 });
                            ChateauAudio.playChiptuneError();
                            if (eva.hp <= 0) bfEndGame(false);
                        }
                    }
                    if (Math.abs(p.t - p.chargeDur) < 0.04) ChateauAudio.playLaser();
                }
                return true;
            });

            // Particles & damage texts
            bf.particles = bf.particles.filter(p => { p.t -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.96; p.vy *= 0.96; return p.t > 0; });
            bf.dmgTexts = bf.dmgTexts.filter(d => (d.t -= dt) > 0);
            bf.shake = Math.max(0, bf.shake - dt);
            bf.flash = Math.max(0, bf.flash - dt);

            // Ambient VFX
            if (Math.random() < 0.15)
                bfParticle(eva.x + (Math.random() - 0.5) * 20, eva.y + (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 12, -8 - Math.random() * 15, 0.6, '#f2d06b', 2);
            if (Math.random() < 0.1 + malus.phase * 0.08)
                bfParticle(malus.x + (Math.random() - 0.5) * 40, malus.y + (Math.random() - 0.5) * 50,
                    (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 12, 0.5,
                    malus.phase === 3 ? '#ef4444' : malus.phase === 2 ? '#dc2626' : malus.phase === 1 ? '#c4263d' : '#2a0a20', 3);
            // Floating runes
            bf.runes.forEach(r => {
                r.y -= r.speed * dt;
                if (r.fadeIn) { r.opacity = Math.min(0.3, r.opacity + dt * 0.3); if (r.opacity >= 0.3) r.fadeIn = false; }
                else r.opacity -= dt * 0.08;
                if (r.y < -10 || r.opacity <= 0) {
                    r.x = Math.random() * bf.W; r.y = bf.H + 10;
                    r.opacity = 0; r.fadeIn = true;
                    r.char = '✦⬡◇△⊕☆✧⟡'[Math.floor(Math.random() * 8)];
                }
            });
            // Nebula drift
            bf.nebulae.forEach(n => { n.phase += dt * 0.15; n.x += Math.sin(n.phase) * n.drift * dt; });
            // ... (fin de la gestion des projectiles de Malus)

            // ── Update QTE (Événements rythmiques) ──
            bf.qteSpawnTimer -= dt;
            if (bf.qteSpawnTimer <= 0) {
                // Nouvelle pastille toutes les 4 à 8 secondes (plus dynamique)
                bf.qteSpawnTimer = 10 + Math.random() * 5;
                bf.qtes.push({
                    x: 40 + Math.random() * (W - 80),
                    y: 40 + Math.random() * (H - 180), // Évite de spawn sur le joystick
                    progress: 0,
                    duration: 1.2, // 2 secondes pour cliquer
                    state: 'active'
                });
            }

            bf.qtes = bf.qtes.filter(qte => {
                if (qte.state === 'active') {
                    qte.progress += dt / qte.duration;
                    if (qte.progress >= 1.0) {
                        // Temps écoulé, la pastille disparaît
                        bf.dmgTexts.push({ x: qte.x, y: qte.y - 20, text: 'Raté...', color: '#888', t: 0.7 });
                        return false;
                    }
                    return true;
                }
                return false;
            });

        }

        function bfHitMalus(dmg) {
            if (!bf) return;
            const actualDmg = dmg;
            bf.malus.hp = Math.max(0, bf.malus.hp - actualDmg);
            bf.malus.hurt = 0.3;
            bf.shake = Math.max(bf.shake, 0.15);
            bf.dmgTexts.push({ x: bf.malus.x, y: bf.malus.y - 40, text: '-' + actualDmg + (bf.malus.isStunned ? ' (BREAK!)' : ''), color: '#facc15', t: 0.9 });
            for (let i = 0; i < 6; i++)
                bfParticle(bf.malus.x + (Math.random() - 0.5) * 30, bf.malus.y, (Math.random() - 0.5) * 120, (Math.random() - 0.5) * 120, 0.5, '#c4263d', 4);

            if (!bf.malus.isStunned && bf.malus.hp > 0) {
                bf.malus.breakHp += dmg;
                if (bf.malus.breakHp >= bf.malus.breakMax && bf.malus.breakMax > 0) {
                    bf.malus.isStunned = true;
                    bf.malus.stunTimer = 1.5;
                    bf.malus.breakHp = 0;
                    bf.shake = Math.max(bf.shake, 0.5);
                    bf.flash = 0.35; bf.flashColor = '#facc15';
                    bf.dmgTexts.push({ x: bf.malus.x, y: bf.malus.y - 68, text: '💥 BREAK ! IMMOBILISÉ !', color: '#facc15', t: 1.5 });
                    ChateauAudio.playAchievement();
                } else {
                    ChateauAudio.playBossHit();
                }
            } else {
                ChateauAudio.playBossHit();
            }

            if (bf.malus.hp <= 0) {
                if (bf.eva && bf.eva.orgasme && bf.eva.orgasme.active) {
                    ChateauAchievements.unlock('orgasme_finish');
                }
                if (bf.eva && bf.eva.hp >= bf.eva.maxHp) {
                    ChateauAchievements.unlock('intouchable');
                }
                bfEndGame(true);
            }
        }

        function bfParticle(x, y, vx, vy, life, color, size) {
            if (bf) bf.particles.push({ x, y, vx, vy, t: life, maxT: life, color, size });
        }

        function bfEndGame(win) {
            if (!bf) return;
            bf.running = false;
            if (win) {
                for (let i = 0; i < 50; i++) {
                    const a = (i / 50) * Math.PI * 2, sp = 50 + Math.random() * 200;
                    bfParticle(bf.malus.x, bf.malus.y, Math.cos(a) * sp, Math.sin(a) * sp, 1.2,
                        ['#c4263d', '#8b1a2e', '#4a0f1a', '#ef4444'][i % 4], 6);
                }
                bf.flash = 0.5; bf.flashColor = '#f2d06b'; bf.shake = 0.6;
            }
            setTimeout(() => {
                const wrapper = document.getElementById('bf-wrapper');
                if (!wrapper) return;
                const ov = document.createElement('div');
                ov.className = 'bf-result ' + (win ? 'win' : 'lose');
                ov.innerHTML = win
                    ? `<h2>👑 Victoire !</h2>
                       <p style="color:var(--text-secondary);margin-bottom:14px;text-align:center;">Eva a vaincu Malus !</p>
                       <div style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);border-radius:10px;padding:12px 16px;margin-bottom:20px;text-align:center;max-width:380px;">
                           <p style="color:#fca5a5;font-size:0.88rem;margin:0;font-weight:600;line-height:1.4;">
                               ⚠️ Attention : passer à l'énigme suivante mène à l'avant-dernière étape avant le trésor. Il n'y aura plus de retour en arrière !
                           </p>
                       </div>
                       <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
                           <button class="btn" onclick="startBossFight()" style="padding:10px 18px;border:1px solid rgba(167,139,250,0.4);background:rgba(124,58,237,0.18);color:#ddd6fe;font-weight:600;border-radius:8px;cursor:pointer;">
                               🔄 Rejouer le combat
                           </button>
                           <button class="btn btn-primary" onclick="bfCleanup();handleSuccess();">
                               Passer à l'énigme suivante ↗
                           </button>
                       </div>`
                    : `<h2>💀 Défaite...</h2><p style="color:var(--text-secondary);margin-bottom:20px;text-align:center;">Eva a été vaincue...</p><button class="btn btn-primary" onclick="startBossFight()">⚔️ Réessayer</button>`;
                wrapper.appendChild(ov);
            }, win ? 1500 : 800);
        }

        function bfCleanup() {
            if (!bf) return;
            if (bf._raf) cancelAnimationFrame(bf._raf);
            if (bf._kd) window.removeEventListener('keydown', bf._kd);
            if (bf._ku) window.removeEventListener('keyup', bf._ku);
            bf = null;
        }

        function updateBFBtns() {
            if (!bf) return;
            const names = ['lightning', 'bottle', 'moon', 'shield'];
            const maxCds = [0.8, 2, 15, 30];
            const orgActive = bf.eva.orgasme && bf.eva.orgasme.active;
            names.forEach((n, i) => {
                const btn = document.getElementById('bf-btn-' + n);
                if (!btn) return;
                const cd = bf.eva.cd[i];
                const blocked = orgActive && i !== 3;
                btn.classList.toggle('on-cd', cd > 0 || (i === 3 && orgActive));
                let ov = btn.querySelector('.bf-cd-overlay');
                if (!ov) { ov = document.createElement('div'); ov.className = 'bf-cd-overlay'; btn.appendChild(ov); }
                ov.style.height = cd > 0 ? (cd / maxCds[i] * 100) + '%' : blocked ? '100%' : '0';
                let cdText = btn.querySelector('.bf-cd-text');
                if (!cdText) { cdText = document.createElement('div'); cdText.className = 'bf-cd-text'; btn.appendChild(cdText); }
                if (cd > 0) {
                    cdText.textContent = cd >= 10 ? Math.ceil(cd) + 's' : cd.toFixed(1) + 's';
                    cdText.style.display = 'flex';
                } else if (blocked) {
                    cdText.textContent = '🛡️';
                    cdText.style.display = 'flex';
                } else {
                    cdText.style.display = 'none';
                }
            });
        }

        // ── BOSS FIGHT RENDERING ──
        function bfRender() {
            const { ctx, W, H, eva, malus, shake, time } = bf;
            ctx.save();
            if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 15, (Math.random() - 0.5) * shake * 15);
            if (bf.zoomEffect && bf.zoomEffect > 0) {
                const zScale = 1 + bf.zoomEffect;
                ctx.translate(W * (1 - zScale) / 2, H * (1 - zScale) / 2);
                ctx.scale(zScale, zScale);
            }

            // Background with phase-dependent coloring
            const bg = ctx.createLinearGradient(0, 0, 0, H);
            if (malus.phase === 3) {
                bg.addColorStop(0, '#220306'); bg.addColorStop(0.5, '#1e050f'); bg.addColorStop(1, '#0f0105');
            } else if (malus.phase === 2) {
                bg.addColorStop(0, '#1a0508'); bg.addColorStop(0.5, '#180612'); bg.addColorStop(1, '#0a0205');
            } else if (malus.phase === 1) {
                bg.addColorStop(0, '#0f0118'); bg.addColorStop(0.5, '#120a1f'); bg.addColorStop(1, '#060510');
            } else {
                bg.addColorStop(0, '#0a0118'); bg.addColorStop(0.5, '#0d0a1f'); bg.addColorStop(1, '#050510');
            }
            ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

            // Nebula clouds
            bf.nebulae.forEach(n => {
                ctx.fillStyle = n.color;
                ctx.beginPath(); ctx.ellipse(n.x, n.y, n.rx, n.ry, 0, 0, Math.PI * 2); ctx.fill();
            });

            // Stars (3-layer parallax)
            bf.stars.forEach(s => {
                s.t += s.sp;
                const px = s.x + Math.sin(time * 0.1 * (1 + s.layer * 0.3)) * (2 + s.layer * 2);
                const br = 0.2 + 0.15 * s.layer + 0.2 * Math.sin(s.t);
                ctx.fillStyle = `rgba(255,255,255,${br})`;
                ctx.beginPath(); ctx.arc(px, s.y, s.s * (0.6 + s.layer * 0.3), 0, Math.PI * 2); ctx.fill();
            });

            // Floating runes
            bf.runes.forEach(r => {
                if (r.opacity <= 0) return;
                ctx.globalAlpha = r.opacity;
                ctx.fillStyle = r.color;
                ctx.font = `${r.size}px serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(r.char, r.x, r.y);
            });
            ctx.globalAlpha = 1;

            // Energy ground line
            const groundY = H * 0.88;
            const gPulse = 0.12 + 0.08 * Math.sin(time * 2);
            const gg = ctx.createLinearGradient(0, groundY - 3, 0, groundY + 3);
            gg.addColorStop(0, 'rgba(201,168,76,0)');
            gg.addColorStop(0.5, `rgba(201,168,76,${gPulse})`);
            gg.addColorStop(1, 'rgba(201,168,76,0)');
            ctx.fillStyle = gg; ctx.fillRect(0, groundY - 3, W, 6);

            // Energy pillars at edges
            const pA = 0.03 + malus.phase * 0.015 + Math.sin(time * 1.5) * 0.01;
            const pC = malus.phase === 3 ? `rgba(239,68,68,${pA * 1.5})` : malus.phase === 2 ? `rgba(239,68,68,${pA})` : `rgba(201,168,76,${pA})`;
            let lg = ctx.createLinearGradient(0, 0, 15, 0);
            lg.addColorStop(0, pC); lg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = lg; ctx.fillRect(0, 0, 15, H);
            let rg = ctx.createLinearGradient(W, 0, W - 15, 0);
            rg.addColorStop(0, pC); rg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = rg; ctx.fillRect(W - 15, 0, 15, H);

            // Particles (additive blending)
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            bf.particles.forEach(p => {
                ctx.globalAlpha = (p.t / p.maxT) * 0.8;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.t / p.maxT), 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
            ctx.globalAlpha = 1;

            // Eva trail
            eva.trail.forEach(t => {
                ctx.globalAlpha = t.a * 0.5;
                ctx.fillStyle = '#c9a84c';
                ctx.beginPath(); ctx.arc(t.x, t.y, 4, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Boss aura (phase 1+)
            if (malus.phase >= 1 && malus.hp > 0) {
                ctx.save();
                const aSize = malus.phase === 3 ? 80 : malus.phase === 2 ? 65 : 50;
                const aAlpha = malus.phase === 3 ? 0.2 + Math.sin(time * 6) * 0.1 : malus.phase === 2 ? 0.14 + Math.sin(time * 5) * 0.07 : 0.08 + Math.sin(time * 3) * 0.04;
                ctx.globalAlpha = aAlpha;
                ctx.globalCompositeOperation = 'lighter';
                const ag = ctx.createRadialGradient(malus.x, malus.y, 5, malus.x, malus.y, aSize);
                ag.addColorStop(0, malus.phase === 3 ? '#ef4444' : malus.phase === 2 ? '#dc2626' : '#c4263d');
                ag.addColorStop(0.5, malus.phase === 3 ? 'rgba(239,68,68,0.4)' : malus.phase === 2 ? 'rgba(220,38,38,0.3)' : 'rgba(196,38,61,0.2)');
                ag.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = ag;
                ctx.beginPath(); ctx.arc(malus.x, malus.y, aSize, 0, Math.PI * 2); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                ctx.restore();
            }

            // Draw characters
            bfDrawMalus(ctx, malus, time);
            bfDrawEva(ctx, eva, time);
            if (eva.orgasme && eva.orgasme.active) bfDrawOrgasmeRing(ctx, eva, time);

            // Draw projectiles
            bf.projectiles.forEach(p => {
                if (p.type === 'orb') bfDrawOrb(ctx, p);
                else if (p.type === 'lightning') bfDrawLightning(ctx, p, eva, malus);
                else if (p.type === 'bottle') bfDrawBottle(ctx, p);
                else if (p.type === 'moon') bfDrawMoonBlade(ctx, p);
                else if (p.type === 'laser') bfDrawLaser(ctx, p, H);
            });

            // Damage texts
            bf.dmgTexts.forEach(d => {
                ctx.globalAlpha = Math.min(1, d.t * 2);
                ctx.fillStyle = d.color;
                ctx.font = `bold ${W * 0.04}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                ctx.shadowColor = d.color; ctx.shadowBlur = 8;
                ctx.fillText(d.text, d.x, d.y - (0.9 - d.t) * 40);
                ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1;

            // HUD
            bfDrawHUD(ctx, W, eva, malus);

            // Phase 3 danger pulse
            if (malus.phase === 3 && malus.hp > 0) {
                const dp = 0.04 + Math.sin(time * 4) * 0.025;
                ctx.fillStyle = `rgba(239,68,68,${dp})`;
                ctx.fillRect(0, 0, W, H);
            }

            // Vignette
            const vigS = 0.35 + malus.phase * 0.12;
            const vig = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
            vig.addColorStop(0, 'rgba(0,0,0,0)');
            vig.addColorStop(1, `rgba(0,0,0,${vigS})`);
            ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

            // Intro text
            if (bf.introTimer > 0) {
                ctx.globalAlpha = Math.min(1, bf.introTimer / 0.3);
                ctx.fillStyle = '#f2d06b';
                ctx.font = `bold ${W * 0.11}px Cinzel, serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = '#f2d06b'; ctx.shadowBlur = 30;
                ctx.fillText('COMBAT !', W / 2, H / 2);
                ctx.shadowBlur = 0;
            }

            // Flash overlay
            if (bf.flash > 0) {
                ctx.globalAlpha = bf.flash * 1.5;
                ctx.fillStyle = bf.flashColor;
                ctx.fillRect(0, 0, W, H);
            }

            // ── Dessin des QTE (Pastilles rythmiques) ──
            if (bf.qtes) {
                bf.qtes.forEach(qte => {
                    if (qte.state !== 'active') return;

                    const { ctx } = bf;
                    ctx.save();

                    // 1. Cercle cible intérieur (fixe)
                    const isSweetSpot = qte.progress > 0.82;
                    ctx.beginPath();
                    ctx.arc(qte.x, qte.y, 16, 0, Math.PI * 2);
                    ctx.fillStyle = isSweetSpot ? 'rgba(16, 185, 129, 0.4)' : 'rgba(0, 0, 0, 0.5)';
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = isSweetSpot ? '#10b981' : 'rgba(201, 168, 76, 0.8)';
                    ctx.stroke();

                    // 2. Anneau extérieur qui rétrécit
                    const maxRadius = 70;
                    const currentRadius = 16 + (maxRadius - 16) * (1 - qte.progress);

                    ctx.beginPath();
                    ctx.arc(qte.x, qte.y, currentRadius, 0, Math.PI * 2);
                    ctx.lineWidth = 3;
                    // Passe du blanc au vert fluo quand c'est le bon moment de cliquer
                    ctx.strokeStyle = isSweetSpot ? '#10b981' : 'rgba(255, 255, 255, 0.8)';
                    ctx.stroke();

                    // 3. Icône indicative au centre
                    ctx.fillStyle = isSweetSpot ? '#fff' : 'rgba(201, 168, 76, 1)';
                    ctx.font = '14px "Inter", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('✨', qte.x, qte.y);

                    ctx.restore();
                });
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function bfDrawEva(ctx, eva, time) {
            ctx.save();
            ctx.translate(eva.x, eva.y);
            if (eva.inv > 0 && Math.sin(time * 20) > 0) ctx.globalAlpha = 0.3;
            if (eva.shield.active) {
                ctx.shadowColor = '#f472b6'; ctx.shadowBlur = 22;
            } else {
                ctx.shadowColor = '#f2d06b'; ctx.shadowBlur = 18;
            }
            const g = ctx.createLinearGradient(0, -32, 0, 18);
            g.addColorStop(0, '#fef08a'); g.addColorStop(0.4, '#f2d06b'); g.addColorStop(1, '#c9a84c');
            ctx.fillStyle = g;
            // Head
            ctx.beginPath(); ctx.arc(0, -28, 7, 0, Math.PI * 2); ctx.fill();
            // Body
            ctx.beginPath();
            ctx.moveTo(-9, -20); ctx.quadraticCurveTo(-11, 0, -7, 16);
            ctx.lineTo(7, 16); ctx.quadraticCurveTo(11, 0, 9, -20);
            ctx.closePath(); ctx.fill();
            // Legs
            ctx.fillRect(-6, 16, 4, 10); ctx.fillRect(2, 16, 4, 10);
            // Hair
            ctx.strokeStyle = '#fef08a'; ctx.lineWidth = 1.5; ctx.shadowBlur = 8;
            for (let i = 0; i < 3; i++) {
                const off = Math.sin(time * 3 + i) * 4;
                ctx.beginPath();
                ctx.moveTo(eva.facing > 0 ? -4 : 4, -33);
                ctx.quadraticCurveTo(eva.facing * (-12 - i * 4) + off, -28 + i * 3, eva.facing * (-8 - i * 6), -18 + i * 5);
                ctx.stroke();
            }
            // Attack arc
            if (eva.atk) {
                ctx.globalAlpha = 1 - eva.atk.t / eva.atk.dur;
                const atkC = { lightning: '#facc15', bottle: '#a78bfa', moon: '#93c5fd' };
                ctx.strokeStyle = atkC[eva.atk.type] || '#facc15';
                ctx.lineWidth = 2.5; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 20;
                ctx.beginPath();
                const sa = -Math.PI / 2 + (eva.atk.t / eva.atk.dur) * Math.PI;
                ctx.arc(0, -10, 22, sa - 0.6, sa + 0.6); ctx.stroke();
            }
            // Name
            ctx.shadowBlur = 0; ctx.globalAlpha = 0.6;
            ctx.fillStyle = (eva.orgasme && eva.orgasme.active) ? '#f472b6' : '#f2d06b';
            ctx.font = `600 ${bf.W * 0.025}px Cinzel, serif`;
            ctx.textAlign = 'center';
            ctx.fillText((eva.orgasme && eva.orgasme.active) ? 'EVA 💋' : 'EVA', 0, 38);

            // BD / comic character shout bubble next to Eva
            if (eva.shout && eva.shout.t > 0) {
                ctx.save();
                const a = Math.min(1, eva.shout.t * 3);
                ctx.globalAlpha = a;
                ctx.shadowColor = eva.shout.color;
                ctx.shadowBlur = 16;
                const fs = Math.round(bf.W * 0.042);
                ctx.font = `bold italic ${fs}px Inter, sans-serif`;
                ctx.textAlign = 'left';
                ctx.lineWidth = 3.5;
                ctx.strokeStyle = '#0a020f';
                ctx.strokeText(eva.shout.text, 22, -26);
                ctx.fillStyle = '#ffffff';
                ctx.fillText(eva.shout.text, 22, -26);
                ctx.fillStyle = eva.shout.color;
                ctx.fillText(eva.shout.text, 21, -27);
                ctx.restore();
            }

            ctx.restore();
        }

        function bfDrawMalus(ctx, malus, time) {
            ctx.save();
            const fy = Math.sin(time * 2) * 6;
            ctx.translate(malus.x, malus.y + fy);
            if (malus.hurt > 0) ctx.globalAlpha = 0.5 + Math.sin(time * 30) * 0.3;
            ctx.shadowColor = malus.phase === 3 ? '#ef4444' : malus.phase === 2 ? '#f87171' : '#c4263d';
            ctx.shadowBlur = malus.phase === 3 ? 40 : malus.phase === 2 ? 30 : 20;
            const ag = ctx.createRadialGradient(0, 0, 5, 0, 0, 38);
            ag.addColorStop(0, malus.phase === 3 ? '#ef4444' : malus.phase === 2 ? '#dc2626' : malus.phase === 1 ? '#8b1a2e' : '#2a0a30');
            ag.addColorStop(0.5, malus.phase === 3 ? '#7f1d1d' : malus.phase === 2 ? '#450a0a' : '#1a0520');
            ag.addColorStop(1, 'rgba(10,2,15,0)');
            ctx.fillStyle = ag;
            // Body
            ctx.beginPath();
            const bp = malus.phase === 3 ? 18 : malus.phase === 2 ? 16 : 12;
            for (let i = 0; i < bp; i++) {
                const a = (i / bp) * Math.PI * 2;
                const r = 28 + Math.sin(time * (3 + malus.phase * 2) + i * 1.5) * (7 + malus.phase * 3);
                const px = Math.cos(a) * r, py = Math.sin(a) * r * 0.8;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath(); ctx.fill();
            // Core
            ctx.fillStyle = malus.phase === 3 ? '#991b1b' : malus.phase === 2 ? '#7f1d1d' : malus.phase === 1 ? '#4a0f1a' : '#0d0418';
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 25, 0, 0, Math.PI * 2); ctx.fill();
            // Eyes (track Eva)
            const eAngle = Math.atan2(bf.eva.y - (malus.y + fy), bf.eva.x - malus.x);
            const lkX = Math.cos(eAngle) * 1.5, lkY = Math.sin(eAngle) * 0.8;
            ctx.shadowColor = malus.phase === 3 ? '#fca5a5' : malus.phase === 2 ? '#ef4444' : '#f87171';
            ctx.shadowBlur = malus.phase === 3 ? 25 : malus.phase === 2 ? 18 : 12;
            ctx.fillStyle = malus.hurt > 0 ? '#fff' : (malus.phase === 3 ? '#fff' : malus.phase === 2 ? '#fca5a5' : '#ef4444');
            const eS = malus.phase === 3 ? 5 : malus.phase === 2 ? 4.2 : 3.5;
            ctx.beginPath(); ctx.ellipse(-7 + lkX, -4 + lkY, eS, eS * 0.7, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(7 + lkX, -4 + lkY, eS, eS * 0.7, 0, 0, Math.PI * 2); ctx.fill();
            // Tendrils
            const tc = 4 + malus.phase * 2;
            ctx.strokeStyle = malus.phase === 3 ? 'rgba(239,68,68,0.7)' : malus.phase === 2 ? 'rgba(239,68,68,0.5)' : malus.phase === 1 ? 'rgba(196,38,61,0.5)' : 'rgba(74,16,37,0.3)';
            ctx.lineWidth = 1.5; ctx.shadowBlur = 4;
            for (let i = 0; i < tc; i++) {
                const a = (i / tc) * Math.PI + Math.PI * 0.5;
                const w = Math.sin(time * (2 + malus.phase) + i * 2) * (8 + malus.phase * 3);
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 22, Math.sin(a) * 18);
                ctx.quadraticCurveTo(Math.cos(a) * 36 + w, Math.sin(a) * 32,
                    Math.cos(a) * (45 + malus.phase * 10) + w * 1.5, Math.sin(a) * (42 + malus.phase * 5));
                ctx.stroke();
            }
            // Pause indicator
            if (malus.phase === 3 && malus.isPaused) {
                ctx.globalAlpha = 0.5 + Math.sin(time * 8) * 0.3;
                ctx.fillStyle = '#ef4444';
                ctx.font = `bold ${bf.W * 0.035}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('...', 0, -45);
            }
            // Name
            if (malus.hp > 0) {
                ctx.shadowBlur = 0; ctx.globalAlpha = 0.6;
                ctx.fillStyle = malus.phase === 3 ? '#fff' : malus.phase === 2 ? '#fca5a5' : '#c4263d';
                ctx.font = `600 ${bf.W * 0.025}px Cinzel, serif`;
                ctx.textAlign = 'center';
                ctx.fillText('MALUS', 0, 45);
            }
            ctx.restore();
        }

        function bfDrawOrb(ctx, p) {
            ctx.save(); ctx.translate(p.x, p.y);
            const g = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
            g.addColorStop(0, p.spiral ? '#a855f7' : '#c4263d');
            g.addColorStop(0.5, p.spiral ? '#7c3aed' : '#8b1a2e');
            g.addColorStop(1, 'rgba(139,26,46,0)');
            ctx.shadowColor = p.spiral ? '#a855f7' : '#c4263d'; ctx.shadowBlur = 12;
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = p.spiral ? '#c4b5fd' : '#ef4444';
            ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.fill();
            if (p.spiral) {
                ctx.globalAlpha = 0.3; ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(0, 0, p.r + 3, 0, Math.PI * 1.5); ctx.stroke();
            }
            ctx.restore();
        }

        function bfDrawLightning(ctx, p, eva, malus) {
            if (p.t > p.dur) return;
            ctx.save();
            ctx.globalAlpha = (1 - p.t / p.dur) * (p.inCone ? 1 : 0.3);
            ctx.strokeStyle = p.inCone ? '#facc15' : '#666';
            ctx.lineWidth = p.inCone ? 2.5 : 1.5;
            ctx.shadowColor = p.inCone ? '#facc15' : '#444'; ctx.shadowBlur = p.inCone ? 18 : 6;
            // Cone indicator flash
            if (p.t < 0.1) {
                ctx.save();
                ctx.globalAlpha *= 0.25;
                ctx.beginPath(); ctx.moveTo(eva.x, eva.y - 22);
                const cL = 120, cH = Math.PI / 4;
                ctx.lineTo(eva.x + Math.cos(-Math.PI / 2 - cH) * cL, eva.y - 22 + Math.sin(-Math.PI / 2 - cH) * cL);
                ctx.lineTo(eva.x + Math.cos(-Math.PI / 2 + cH) * cL, eva.y - 22 + Math.sin(-Math.PI / 2 + cH) * cL);
                ctx.closePath();
                ctx.fillStyle = p.inCone ? 'rgba(250,204,21,0.1)' : 'rgba(100,100,100,0.05)';
                ctx.fill();
                ctx.restore();
                ctx.globalAlpha = (1 - p.t / p.dur) * (p.inCone ? 1 : 0.3);
            }
            // Lightning bolt
            const tX = p.inCone ? malus.x : eva.x + (Math.random() - 0.5) * 80;
            const tY = p.inCone ? malus.y : eva.y - 80;
            ctx.beginPath(); ctx.moveTo(eva.x, eva.y - 22);
            for (let i = 1; i <= 6; i++) {
                const r = i / 6;
                ctx.lineTo(eva.x + (tX - eva.x) * r + (Math.random() - 0.5) * 28,
                    (eva.y - 22) + (tY - eva.y + 22) * r + (Math.random() - 0.5) * 12);
            }
            ctx.stroke();
            if (p.inCone) {
                ctx.lineWidth = 1; ctx.globalAlpha *= 0.5;
                ctx.beginPath(); ctx.moveTo(eva.x + 3, eva.y - 20);
                for (let i = 1; i <= 6; i++) {
                    const r = i / 6;
                    ctx.lineTo(eva.x + (malus.x - eva.x) * r + (Math.random() - 0.5) * 35,
                        (eva.y - 20) + (malus.y - eva.y + 20) * r + (Math.random() - 0.5) * 18);
                }
                ctx.stroke();
            }
            ctx.restore();
        }

        function bfDrawBottle(ctx, p) {
            ctx.save();
            ctx.translate(p.x, p.y); ctx.rotate(p.spin || 0);
            ctx.shadowColor = '#a78bfa'; ctx.shadowBlur = 14;
            ctx.fillStyle = '#c4b5fd';
            ctx.beginPath(); ctx.roundRect(-5, -6, 10, 14, 2); ctx.fill();
            ctx.fillStyle = '#ddd6fe'; ctx.fillRect(-3, -10, 6, 5);
            ctx.fillStyle = '#7c3aed';
            ctx.beginPath(); ctx.roundRect(-4, -13, 8, 4, 1); ctx.fill();
            ctx.fillStyle = '#a78bfa'; ctx.globalAlpha = 0.6;
            ctx.beginPath(); ctx.arc(0, -15, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function bfDrawMoonBlade(ctx, p) {
            ctx.save();
            const age = Math.min(1, p.t / 0.12);
            const fade = Math.max(0, 1 - p.t / p.dur);
            const alpha = age * fade;
            ctx.globalAlpha = alpha;

            // Translate to projectile center and spin
            ctx.translate(p.x, p.y);
            ctx.rotate(bf.time * 6);

            // ── trailing stardust ──
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 3; i++) {
                const ta = Math.random() * Math.PI * 2;
                const tr = p.r * (0.6 + Math.random() * 0.7);
                const sg = ctx.createRadialGradient(Math.cos(ta) * tr * 0.3, Math.sin(ta) * tr * 0.3, 0, 0, 0, tr);
                sg.addColorStop(0, 'rgba(219,234,254,0.18)');
                sg.addColorStop(1, 'rgba(147,197,253,0)');
                ctx.fillStyle = sg;
                ctx.beginPath(); ctx.arc(0, 0, tr, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';

            // ── outer corona ──
            ctx.shadowColor = '#93c5fd'; ctx.shadowBlur = 38;
            const corona = ctx.createRadialGradient(0, 0, p.r * 0.5, 0, 0, p.r * 1.7);
            corona.addColorStop(0, 'rgba(147,197,253,0.18)');
            corona.addColorStop(0.5, 'rgba(96,165,250,0.08)');
            corona.addColorStop(1, 'rgba(59,130,246,0)');
            ctx.fillStyle = corona;
            ctx.beginPath(); ctx.arc(0, 0, p.r * 1.7, 0, Math.PI * 2); ctx.fill();

            // ── crescent body (using winding rule: outer circle clockwise, inner circle counter-clockwise) ──
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#bfdbfe';
            ctx.beginPath();
            ctx.arc(0, 0, p.r, 0, Math.PI * 2, false);
            ctx.arc(p.r * 0.42, -p.r * 0.08, p.r * 0.82, Math.PI * 2, 0, true);
            ctx.fill();

            // ── inner highlight ──
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#e0f2fe';
            ctx.beginPath();
            ctx.arc(-p.r * 0.18, 0, p.r * 0.28, 0, Math.PI * 2);
            ctx.fill();

            // ── star sparkles orbiting the moon ──
            ctx.shadowColor = '#dbeafe'; ctx.shadowBlur = 8;
            const nStars = 5;
            for (let i = 0; i < nStars; i++) {
                const sa = (i / nStars) * Math.PI * 2 + bf.time * 1.8;
                const sd = p.r * 1.45 + Math.sin(bf.time * 3 + i) * p.r * 0.15;
                const sx = Math.cos(sa) * sd;
                const sy = Math.sin(sa) * sd;
                const ss = 1.5 + Math.sin(bf.time * 4 + i * 1.3) * 1;
                ctx.fillStyle = '#dbeafe';
                ctx.globalAlpha = alpha * (0.5 + Math.sin(bf.time * 5 + i) * 0.3);
                ctx.beginPath(); ctx.arc(sx, sy, ss, 0, Math.PI * 2); ctx.fill();
            }

            ctx.restore();
        }

        function bfDrawLaser(ctx, p, H) {
            ctx.save();
            if (p.t <= p.chargeDur) {
                const ratio = p.t / p.chargeDur;
                ctx.strokeStyle = `rgba(239, 68, 68, ${0.3 + ratio * 0.5})`;
                ctx.lineWidth = 1 + ratio * 2;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.targetX, H);
                ctx.stroke();
                ctx.setLineDash([]);
            } else if (p.t <= p.chargeDur + p.fireDur) {
                const fRatio = (p.t - p.chargeDur) / p.fireDur;
                const alpha = Math.sin(fRatio * Math.PI);
                ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 20;
                ctx.strokeStyle = `rgba(239, 68, 68, ${alpha})`;
                ctx.lineWidth = 28 * alpha;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.targetX, H);
                ctx.stroke();
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.lineWidth = 8 * alpha;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.targetX, H);
                ctx.stroke();
            }
            ctx.restore();
        }

        function bfDrawOrgasmeRing(ctx, eva, time) {
            ctx.save();
            const r = 42;
            const pulse = 1 + Math.sin(time * 8) * 0.07;

            // ── Outer glow ring ──
            ctx.shadowColor = '#f472b6'; ctx.shadowBlur = 25;
            ctx.globalAlpha = 0.5 + Math.sin(time * 6) * 0.15;
            ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(eva.x, eva.y, r * pulse, 0, Math.PI * 2); ctx.stroke();

            // ── Inner radial fill ──
            ctx.globalAlpha = 0.08 + Math.sin(time * 4) * 0.04;
            const rg = ctx.createRadialGradient(eva.x, eva.y, 0, eva.x, eva.y, r);
            rg.addColorStop(0, 'rgba(244,114,182,0.6)'); rg.addColorStop(1, 'rgba(244,114,182,0)');
            ctx.fillStyle = rg;
            ctx.beginPath(); ctx.arc(eva.x, eva.y, r, 0, Math.PI * 2); ctx.fill();

            // ── Spinning 💋 orbit ──
            ctx.globalAlpha = 0.45; ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2 + time * 2;
                const x = eva.x + Math.cos(a) * r * 0.85;
                const y = eva.y + Math.sin(a) * r * 0.85;
                ctx.fillStyle = '#fda4af';
                ctx.font = '10px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('💋', x, y);
            }
            ctx.globalCompositeOperation = 'source-over';

            // ── Vibrating parametric heart ──
            // The heart uses the parametric eq: x=16sin³(t), y=13cos(t)-5cos(2t)-2cos(3t)-cos(4t)
            // We scale it and apply a vibration + pulsation
            ctx.save();
            const hScale = (18 + Math.sin(time * 14) * 3) * (1 + Math.sin(time * 5) * 0.08);
            const hX = eva.x;
            const hY = eva.y - 4;  // slightly above center

            // Outer glow pass (additive)
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = 0.4 + Math.sin(time * 7) * 0.15;
            ctx.shadowColor = '#ec4899'; ctx.shadowBlur = 35;
            ctx.fillStyle = '#ec4899';
            ctx.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.05) {
                const hx = hX + (16 * Math.pow(Math.sin(t), 3)) * hScale * 0.065;
                const hy = hY - (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * hScale * 0.065;
                t < 0.01 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
            }
            ctx.closePath(); ctx.fill();

            // Sharp stroke pass
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
            ctx.shadowColor = '#f472b6'; ctx.shadowBlur = 20;
            ctx.strokeStyle = '#f9a8d4'; ctx.lineWidth = 3.2;
            ctx.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.04) {
                const hx = hX + (16 * Math.pow(Math.sin(t), 3)) * hScale * 0.065;
                const hy = hY - (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * hScale * 0.065;
                t < 0.01 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
            }
            ctx.closePath(); ctx.stroke();

            // Highlight fill (bright centre)
            ctx.globalAlpha = 0.45 + Math.sin(time * 9) * 0.15;
            ctx.fillStyle = '#fce7f3';
            ctx.beginPath();
            for (let t = 0; t <= Math.PI * 2; t += 0.07) {
                const hx = hX + (16 * Math.pow(Math.sin(t), 3)) * hScale * 0.035;
                const hy = hY - (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * hScale * 0.035;
                t < 0.01 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
            }
            ctx.closePath(); ctx.fill();

            ctx.restore();
            ctx.restore();
        }

        function bfDrawHUD(ctx, W, eva, malus) {
            const bw = W * 0.35, bh = 10, y = 16, pad = 10;
            ctx.shadowBlur = 0;
            // Eva HP
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.roundRect(pad, y, bw, bh, 4); ctx.fill();
            const eg = ctx.createLinearGradient(pad, 0, pad + bw, 0);
            const orgActive = eva.orgasme && eva.orgasme.active;
            if (orgActive) { eg.addColorStop(0, '#f472b6'); eg.addColorStop(1, '#ec4899'); }
            else { eg.addColorStop(0, '#f2d06b'); eg.addColorStop(1, '#c9a84c'); }
            ctx.fillStyle = eg;
            ctx.beginPath(); ctx.roundRect(pad, y, bw * Math.max(0, eva.hp / eva.maxHp), bh, 4); ctx.fill();
            ctx.strokeStyle = (eva.orgasme && eva.orgasme.active) ? 'rgba(244,114,182,0.5)' : 'rgba(201,168,76,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(pad, y, bw, bh, 4); ctx.stroke();
            ctx.fillStyle = (eva.orgasme && eva.orgasme.active) ? '#f472b6' : '#f2d06b';
            ctx.font = `700 ${W * 0.026}px Inter, sans-serif`;
            ctx.textAlign = 'left';
            ctx.fillText(`Eva  ${eva.hp}/${eva.maxHp}`, pad, y - 4);
            // Orgasme timer
            if (eva.orgasme && eva.orgasme.active) {
                ctx.fillStyle = '#fda4af';
                ctx.font = `600 ${W * 0.02}px Inter, sans-serif`;
                ctx.fillText(`💋 ${eva.orgasme.timer.toFixed(1)}s`, pad + bw + 5, y + bh - 1);
            }
            // Malus HP
            const mx = W - pad - bw;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.roundRect(mx, y, bw, bh, 4); ctx.fill();
            const mg = ctx.createLinearGradient(mx, 0, mx + bw, 0);
            if (malus.phase === 3) { mg.addColorStop(0, '#ef4444'); mg.addColorStop(1, '#991b1b'); }
            else if (malus.phase === 2) { mg.addColorStop(0, '#ef4444'); mg.addColorStop(1, '#dc2626'); }
            else { mg.addColorStop(0, '#c4263d'); mg.addColorStop(1, '#8b1a2e'); }
            ctx.fillStyle = mg;
            ctx.beginPath(); ctx.roundRect(mx, y, bw * Math.max(0, malus.hp / malus.maxHp), bh, 4); ctx.fill();
            ctx.strokeStyle = malus.phase >= 2 ? 'rgba(239,68,68,0.5)' : 'rgba(196,38,61,0.4)';
            ctx.beginPath(); ctx.roundRect(mx, y, bw, bh, 4); ctx.stroke();
            ctx.fillStyle = malus.phase === 3 ? '#fff' : malus.phase === 2 ? '#fca5a5' : '#ef4444';
            ctx.textAlign = 'right';
            ctx.fillText(`Malus  ${malus.hp}/${malus.maxHp}`, W - pad, y - 4);
            // Break Bar
            if (malus.hp > 0 && malus.breakMax > 0) {
                const bY = y + bh + 3;
                const bH = 5;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath(); ctx.roundRect(mx, bY, bw, bH, 2); ctx.fill();
                if (malus.isStunned) {
                    ctx.fillStyle = '#facc15';
                    ctx.globalAlpha = 0.6 + Math.sin(bf.time * 15) * 0.4;
                    ctx.beginPath(); ctx.roundRect(mx, bY, bw * (malus.stunTimer / 1.5), bH, 2); ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.font = `800 ${W * 0.017}px Inter, sans-serif`;
                    ctx.fillStyle = '#facc15';
                    ctx.fillText('💥 BREAK ! IMMOBILISÉ', W - pad, bY + bH + 11);
                } else {
                    ctx.fillStyle = '#eab308';
                    ctx.beginPath(); ctx.roundRect(mx, bY, bw * Math.min(1, malus.breakHp / malus.breakMax), bH, 2); ctx.fill();
                    if (malus.phase >= 1) {
                        ctx.font = `600 ${W * 0.018}px Inter, sans-serif`;
                        ctx.fillStyle = malus.phase === 3 ? '#ef4444' : malus.phase === 2 ? '#fca5a5' : '#f87171';
                        ctx.globalAlpha = 0.6 + Math.sin(bf.time * 4) * 0.2;
                        const phaseText = malus.phase === 3 ? '💀 ULTIME' : malus.phase === 2 ? '🔥 RAGE' : '⚠️ ENRAGÉ';
                        ctx.fillText(phaseText, W - pad, bY + bH + 13);
                        ctx.globalAlpha = 1;
                    }
                }
            } else if (malus.phase >= 1 && malus.hp > 0) {
                ctx.font = `600 ${W * 0.018}px Inter, sans-serif`;
                ctx.fillStyle = malus.phase === 3 ? '#ef4444' : malus.phase === 2 ? '#fca5a5' : '#f87171';
                ctx.globalAlpha = 0.6 + Math.sin(bf.time * 4) * 0.2;
                const phaseText = malus.phase === 3 ? '💀 ULTIME' : malus.phase === 2 ? '🔥 RAGE' : '⚠️ ENRAGÉ';
                ctx.fillText(phaseText, W - pad, y + bh + 14);
                ctx.globalAlpha = 1;
            }
            // Difficulty badge (centred top)
            if (bf.diffLabel) {
                ctx.font = `600 ${W * 0.019}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillStyle = bf.difficulty === 'easy' ? '#4ade80' : bf.difficulty === 'normal' ? '#facc15' : '#ef4444';
                ctx.globalAlpha = 0.55;
                ctx.fillText(bf.diffLabel, W / 2, y + bh - 1);
                ctx.globalAlpha = 1;
            }
        }


        /* ─────────────────────────────────────────────────────────────
           BOOT 🚀
        ────────────────────────────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', init);
    </script>
