        /* ─────────────────────────────────────────────────────────────
           LIGHTBOX & INTERACTIVE ZOOM
        ────────────────────────────────────────────────────────────── */
        let _lbZoom = 1;
        let _lbPanX = 0;
        let _lbPanY = 0;
        let _lbIsDragging = false;
        let _lbStartX = 0;
        let _lbStartY = 0;

        function openLightbox(src) {
            const $lb = document.getElementById('image-lightbox');
            const $img = document.getElementById('lightbox-img');
            if ($lb && $img) {
                _lbZoom = 1;
                _lbPanX = 0;
                _lbPanY = 0;
                $img.src = src;
                $lb.style.display = 'flex';
                updateLightboxTransform(false);
                setTimeout(() => updateLightboxTransform(true), 10);
            }
        }

        function closeLightbox() {
            const $lb = document.getElementById('image-lightbox');
            const $img = document.getElementById('lightbox-img');
            if ($lb && $img) {
                $img.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    $lb.style.display = 'none';
                    _lbZoom = 1;
                    _lbPanX = 0;
                    _lbPanY = 0;
                }, 150);
            }
        }

        function handleLightboxBackgroundClick(event) {
            if (event.target.id === 'image-lightbox' || event.target.id === 'lightbox-img-wrapper') {
                closeLightbox();
            }
        }

        function toggleImageZoom(event) {
            if (event && event.stopPropagation) event.stopPropagation();
            if (_lbIsDragging) return; // Don't  toggle if we were panning

            if (_lbZoom > 1) {
                resetLightboxZoom();
            } else {
                _lbZoom = 2.5;
                updateLightboxTransform(true);
            }
        }

        function zoomLightbox(delta) {
            _lbZoom = Math.max(1, Math.min(5, _lbZoom + delta));
            updateLightboxTransform(true);
        }

        function resetLightboxZoom() {
            _lbZoom = 1;
            _lbPanX = 0;
            _lbPanY = 0;
            updateLightboxTransform(true);
        }

        function updateLightboxTransform(smooth) {
            const $img = document.getElementById('lightbox-img');
            const $disp = document.getElementById('zoom-level-display');
            if (!$img) return;

            if (_lbZoom <= 1) {
                _lbZoom = 1;
                _lbPanX = 0;
                _lbPanY = 0;
            }

            $img.style.transition = smooth ? 'transform 0.25s cubic-bezier(0.25, 1, 0.5, 1)' : 'none';
            $img.style.transform = `scale(${_lbZoom}) translate(${_lbPanX}px, ${_lbPanY}px)`;
            $img.style.cursor = _lbZoom > 1 ? 'grab' : 'zoom-in';

            if ($disp) $disp.textContent = Math.round(_lbZoom * 100) + '%';
        }

        // Pan and drag handling for zoomed image
        document.addEventListener('DOMContentLoaded', () => {
            const $img = document.getElementById('lightbox-img');
            const $lb = document.getElementById('image-lightbox');
            if (!$img || !$lb) return;

            $img.addEventListener('mousedown', (e) => {
                if (_lbZoom <= 1) return;
                e.preventDefault();
                _lbIsDragging = false;
                _lbStartX = e.clientX - _lbPanX * _lbZoom;
                _lbStartY = e.clientY - _lbPanY * _lbZoom;
                $img.style.cursor = 'grabbing';
                $img.style.transition = 'none';
            });

            window.addEventListener('mousemove', (e) => {
                if (e.buttons !== 1 || _lbZoom <= 1 || $img.style.cursor !== 'grabbing') return;
                const dx = e.clientX - (_lbStartX + _lbPanX * _lbZoom);
                const dy = e.clientY - (_lbStartY + _lbPanY * _lbZoom);
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) _lbIsDragging = true;
                _lbPanX = (e.clientX - _lbStartX) / _lbZoom;
                _lbPanY = (e.clientY - _lbStartY) / _lbZoom;
                $img.style.transform = `scale(${_lbZoom}) translate(${_lbPanX}px, ${_lbPanY}px)`;
            });

            window.addEventListener('mouseup', () => {
                if (_lbZoom > 1) $img.style.cursor = 'grab';
            });

            // Touch support for mobile dragging
            $img.addEventListener('touchstart', (e) => {
                if (_lbZoom <= 1 || !e.touches[0]) return;
                _lbIsDragging = false;
                _lbStartX = e.touches[0].clientX - _lbPanX * _lbZoom;
                _lbStartY = e.touches[0].clientY - _lbPanY * _lbZoom;
                $img.style.transition = 'none';
            }, { passive: true });

            $img.addEventListener('touchmove', (e) => {
                if (_lbZoom <= 1 || !e.touches[0]) return;
                const touch = e.touches[0];
                const dx = touch.clientX - (_lbStartX + _lbPanX * _lbZoom);
                const dy = touch.clientY - (_lbStartY + _lbPanY * _lbZoom);
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) _lbIsDragging = true;
                _lbPanX = (touch.clientX - _lbStartX) / _lbZoom;
                _lbPanY = (touch.clientY - _lbStartY) / _lbZoom;
                $img.style.transform = `scale(${_lbZoom}) translate(${_lbPanX}px, ${_lbPanY}px)`;
            }, { passive: true });

            // Wheel zoom
            $lb.addEventListener('wheel', (e) => {
                if ($lb.style.display !== 'flex') return;
                e.preventDefault();
                const delta = e.deltaY < 0 ? 0.25 : -0.25;
                zoomLightbox(delta);
            }, { passive: false });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === '+' || e.key === '=') zoomLightbox(0.25);
            if (e.key === '-' || e.key === '_') zoomLightbox(-0.25);
            if (e.key === '0' || e.key === 'r') resetLightboxZoom();
        });

        function tickLockCountdown() {

        /* ─────────────────────────────────────────────────────────────
           END SCREENS
        ────────────────────────────────────────────────────────────── */
        function renderVictory() {
            showHeader();
            if ($stepCur) $stepCur.textContent = enigmes.length;
            if ($progress) $progress.style.width = '100%';

            $app.innerHTML = `
        <div class="end-screen victory">

          <div class="luxury-card">
            <h1 class="title-main">Le trésor</h1>   
            <div class="separator-ornate">✦</div>
            
            <div class="victory-image-wrapper">
              <img src="assets/final_cylumes.jpeg" alt="Le trésor" class="victory-image">
            </div>

            <div class="final-clue-box" style="margin: 24px 0 0 0; padding: 20px; background: radial-gradient(circle at center, rgba(201, 168, 76, 0.2), rgba(10, 8, 14, 0.8)); border: 1px solid rgba(254, 240, 138, 0.6); border-radius: var(--radius-md); box-shadow: 0 0 25px rgba(201, 168, 76, 0.25);">
              <h3 style="color: #fef08a; font-family: var(--font-display); font-size: 1.15rem; margin-bottom: 10px; text-shadow: 0 0 12px rgba(201,168,76,0.9); letter-spacing: 1px;">🔑 L'ULTIME INDICE</h3>
              <p style="font-size: 1.1rem; color: #ffffff; margin-bottom: 0; font-style: normal; line-height: 1.6;">Retourne sur les lieux de notre premier baiser.</p>
            </div>

            <div class="viens-seule-container">
              <canvas id="viens-seule-canvas"></canvas>
            </div>
          </div>

          <div style="margin-top: 30px;">
            <button class="btn btn-primary" onclick="resetGame()">🔄 Recommencer l'aventure ↗</button>
          </div>
        </div>
      `;

            // --- CANVAS PARTICLES OF HEARTS FOR "VIENS SEULE" ---
            if (window.viensSeuleAnimId) {
                cancelAnimationFrame(window.viensSeuleAnimId);
            }

            const canvas = document.getElementById('viens-seule-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const width = 380;
            const height = 90;
            const dpr = window.devicePixelRatio || 1;

            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);

            // 1. Pré-rendu de 3 styles de cœurs scintillants sur des canvas hors-écran
            const heartCanvases = [];
            const heartColors = ['#f2d06b', '#c4db58', '#34d399']; // Or, Vert doré (lime), Vert Cylume

            for (const color of heartColors) {
                const hc = document.createElement('canvas');
                hc.width = 16;
                hc.height = 16;
                const hctx = hc.getContext('2d');
                hctx.fillStyle = color;

                // Effet de halo lumineux doux pré-rendu
                hctx.shadowColor = color;
                hctx.shadowBlur = 4;

                // Tracé d'un joli cœur centré dans l'espace 16x16
                hctx.beginPath();
                hctx.moveTo(8, 4.5);
                hctx.bezierCurveTo(8, 2, 3, 2, 3, 5.5);
                hctx.bezierCurveTo(3, 9.5, 8, 14, 8, 14);
                hctx.bezierCurveTo(8, 14, 13, 9.5, 13, 5.5);
                hctx.bezierCurveTo(13, 2, 8, 2, 8, 4.5);
                hctx.fill();

                heartCanvases.push(hc);
            }

            // 2. Rendu du texte cible hors-écran pour extraire les coordonnées des points
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tCtx = tempCanvas.getContext('2d');

            tCtx.fillStyle = '#ffffff';
            tCtx.font = "bold 34px 'Cinzel', serif";
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.letterSpacing = "6px";
            tCtx.fillText("VIENS SEULE", width / 2, height / 2);

            const imgData = tCtx.getImageData(0, 0, width, height);
            const pixels = imgData.data;
            const targetPoints = [];

            // Balayage optimisé pour aligner parfaitement les particules avec le texte de fond
            for (let y = 0; y < height; y += 4) {
                for (let x = 0; x < width; x += 4) {
                    const idx = (y * width + x) * 4;
                    const alpha = pixels[idx + 3];
                    if (alpha > 128) {
                        targetPoints.push({ x, y });
                    }
                }
            }

            // Attente du montage complet pour obtenir la position réelle du canvas dans la fenêtre
            setTimeout(() => {
                const rect = canvas.getBoundingClientRect();

                // 3. Création des particules avec position de départ aléatoire sur l'ÉCRAN entier
                const particles = [];
                for (const pt of targetPoints) {
                    const startX = Math.random() * window.innerWidth - rect.left;
                    const startY = Math.random() * window.innerHeight - rect.top;

                    particles.push({
                        x: startX,
                        y: startY,
                        tx: pt.x,
                        ty: pt.y,
                        size: Math.random() * 3 + 4, // Taille entre 4px et 7px
                        colorIdx: Math.floor(Math.random() * heartColors.length),
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.015 + Math.random() * 0.02, // Vitesse progressive et douce
                        driftRadius: 1 + Math.random() * 1.5
                    });
                }

                const startTime = Date.now();

                // 4. Boucle de rendu optimisée
                function draw() {
                    ctx.clearRect(0, 0, width, height);
                    const time = Date.now() * 0.0018; // Vitesse d'oscillation lente
                    const elapsedSeconds = (Date.now() - startTime) / 1000;

                    // Le texte doré en arrière-plan ne s'affiche et ne scintille qu'après 20 secondes
                    if (elapsedSeconds >= 20) {
                        const fadeInFactor = Math.min(1, (elapsedSeconds - 20) / 2); // Fondu sur 2 secondes

                        // Rendu d'une silhouette dorée floue sous les particules pour améliorer la lisibilité
                        ctx.fillStyle = '#f2d06b';
                        ctx.font = "bold 34px 'Cinzel', serif";
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.letterSpacing = "6px";

                        // Opacité pulsant doucement (scintillement lent et très fluide)
                        const textAlpha = (0.08 + Math.sin(time * 0.5) * 0.04) * fadeInFactor;
                        ctx.globalAlpha = textAlpha;

                        // Halo de lueur doré sous le texte
                        ctx.shadowColor = '#f2d06b';
                        ctx.shadowBlur = 8;

                        ctx.fillText("VIENS SEULE", width / 2, height / 2);

                        // Réinitialisation de la lueur pour les performances du tracé des particules
                        ctx.shadowBlur = 0;
                    }

                    for (let i = 0; i < particles.length; i++) {
                        const p = particles[i];

                        // Convergence vers le point cible
                        const dx = p.tx - p.x;
                        const dy = p.ty - p.y;

                        // Déplacement ondulatoire organique (flottement)
                        const driftX = Math.sin(time + p.phase) * p.driftRadius;
                        const driftY = Math.cos(time * 0.8 + p.phase) * p.driftRadius;

                        // Évite Math.hypot() pour optimiser le CPU
                        const distSq = dx * dx + dy * dy;
                        if (distSq > 0.25) {
                            p.x += dx * p.speed;
                            p.y += dy * p.speed;
                        } else {
                            p.x = p.tx + driftX;
                            p.y = p.ty + driftY;
                        }

                        // Le scintillement des particules ne démarre qu'après 20 secondes
                        let alpha = 0.85;
                        if (elapsedSeconds >= 20) {
                            const shimmerFactor = Math.min(1, (elapsedSeconds - 20) / 2);
                            const targetAlpha = 0.55 + Math.sin(time * 1.5 + p.phase) * 0.45;
                            alpha = 0.85 + (targetAlpha - 0.85) * shimmerFactor;
                        }
                        ctx.globalAlpha = alpha;

                        const heartImg = heartCanvases[p.colorIdx];
                        ctx.drawImage(heartImg, p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                    }

                    ctx.globalAlpha = 1.0;

                    // Condition de sortie : arrêt si le canvas n'est plus présent dans le DOM
                    if (document.getElementById('viens-seule-canvas')) {
                        window.viensSeuleAnimId = requestAnimationFrame(draw);
                    }
                }

                window.viensSeuleAnimId = requestAnimationFrame(draw);
            }, 150);
        }

        /* ─────────────────────────────────────────────────────────────
           DRAWING CANVAS (for type "drawing")
        ────────────────────────────────────────────────────────────── */
        let canvasCtx = null;
        let isDrawing = false;
        let drawHistory = [];

        function initCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas) return;

            // Set actual size
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;

            canvasCtx = canvas.getContext('2d');
            canvasCtx.scale(2, 2);
            canvasCtx.strokeStyle = '#f1f5f9';
            canvasCtx.lineWidth = 3;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';

            // Save initial state
            drawHistory = [canvasCtx.getImageData(0, 0, canvas.width, canvas.height)];

            // Pointer events
            canvas.addEventListener('pointerdown', (e) => {
                isDrawing = true;
                canvasCtx.beginPath();
                const pos = getCanvasPos(canvas, e);
                canvasCtx.moveTo(pos.x, pos.y);
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!isDrawing) return;
                const pos = getCanvasPos(canvas, e);
                canvasCtx.lineTo(pos.x, pos.y);
                canvasCtx.stroke();
            });

            canvas.addEventListener('pointerup', () => {
                isDrawing = false;
                drawHistory.push(canvasCtx.getImageData(0, 0, canvas.width, canvas.height));
            });

            canvas.addEventListener('pointerleave', () => {
                isDrawing = false;
            });
        }

        function getCanvasPos(canvas, e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function clearCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas || !canvasCtx) return;
            canvasCtx.clearRect(0, 0, canvas.width / 2, canvas.height / 2);
            drawHistory = [canvasCtx.getImageData(0, 0, canvas.width, canvas.height)];
        }

        function undoCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas || !canvasCtx || drawHistory.length <= 1) return;
            drawHistory.pop();
            canvasCtx.putImageData(drawHistory[drawHistory.length - 1], 0, 0);
        }

        function typewriter(element, text, speed = 30, initialDelay = 500, onComplete = null) {
            if (!element) return;
            element.innerHTML = '<span class="tw-text"></span><span class="tw-cursor"></span>';
            const textSpan = element.querySelector('.tw-text');
            let i = 0;
            setTimeout(() => {
                const interval = setInterval(() => {
                    if (i < text.length) {
                        textSpan.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++;
                    } else {
                        clearInterval(interval);
                        const cursor = element.querySelector('.tw-cursor');
                        if (cursor) setTimeout(() => cursor.style.display = 'none', 3000);
                        if (typeof onComplete === 'function') onComplete();
                    }
                }, speed);
            }, initialDelay);
        }

        function initStars(canvasId, options = {}) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const count = options.count || 100;
            const stars = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.8 + 0.2,
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleSpeed: Math.random() * 0.03 + 0.01,
                    twinkleVal: Math.random() * Math.PI
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    star.twinkleVal += star.twinkleSpeed;
                    const currentOpacity = star.opacity * (0.6 + 0.4 * Math.sin(star.twinkleVal));
                    ctx.fillStyle = `rgba(255, 255, 255, ${currentOpacity})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = canvas.height;
                        star.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        function setupBFInput() {
            const base = document.getElementById('bf-joystick-base');
            const knob = document.getElementById('bf-joystick-knob');
            let joyActive = false, joyCX = 0;
            if (base) {
                const jStart = (e) => {
                    e.preventDefault(); joyActive = true;
                    joyCX = base.getBoundingClientRect().left + base.clientWidth / 2;
                    jMove(e);
                };
                const jMove = (e) => {
                    if (!joyActive || !bf) return;
                    const t = e.touches ? e.touches[0] : e;
                    const dx = t.clientX - joyCX;
                    const max = base.clientWidth / 2 - 12;
                    const cl = Math.max(-max, Math.min(max, dx));
                    if (knob) knob.style.transform = `translateX(${cl}px)`;
                    bf.input.moveX = cl / max;
                };
                const jEnd = () => {
                    joyActive = false;
                    if (knob) knob.style.transform = '';
                    if (bf) bf.input.moveX = 0;
                };
                base.addEventListener('touchstart', jStart, { passive: false });
                base.addEventListener('touchmove', jMove, { passive: false });
                base.addEventListener('touchend', jEnd);
                base.addEventListener('touchcancel', jEnd);
                base.addEventListener('mousedown', jStart);
                document.addEventListener('mousemove', (e) => { if (joyActive) jMove(e); });
                document.addEventListener('mouseup', () => { if (joyActive) { joyActive = false; if (knob) knob.style.transform = ''; if (bf) bf.input.moveX = 0; } });
            }
            ['lightning', 'bottle', 'moon', 'shield'].forEach((t, i) => {
                const btn = document.getElementById('bf-btn-' + t);
                if (btn) {
                    btn.addEventListener('touchstart', (e) => { e.preventDefault(); bfDoAttack(i); }, { passive: false });
                    btn.addEventListener('click', () => bfDoAttack(i));
                }
            });
            const kd = (e) => {
                if (!bf || !bf.running) return;
                if (e.key === 'ArrowLeft' || e.key === 'a') bf.input.moveX = -1;
                if (e.key === 'ArrowRight' || e.key === 'd') bf.input.moveX = 1;
                if (e.key === '1' || e.key === 'j') bfDoAttack(0);
                if (e.key === '2' || e.key === 'k') bfDoAttack(1);
                if (e.key === '3' || e.key === 'l') bfDoAttack(2);
                if (e.key === '4' || e.key === 'h') bfDoAttack(3);
            };
            const ku = (e) => {
                if (!bf) return;
                if ((e.key === 'ArrowLeft' || e.key === 'a') && bf.input.moveX < 0) bf.input.moveX = 0;
                if ((e.key === 'ArrowRight' || e.key === 'd') && bf.input.moveX > 0) bf.input.moveX = 0;
            };
            window.addEventListener('keydown', kd);
            window.addEventListener('keyup', ku);
            bf._kd = kd; bf._ku = ku;
        }

        function bfDoAttack(idx) {
            if (!bf || !bf.running || bf.introTimer > 0) return;
            const { eva, malus } = bf;
            if (eva.shield.active && idx !== 3) return;
            if (eva.cd[idx] > 0 || (eva.atk && idx !== 3)) return;

            if (idx === 0) {
                // ⚡ Éclair d'Amour — cone check
                eva.cd[0] = 0.8;
                eva.atk = { type: 'lightning', t: 0, dur: 0.3, dmg: 1 };
                const dx = malus.x - eva.x, dy = malus.y - eva.y;
                const angle = Math.atan2(dy, dx);
                const coneCenter = -Math.PI / 2;
                let angleDiff = angle - coneCenter;
                if (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                if (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                const inCone = Math.abs(angleDiff) < Math.PI / 4;
                bf.projectiles.push({ type: 'lightning', x: eva.x, y: eva.y - 20, t: 0, dur: 0.3, dmg: 1, hit: false, inCone });
                for (let i = 0; i < 8; i++) {
                    const r = i / 8;
                    if (inCone) {
                        bfParticle(eva.x + (malus.x - eva.x) * r, (eva.y - 20) + (malus.y - eva.y + 20) * r,
                            (Math.random() - 0.5) * 80, (Math.random() - 0.5) * 80, 0.4, '#facc15', 3);
                    } else {
                        const sa = coneCenter + (Math.random() - 0.5) * Math.PI / 2;
                        const dist = 30 + Math.random() * 60;
                        bfParticle(eva.x + Math.cos(sa) * dist, eva.y + Math.sin(sa) * dist,
                            Math.cos(sa) * 40, Math.sin(sa) * 40, 0.25, 'rgba(250,204,21,0.4)', 2);
                    }
                }
            } else if (idx === 1) {
                // 🧴 Lancer d'Alcoo Ménager — straight shot
                eva.cd[1] = 2;
                eva.atk = { type: 'bottle', t: 0, dur: 0.4, dmg: 3 };
                bf.projectiles.push({ type: 'bottle', x: eva.x, y: eva.y - 30, vx: 0, vy: -bf.H * 0.95, t: 0, dur: 1.5, dmg: 3, r: 10, hit: false, spin: 0 });
            } else if (idx === 2) {
                // 🌙 Laku Noc — moon blade
                eva.cd[2] = 15;
                eva.atk = { type: 'moon', t: 0, dur: 0.8, dmg: 5 };
                bf.projectiles.push({ type: 'moon', x: eva.x, y: eva.y - 30, vx: 0, vy: -bf.H * 0.85, t: 0, dur: 0.8, dmg: 5, r: 22, hit: false });
                bf.shake = 0.2; bf.flash = 0.1; bf.flashColor = '#93c5fd';
            } else if (idx === 3) {
                // 🤗 Câlin — shield
                if (eva.shield.active) return;
                eva.cd[3] = 30;
                eva.shield = { active: true, timer: 5, healAccum: 0 };
                eva.atk = null;
                bf.flash = 0.15; bf.flashColor = '#f472b6';
                for (let i = 0; i < 25; i++) {
                    const a = (i / 25) * Math.PI * 2;
                    bfParticle(eva.x + Math.cos(a) * 25, eva.y + Math.sin(a) * 25,
                        Math.cos(a) * 50, Math.sin(a) * 50, 0.8,
                        ['#f472b6', '#ec4899', '#fb7185', '#fda4af'][i % 4], 4);
                }
            }
            updateBFBtns();
        }

        function bfMalusAttack(pattern) {
            if (!bf) return;
            const { eva, malus, W, H } = bf;
            const sp = H * 0.42;
            if (pattern === 'aimed') {
                const dx = eva.x - malus.x, dy = eva.y - malus.y;
                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                bf.projectiles.push({ type: 'orb', x: malus.x, y: malus.y + 30, vx: (dx / d) * sp, vy: (dy / d) * sp, r: 8, dmg: 1, t: 0, dur: 3 });
            } else if (pattern === 'spread3') {
                for (let i = -1; i <= 1; i++)
                    bf.projectiles.push({ type: 'orb', x: malus.x, y: malus.y + 30, vx: i * 70, vy: sp, r: 8, dmg: 1, t: 0, dur: 3 });
            } else if (pattern === 'spiral') {
                const sa = malus.spiralAngle || 0;
                for (let i = 0; i < 3; i++) {
                    const a = sa + (i / 3) * Math.PI * 2;
                    bf.projectiles.push({
                        type: 'orb', x: malus.x, y: malus.y + 30,
                        vx: Math.cos(a) * sp * 0.7, vy: Math.sin(a) * sp * 0.7,
                        r: 7, dmg: 1, t: 0, dur: 3.5, spiral: true, baseAngle: a, spd: sp * 0.55
                    });
                }
                malus.spiralAngle = (malus.spiralAngle || 0) + 0.6;
            } else if (pattern === 'sun') {
                const count = malus.phase === 2 ? 14 : 8;
                for (let i = 0; i < count; i++) {
                    const a = (i / count) * Math.PI * 2;
                    bf.projectiles.push({
                        type: 'orb', x: malus.x, y: malus.y + 30,
                        vx: Math.cos(a) * sp * 0.6, vy: Math.sin(a) * sp * 0.6,
                        r: 6, dmg: 1, t: 0, dur: 2.8
                    });
                }
            } else if (pattern === 'wave') {
                const dx = eva.x - malus.x, dy = eva.y - malus.y;
                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                for (let i = -2; i <= 2; i++) {
                    bf.projectiles.push({
                        type: 'orb', x: malus.x + i * 12, y: malus.y + 30,
                        vx: (dx / d) * sp * 0.8, vy: (dy / d) * sp * 0.8,
                        r: 7, dmg: 1, t: 0, dur: 3, wave: true, waveOff: i * 0.4
                    });
                }
            }
            for (let i = 0; i < 4; i++)
                bfParticle(malus.x + (Math.random() - 0.5) * 40, malus.y + 30,
                    (Math.random() - 0.5) * 40, 20 + Math.random() * 30, 0.5, '#c4263d', 4);
        }

        function bfLoop(now) {
            if (!bf) return;
            const dt = Math.min((now - bf._lastT) / 1000, 0.05);
            bf._lastT = now;
            bf.time += dt;
            if (bf.running) bfUpdate(dt);
            bfRender();
            bf._raf = requestAnimationFrame(bfLoop);
        }

        function bfUpdate(dt) {
            const { eva, malus, W, H } = bf;
            if (bf.introTimer > 0) { bf.introTimer -= dt; return; }

            // ── Eva Movement ──
            eva.dir = bf.input.moveX;
            eva.x += eva.dir * eva.speed * dt;
            eva.x = Math.max(20, Math.min(W - 20, eva.x));
            if (eva.dir !== 0) eva.facing = eva.dir > 0 ? 1 : -1;
            eva.inv = Math.max(0, eva.inv - dt);
            eva.anim += dt;
            if (Math.abs(eva.dir) > 0.1) eva.trail.push({ x: eva.x, y: eva.y, a: 0.4 });
            eva.trail = eva.trail.filter(p => (p.a -= dt * 1.5) > 0);
            if (eva.atk) { eva.atk.t += dt; if (eva.atk.t >= eva.atk.dur) eva.atk = null; }
            for (let i = 0; i < 4; i++) {
                const prev = eva.cd[i];
                eva.cd[i] = Math.max(0, eva.cd[i] - dt);
                if (prev > 0 && eva.cd[i] <= 0) {
                    const names = ['lightning', 'bottle', 'moon', 'shield'];
                    const btn = document.getElementById('bf-btn-' + names[i]);
                    if (btn) { btn.classList.remove('bf-ready-flash'); void btn.offsetWidth; btn.classList.add('bf-ready-flash'); }
                }
            }

            // ── Shield Update ──
            if (eva.shield.active) {
                eva.shield.timer -= dt;
                const healRate = 3 / 5;
                eva.shield.healAccum += healRate * dt;
                while (eva.shield.healAccum >= 1 && eva.hp < eva.maxHp) {
                    eva.hp = Math.min(eva.maxHp, eva.hp + 1);
                    eva.shield.healAccum -= 1;
                    bf.dmgTexts.push({ x: eva.x + (Math.random() - 0.5) * 20, y: eva.y - 45, text: '+1 ❤️', color: '#f472b6', t: 1.0 });
                }
                if (Math.random() < 0.35) {
                    const a = Math.random() * Math.PI * 2;
                    bfParticle(eva.x + Math.cos(a) * 28, eva.y - 5 + Math.sin(a) * 22,
                        Math.cos(a) * 12 + (Math.random() - 0.5) * 8, -8 - Math.random() * 12, 0.5, '#f472b6', 2.5);
                }
                if (eva.shield.timer <= 0) {
                    eva.shield.active = false; eva.shield.timer = 0; eva.shield.healAccum = 0;
                }
            }
            updateBFBtns();

            // ── Malus AI ──
            const prevPhase = malus.phase;
            malus.phase = malus.hp <= malus.maxHp * 0.1 ? 2 : malus.hp <= malus.maxHp * 0.5 ? 1 : 0;
            // Phase transition effect
            if (malus.phase > prevPhase) {
                bf.shake = 0.8; bf.flash = 0.5;
                bf.flashColor = malus.phase === 2 ? '#c4263d' : '#8b1a2e';
                for (let i = 0; i < 35; i++) {
                    const a = (i / 35) * Math.PI * 2, spd = 80 + Math.random() * 180;
                    bfParticle(malus.x, malus.y, Math.cos(a) * spd, Math.sin(a) * spd, 1.2,
                        malus.phase === 2
                            ? ['#ef4444', '#dc2626', '#f87171', '#fca5a5'][i % 4]
                            : ['#c4263d', '#8b1a2e', '#4a0f1a', '#ef4444'][i % 4], 6);
                }
            }

            malus.hurt = Math.max(0, malus.hurt - dt);
            malus.anim += dt;
            malus.moveTimer -= dt;
            if (malus.moveTimer <= 0) {
                malus.moveTarget = 40 + Math.random() * (W - 80);
                malus.moveTimer = malus.phase === 2 ? 0.3 + Math.random() * 0.4
                    : malus.phase === 1 ? 0.8 + Math.random() : 1.5 + Math.random() * 2;
            }
            const ms = malus.phase === 2 ? 240 : malus.phase === 1 ? 160 : 90;
            if (Math.abs(malus.x - malus.moveTarget) > 5)
                malus.x += Math.sign(malus.moveTarget - malus.x) * ms * dt;

            // ── Malus Attacks (3 phases) ──
            if (malus.phase === 2) {
                // Phase 2: very fast + irregular pauses + pattern switching
                if (malus.isPaused) {
                    malus.pauseTimer -= dt;
                    if (malus.pauseTimer <= 0) {
                        malus.isPaused = false;
                        const patterns = ['aimed', 'spiral', 'sun', 'spread3', 'wave'];
                        malus.patternIndex = (malus.patternIndex + 1) % patterns.length;
                        malus.currentPattern = patterns[malus.patternIndex];
                        bf.flash = 0.1; bf.flashColor = '#c4263d';
                    }
                } else {
                    malus.atkTimer -= dt;
                    if (malus.atkTimer <= 0) {
                        malus.atkTimer = 0.12 + Math.random() * 0.22;
                        bfMalusAttack(malus.currentPattern);
                        if (Math.random() < 0.1) {
                            malus.isPaused = true;
                            malus.pauseTimer = 0.4 + Math.random() * 1.8;
                        }
                    }
                }
            } else if (malus.phase === 1) {
                // Phase 1: faster + spiral/sun patterns
                malus.atkTimer -= dt;
                malus.spiralAngle = (malus.spiralAngle || 0) + dt * 3;
                if (malus.atkTimer <= 0) {
                    malus.atkTimer = 0.45 + Math.random() * 0.5;
                    const r = Math.random();
                    if (r < 0.25) bfMalusAttack('spiral');
                    else if (r < 0.45) bfMalusAttack('sun');
                    else if (r < 0.65) bfMalusAttack('spread3');
                    else bfMalusAttack('aimed');
                }
            } else {
                // Phase 0: normal
                malus.atkTimer -= dt;
                if (malus.atkTimer <= 0) {
                    malus.atkTimer = 1.6 + Math.random() * 0.6;
                    bfMalusAttack('aimed');
                }
            }

            // ── Update Projectiles ──
            bf.projectiles = bf.projectiles.filter(p => {
                p.t += dt;
                if (p.t > p.dur) return false;
                if (p.type === 'orb') {
                    if (p.spiral) {
                        p.baseAngle += dt * 2.2;
                        p.vx = Math.cos(p.baseAngle) * p.spd;
                        p.vy = Math.sin(p.baseAngle) * p.spd;
                    }
                    if (p.wave) p.vx += Math.sin(bf.time * 9 + p.waveOff) * 250 * dt;
                    p.x += p.vx * dt; p.y += p.vy * dt;
                    // Hit Eva
                    if (eva.inv <= 0 && !eva.shield.active && Math.abs(p.x - eva.x) < 22 && Math.abs(p.y - eva.y) < 28) {
                        eva.hp -= p.dmg; eva.inv = 1.0;
                        bf.shake = 0.3; bf.flash = 0.15; bf.flashColor = '#ef4444';
                        bf.dmgTexts.push({ x: eva.x, y: eva.y - 35, text: '-1', color: '#ef4444', t: 0.9 });
                        for (let i = 0; i < 10; i++)
                            bfParticle(eva.x, eva.y, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, 0.5, '#ef4444', 4);
                        if (eva.hp <= 0) bfEndGame(false);
                        return false;
                    }
                    // Shield deflection
                    if (eva.shield.active && Math.abs(p.x - eva.x) < 30 && Math.abs(p.y - eva.y) < 35) {
                        for (let i = 0; i < 5; i++)
                            bfParticle(p.x, p.y, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, 0.3, '#f472b6', 3);
                        return false;
                    }
                    if (Math.random() < 0.25) bfParticle(p.x, p.y, (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 15, 0.3, '#8b1a2e', 3);
                }
                if (p.type === 'lightning' && !p.hit && p.t > 0.08) {
                    p.hit = true;
                    if (p.inCone) bfHitMalus(p.dmg);
                    else bf.dmgTexts.push({ x: eva.x, y: eva.y - 55, text: 'Raté !', color: '#888', t: 0.7 });
                }
                if (p.type === 'bottle') {
                    p.x += p.vx * dt; p.y += p.vy * dt;
                    p.spin = (p.spin || 0) + dt * 8;
                    if (Math.random() < 0.5)
                        bfParticle(p.x + (Math.random() - 0.5) * 6, p.y + 5, (Math.random() - 0.5) * 15, Math.random() * 20, 0.3, '#a78bfa', 2.5);
                    if (!p.hit && Math.abs(p.x - malus.x) < 35 && Math.abs(p.y - malus.y) < 45) {
                        p.hit = true; bfHitMalus(p.dmg);
                        for (let i = 0; i < 15; i++) {
                            const a = (i / 15) * Math.PI * 2, spd = 60 + Math.random() * 80;
                            bfParticle(malus.x, malus.y, Math.cos(a) * spd, Math.sin(a) * spd, 0.5, '#a78bfa', 3);
                        }
                    }
                }
                if (p.type === 'moon') {
                    p.x += p.vx * dt; p.y += p.vy * dt;
                    bfParticle(p.x + (Math.random() - 0.5) * 12, p.y, (Math.random() - 0.5) * 30, Math.random() * 20, 0.4, '#93c5fd', 3);
                    if (!p.hit && Math.abs(p.x - malus.x) < 40 && Math.abs(p.y - malus.y) < 45) {
                        p.hit = true; bfHitMalus(p.dmg);
                        bf.shake = 0.5; bf.flash = 0.25; bf.flashColor = '#93c5fd';
                        for (let i = 0; i < 30; i++) {
                            const a = (i / 30) * Math.PI * 2, spd = 100 + Math.random() * 150;
                            bfParticle(malus.x, malus.y, Math.cos(a) * spd, Math.sin(a) * spd, 0.8,
                                ['#93c5fd', '#bfdbfe', '#dbeafe', '#fff'][i % 4], 5);
                        }
                    }
                }
                return true;
            });

            // Particles & damage texts
            bf.particles = bf.particles.filter(p => { p.t -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.96; p.vy *= 0.96; return p.t > 0; });
            bf.dmgTexts = bf.dmgTexts.filter(d => (d.t -= dt) > 0);
            bf.shake = Math.max(0, bf.shake - dt);
            bf.flash = Math.max(0, bf.flash - dt);

            // Ambient VFX
            if (Math.random() < 0.15)
                bfParticle(eva.x + (Math.random() - 0.5) * 20, eva.y + (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 12, -8 - Math.random() * 15, 0.6, '#f2d06b', 2);
            if (Math.random() < 0.1 + malus.phase * 0.08)
                bfParticle(malus.x + (Math.random() - 0.5) * 40, malus.y + (Math.random() - 0.5) * 50,
                    (Math.random() - 0.5) * 15, (Math.random() - 0.5) * 12, 0.5,
                    malus.phase === 2 ? '#ef4444' : '#2a0a20', 3);
            // Floating runes
            bf.runes.forEach(r => {
                r.y -= r.speed * dt;
                if (r.fadeIn) { r.opacity = Math.min(0.3, r.opacity + dt * 0.3); if (r.opacity >= 0.3) r.fadeIn = false; }
                else r.opacity -= dt * 0.08;
                if (r.y < -10 || r.opacity <= 0) {
                    r.x = Math.random() * bf.W; r.y = bf.H + 10;
                    r.opacity = 0; r.fadeIn = true;
                    r.char = '✦⬡◇△⊕☆✧⟡'[Math.floor(Math.random() * 8)];
                }
            });
            // Nebula drift
            bf.nebulae.forEach(n => { n.phase += dt * 0.15; n.x += Math.sin(n.phase) * n.drift * dt; });
        }

        function bfHitMalus(dmg) {
            if (!bf) return;
            bf.malus.hp = Math.max(0, bf.malus.hp - dmg);
            bf.malus.hurt = 0.3;
            bf.shake = Math.max(bf.shake, 0.15);
            bf.dmgTexts.push({ x: bf.malus.x, y: bf.malus.y - 40, text: '-' + dmg, color: '#facc15', t: 0.9 });
            for (let i = 0; i < 6; i++)
                bfParticle(bf.malus.x + (Math.random() - 0.5) * 30, bf.malus.y, (Math.random() - 0.5) * 120, (Math.random() - 0.5) * 120, 0.5, '#c4263d', 4);
            if (bf.malus.hp <= 0) bfEndGame(true);
        }

        function bfParticle(x, y, vx, vy, life, color, size) {
            if (bf) bf.particles.push({ x, y, vx, vy, t: life, maxT: life, color, size });
        }

        function bfEndGame(win) {
            if (!bf) return;
            bf.running = false;
            if (win) {
                for (let i = 0; i < 50; i++) {
                    const a = (i / 50) * Math.PI * 2, sp = 50 + Math.random() * 200;
                    bfParticle(bf.malus.x, bf.malus.y, Math.cos(a) * sp, Math.sin(a) * sp, 1.2,
                        ['#c4263d', '#8b1a2e', '#4a0f1a', '#ef4444'][i % 4], 6);
                }
                bf.flash = 0.5; bf.flashColor = '#f2d06b'; bf.shake = 0.6;
            }
            setTimeout(() => {
                const wrapper = document.getElementById('bf-wrapper');
                if (!wrapper) return;
                const ov = document.createElement('div');
                ov.className = 'bf-result ' + (win ? 'win' : 'lose');
                ov.innerHTML = win
                    ? `<h2>  Victoire !  </h2><p style="color:var(--text-secondary);margin-bottom:20px;text-align:center;">Eva a vaincu Malus !</p><button class="btn btn-primary" onclick="bfCleanup();handleSuccess();">Continuer l'aventure ↗</button>`
                    : `<h2>💀 Défaite...</h2><p style="color:var(--text-secondary);margin-bottom:20px;text-align:center;">Eva a été vaincue...</p><button class="btn btn-primary" onclick="startBossFight()">⚔️ Réessayer</button>`;
                wrapper.appendChild(ov);
            }, win ? 1500 : 800);
        }

        function bfCleanup() {
            if (!bf) return;
            if (bf._raf) cancelAnimationFrame(bf._raf);
            if (bf._kd) window.removeEventListener('keydown', bf._kd);
            if (bf._ku) window.removeEventListener('keyup', bf._ku);
            bf = null;
        }

        function updateBFBtns() {
            if (!bf) return;
            const names = ['lightning', 'bottle', 'moon', 'shield'];
            const maxCds = [0.8, 2, 15, 30];
            names.forEach((n, i) => {
                const btn = document.getElementById('bf-btn-' + n);
                if (!btn) return;
                const cd = bf.eva.cd[i];
                const blocked = bf.eva.shield.active && i !== 3;
                btn.classList.toggle('on-cd', cd > 0 || blocked);
                let ov = btn.querySelector('.bf-cd-overlay');
                if (!ov) { ov = document.createElement('div'); ov.className = 'bf-cd-overlay'; btn.appendChild(ov); }
                ov.style.height = cd > 0 ? (cd / maxCds[i] * 100) + '%' : blocked ? '100%' : '0';
                let cdText = btn.querySelector('.bf-cd-text');
                if (!cdText) { cdText = document.createElement('div'); cdText.className = 'bf-cd-text'; btn.appendChild(cdText); }
                if (cd > 0) {
                    cdText.textContent = cd >= 10 ? Math.ceil(cd) + 's' : cd.toFixed(1) + 's';
                    cdText.style.display = 'flex';
                } else if (blocked) {
                    cdText.textContent = '🛡️';
                    cdText.style.display = 'flex';
                } else {
                    cdText.style.display = 'none';
                }
            });
        }

        // ── BOSS FIGHT RENDERING ──
        function bfRender() {
            const { ctx, W, H, eva, malus, shake, time } = bf;
            ctx.save();
            if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 15, (Math.random() - 0.5) * shake * 15);

            // Background with phase-dependent coloring
            const bg = ctx.createLinearGradient(0, 0, 0, H);
            if (malus.phase === 2) {
                bg.addColorStop(0, '#1a0508'); bg.addColorStop(0.5, '#180612'); bg.addColorStop(1, '#0a0205');
            } else if (malus.phase === 1) {
                bg.addColorStop(0, '#0f0118'); bg.addColorStop(0.5, '#120a1f'); bg.addColorStop(1, '#060510');
            } else {
                bg.addColorStop(0, '#0a0118'); bg.addColorStop(0.5, '#0d0a1f'); bg.addColorStop(1, '#050510');
            }
            ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

            // Nebula clouds
            bf.nebulae.forEach(n => {
                ctx.fillStyle = n.color;
                ctx.beginPath(); ctx.ellipse(n.x, n.y, n.rx, n.ry, 0, 0, Math.PI * 2); ctx.fill();
            });

            // Stars (3-layer parallax)
            bf.stars.forEach(s => {
                s.t += s.sp;
                const px = s.x + Math.sin(time * 0.1 * (1 + s.layer * 0.3)) * (2 + s.layer * 2);
                const br = 0.2 + 0.15 * s.layer + 0.2 * Math.sin(s.t);
                ctx.fillStyle = `rgba(255,255,255,${br})`;
                ctx.beginPath(); ctx.arc(px, s.y, s.s * (0.6 + s.layer * 0.3), 0, Math.PI * 2); ctx.fill();
            });

            // Floating runes
            bf.runes.forEach(r => {
                if (r.opacity <= 0) return;
                ctx.globalAlpha = r.opacity;
                ctx.fillStyle = r.color;
                ctx.font = `${r.size}px serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(r.char, r.x, r.y);
            });
            ctx.globalAlpha = 1;

            // Energy ground line
            const groundY = H * 0.88;
            const gPulse = 0.12 + 0.08 * Math.sin(time * 2);
            const gg = ctx.createLinearGradient(0, groundY - 3, 0, groundY + 3);
            gg.addColorStop(0, 'rgba(201,168,76,0)');
            gg.addColorStop(0.5, `rgba(201,168,76,${gPulse})`);
            gg.addColorStop(1, 'rgba(201,168,76,0)');
            ctx.fillStyle = gg; ctx.fillRect(0, groundY - 3, W, 6);

            // Energy pillars at edges
            const pA = 0.03 + malus.phase * 0.015 + Math.sin(time * 1.5) * 0.01;
            const pC = malus.phase === 2 ? `rgba(239,68,68,${pA})` : `rgba(201,168,76,${pA})`;
            let lg = ctx.createLinearGradient(0, 0, 15, 0);
            lg.addColorStop(0, pC); lg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = lg; ctx.fillRect(0, 0, 15, H);
            let rg = ctx.createLinearGradient(W, 0, W - 15, 0);
            rg.addColorStop(0, pC); rg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = rg; ctx.fillRect(W - 15, 0, 15, H);

            // Particles (additive blending)
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            bf.particles.forEach(p => {
                ctx.globalAlpha = (p.t / p.maxT) * 0.8;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.t / p.maxT), 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over';
            ctx.restore();
            ctx.globalAlpha = 1;

            // Eva trail
            eva.trail.forEach(t => {
                ctx.globalAlpha = t.a * 0.5;
                ctx.fillStyle = '#c9a84c';
                ctx.beginPath(); ctx.arc(t.x, t.y, 4, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Boss aura (phase 1+)
            if (malus.phase >= 1 && malus.hp > 0) {
                ctx.save();
                const aSize = malus.phase === 2 ? 70 : 50;
                const aAlpha = malus.phase === 2 ? 0.15 + Math.sin(time * 5) * 0.08 : 0.08 + Math.sin(time * 3) * 0.04;
                ctx.globalAlpha = aAlpha;
                ctx.globalCompositeOperation = 'lighter';
                const ag = ctx.createRadialGradient(malus.x, malus.y, 5, malus.x, malus.y, aSize);
                ag.addColorStop(0, malus.phase === 2 ? '#ef4444' : '#c4263d');
                ag.addColorStop(0.5, malus.phase === 2 ? 'rgba(220,38,38,0.3)' : 'rgba(196,38,61,0.2)');
                ag.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = ag;
                ctx.beginPath(); ctx.arc(malus.x, malus.y, aSize, 0, Math.PI * 2); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                ctx.restore();
            }

            // Draw characters
            bfDrawMalus(ctx, malus, time);
            if (eva.shield.active) bfDrawHeartShield(ctx, eva, time);
            bfDrawEva(ctx, eva, time);

            // Draw projectiles
            bf.projectiles.forEach(p => {
                if (p.type === 'orb') bfDrawOrb(ctx, p);
                else if (p.type === 'lightning') bfDrawLightning(ctx, p, eva, malus);
                else if (p.type === 'bottle') bfDrawBottle(ctx, p);
                else if (p.type === 'moon') bfDrawMoonBlade(ctx, p);
            });

            // Damage texts
            bf.dmgTexts.forEach(d => {
                ctx.globalAlpha = Math.min(1, d.t * 2);
                ctx.fillStyle = d.color;
                ctx.font = `bold ${W * 0.04}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                ctx.shadowColor = d.color; ctx.shadowBlur = 8;
                ctx.fillText(d.text, d.x, d.y - (0.9 - d.t) * 40);
                ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1;

            // HUD
            bfDrawHUD(ctx, W, eva, malus);

            // Phase 2 danger pulse
            if (malus.phase === 2 && malus.hp > 0) {
                const dp = 0.03 + Math.sin(time * 3) * 0.02;
                ctx.fillStyle = `rgba(239,68,68,${dp})`;
                ctx.fillRect(0, 0, W, H);
            }

            // Vignette
            const vigS = 0.4 + malus.phase * 0.1;
            const vig = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
            vig.addColorStop(0, 'rgba(0,0,0,0)');
            vig.addColorStop(1, `rgba(0,0,0,${vigS})`);
            ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

            // Intro text
            if (bf.introTimer > 0) {
                ctx.globalAlpha = Math.min(1, bf.introTimer / 0.3);
                ctx.fillStyle = '#f2d06b';
                ctx.font = `bold ${W * 0.11}px Cinzel, serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = '#f2d06b'; ctx.shadowBlur = 30;
                ctx.fillText('COMBAT !', W / 2, H / 2);
                ctx.shadowBlur = 0;
            }

            // Flash overlay
            if (bf.flash > 0) {
                ctx.globalAlpha = bf.flash * 1.5;
                ctx.fillStyle = bf.flashColor;
                ctx.fillRect(0, 0, W, H);
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function bfDrawEva(ctx, eva, time) {
            ctx.save();
            ctx.translate(eva.x, eva.y);
            if (eva.inv > 0 && Math.sin(time * 20) > 0) ctx.globalAlpha = 0.3;
            if (eva.shield.active) {
                ctx.shadowColor = '#f472b6'; ctx.shadowBlur = 22;
            } else {
                ctx.shadowColor = '#f2d06b'; ctx.shadowBlur = 18;
            }
            const g = ctx.createLinearGradient(0, -32, 0, 18);
            g.addColorStop(0, '#fef08a'); g.addColorStop(0.4, '#f2d06b'); g.addColorStop(1, '#c9a84c');
            ctx.fillStyle = g;
            // Head
            ctx.beginPath(); ctx.arc(0, -28, 7, 0, Math.PI * 2); ctx.fill();
            // Body
            ctx.beginPath();
            ctx.moveTo(-9, -20); ctx.quadraticCurveTo(-11, 0, -7, 16);
            ctx.lineTo(7, 16); ctx.quadraticCurveTo(11, 0, 9, -20);
            ctx.closePath(); ctx.fill();
            // Legs
            ctx.fillRect(-6, 16, 4, 10); ctx.fillRect(2, 16, 4, 10);
            // Hair
            ctx.strokeStyle = '#fef08a'; ctx.lineWidth = 1.5; ctx.shadowBlur = 8;
            for (let i = 0; i < 3; i++) {
                const off = Math.sin(time * 3 + i) * 4;
                ctx.beginPath();
                ctx.moveTo(eva.facing > 0 ? -4 : 4, -33);
                ctx.quadraticCurveTo(eva.facing * (-12 - i * 4) + off, -28 + i * 3, eva.facing * (-8 - i * 6), -18 + i * 5);
                ctx.stroke();
            }
            // Attack arc
            if (eva.atk) {
                ctx.globalAlpha = 1 - eva.atk.t / eva.atk.dur;
                const atkC = { lightning: '#facc15', bottle: '#a78bfa', moon: '#93c5fd' };
                ctx.strokeStyle = atkC[eva.atk.type] || '#facc15';
                ctx.lineWidth = 2.5; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 20;
                ctx.beginPath();
                const sa = -Math.PI / 2 + (eva.atk.t / eva.atk.dur) * Math.PI;
                ctx.arc(0, -10, 22, sa - 0.6, sa + 0.6); ctx.stroke();
            }
            // Name
            ctx.shadowBlur = 0; ctx.globalAlpha = 0.6;
            ctx.fillStyle = eva.shield.active ? '#f472b6' : '#f2d06b';
            ctx.font = `600 ${bf.W * 0.025}px Cinzel, serif`;
            ctx.textAlign = 'center';
            ctx.fillText(eva.shield.active ? 'EVA 🛡️' : 'EVA', 0, 38);
            ctx.restore();
        }

        function bfDrawMalus(ctx, malus, time) {
            ctx.save();
            const fy = Math.sin(time * 2) * 6;
            ctx.translate(malus.x, malus.y + fy);
            if (malus.hurt > 0) ctx.globalAlpha = 0.5 + Math.sin(time * 30) * 0.3;
            ctx.shadowColor = malus.phase === 2 ? '#ef4444' : '#c4263d';
            ctx.shadowBlur = malus.phase === 2 ? 35 : 25;
            const ag = ctx.createRadialGradient(0, 0, 5, 0, 0, 38);
            ag.addColorStop(0, malus.phase === 2 ? '#dc2626' : malus.phase === 1 ? '#8b1a2e' : '#2a0a30');
            ag.addColorStop(0.5, malus.phase === 2 ? '#450a0a' : '#1a0520');
            ag.addColorStop(1, 'rgba(10,2,15,0)');
            ctx.fillStyle = ag;
            // Body
            ctx.beginPath();
            const bp = malus.phase === 2 ? 16 : 12;
            for (let i = 0; i < bp; i++) {
                const a = (i / bp) * Math.PI * 2;
                const r = 28 + Math.sin(time * (3 + malus.phase * 2) + i * 1.5) * (7 + malus.phase * 3);
                const px = Math.cos(a) * r, py = Math.sin(a) * r * 0.8;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath(); ctx.fill();
            // Core
            ctx.fillStyle = malus.phase === 2 ? '#7f1d1d' : malus.phase === 1 ? '#4a0f1a' : '#0d0418';
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 25, 0, 0, Math.PI * 2); ctx.fill();
            // Eyes (track Eva)
            const eAngle = Math.atan2(bf.eva.y - (malus.y + fy), bf.eva.x - malus.x);
            const lkX = Math.cos(eAngle) * 1.5, lkY = Math.sin(eAngle) * 0.8;
            ctx.shadowColor = malus.phase === 2 ? '#fca5a5' : '#ef4444';
            ctx.shadowBlur = malus.phase === 2 ? 20 : 12;
            ctx.fillStyle = malus.hurt > 0 ? '#fff' : (malus.phase === 2 ? '#fca5a5' : '#ef4444');
            const eS = malus.phase === 2 ? 4.5 : 3.5;
            ctx.beginPath(); ctx.ellipse(-7 + lkX, -4 + lkY, eS, eS * 0.7, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(7 + lkX, -4 + lkY, eS, eS * 0.7, 0, 0, Math.PI * 2); ctx.fill();
            // Tendrils
            const tc = 4 + malus.phase * 2;
            ctx.strokeStyle = malus.phase === 2 ? 'rgba(239,68,68,0.5)' : malus.phase === 1 ? 'rgba(196,38,61,0.5)' : 'rgba(74,16,37,0.3)';
            ctx.lineWidth = 1.5; ctx.shadowBlur = 4;
            for (let i = 0; i < tc; i++) {
                const a = (i / tc) * Math.PI + Math.PI * 0.5;
                const w = Math.sin(time * (2 + malus.phase) + i * 2) * (8 + malus.phase * 3);
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * 22, Math.sin(a) * 18);
                ctx.quadraticCurveTo(Math.cos(a) * 36 + w, Math.sin(a) * 32,
                    Math.cos(a) * (45 + malus.phase * 10) + w * 1.5, Math.sin(a) * (42 + malus.phase * 5));
                ctx.stroke();
            }
            // Pause indicator
            if (malus.phase === 2 && malus.isPaused) {
                ctx.globalAlpha = 0.5 + Math.sin(time * 8) * 0.3;
                ctx.fillStyle = '#ef4444';
                ctx.font = `bold ${bf.W * 0.035}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('...', 0, -45);
            }
            // Name
            if (malus.hp > 0) {
                ctx.shadowBlur = 0; ctx.globalAlpha = 0.6;
                ctx.fillStyle = malus.phase === 2 ? '#fca5a5' : '#c4263d';
                ctx.font = `600 ${bf.W * 0.025}px Cinzel, serif`;
                ctx.textAlign = 'center';
                ctx.fillText('MALUS', 0, 45);
            }
            ctx.restore();
        }

        function bfDrawOrb(ctx, p) {
            ctx.save(); ctx.translate(p.x, p.y);
            const g = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
            g.addColorStop(0, p.spiral ? '#a855f7' : '#c4263d');
            g.addColorStop(0.5, p.spiral ? '#7c3aed' : '#8b1a2e');
            g.addColorStop(1, 'rgba(139,26,46,0)');
            ctx.shadowColor = p.spiral ? '#a855f7' : '#c4263d'; ctx.shadowBlur = 12;
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = p.spiral ? '#c4b5fd' : '#ef4444';
            ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.fill();
            if (p.spiral) {
                ctx.globalAlpha = 0.3; ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(0, 0, p.r + 3, 0, Math.PI * 1.5); ctx.stroke();
            }
            ctx.restore();
        }

        function bfDrawLightning(ctx, p, eva, malus) {
            if (p.t > p.dur) return;
            ctx.save();
            ctx.globalAlpha = (1 - p.t / p.dur) * (p.inCone ? 1 : 0.3);
            ctx.strokeStyle = p.inCone ? '#facc15' : '#666';
            ctx.lineWidth = p.inCone ? 2.5 : 1.5;
            ctx.shadowColor = p.inCone ? '#facc15' : '#444'; ctx.shadowBlur = p.inCone ? 18 : 6;
            // Cone indicator flash
            if (p.t < 0.1) {
                ctx.save();
                ctx.globalAlpha *= 0.25;
                ctx.beginPath(); ctx.moveTo(eva.x, eva.y - 22);
                const cL = 120, cH = Math.PI / 4;
                ctx.lineTo(eva.x + Math.cos(-Math.PI / 2 - cH) * cL, eva.y - 22 + Math.sin(-Math.PI / 2 - cH) * cL);
                ctx.lineTo(eva.x + Math.cos(-Math.PI / 2 + cH) * cL, eva.y - 22 + Math.sin(-Math.PI / 2 + cH) * cL);
                ctx.closePath();
                ctx.fillStyle = p.inCone ? 'rgba(250,204,21,0.1)' : 'rgba(100,100,100,0.05)';
                ctx.fill();
                ctx.restore();
                ctx.globalAlpha = (1 - p.t / p.dur) * (p.inCone ? 1 : 0.3);
            }
            // Lightning bolt
            const tX = p.inCone ? malus.x : eva.x + (Math.random() - 0.5) * 80;
            const tY = p.inCone ? malus.y : eva.y - 80;
            ctx.beginPath(); ctx.moveTo(eva.x, eva.y - 22);
            for (let i = 1; i <= 6; i++) {
                const r = i / 6;
                ctx.lineTo(eva.x + (tX - eva.x) * r + (Math.random() - 0.5) * 28,
                    (eva.y - 22) + (tY - eva.y + 22) * r + (Math.random() - 0.5) * 12);
            }
            ctx.stroke();
            if (p.inCone) {
                ctx.lineWidth = 1; ctx.globalAlpha *= 0.5;
                ctx.beginPath(); ctx.moveTo(eva.x + 3, eva.y - 20);
                for (let i = 1; i <= 6; i++) {
                    const r = i / 6;
                    ctx.lineTo(eva.x + (malus.x - eva.x) * r + (Math.random() - 0.5) * 35,
                        (eva.y - 20) + (malus.y - eva.y + 20) * r + (Math.random() - 0.5) * 18);
                }
                ctx.stroke();
            }
            ctx.restore();
        }

        function bfDrawBottle(ctx, p) {
            ctx.save();
            ctx.translate(p.x, p.y); ctx.rotate(p.spin || 0);
            ctx.shadowColor = '#a78bfa'; ctx.shadowBlur = 14;
            ctx.fillStyle = '#c4b5fd';
            ctx.beginPath(); ctx.roundRect(-5, -6, 10, 14, 2); ctx.fill();
            ctx.fillStyle = '#ddd6fe'; ctx.fillRect(-3, -10, 6, 5);
            ctx.fillStyle = '#7c3aed';
            ctx.beginPath(); ctx.roundRect(-4, -13, 8, 4, 1); ctx.fill();
            ctx.fillStyle = '#a78bfa'; ctx.globalAlpha = 0.6;
            ctx.beginPath(); ctx.arc(0, -15, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function bfDrawMoonBlade(ctx, p) {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(bf.time * 8);
            ctx.shadowColor = '#93c5fd'; ctx.shadowBlur = 22;
            ctx.fillStyle = '#bfdbfe';
            ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI);
            ctx.arc(4, 0, p.r * 0.7, Math.PI, 0, true);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#dbeafe'; ctx.beginPath(); ctx.arc(0, 0, p.r * 0.4, 0, Math.PI); ctx.fill();
            ctx.globalAlpha = 0.3; ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = '#93c5fd';
            ctx.beginPath(); ctx.arc(0, 0, p.r * 1.3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function bfDrawHeartShield(ctx, eva, time) {
            ctx.save();
            ctx.translate(eva.x, eva.y - 8);
            const pulse = 1 + Math.sin(time * 4) * 0.06;
            const s = 2 * pulse;
            ctx.scale(s, -s);
            // Heart outline
            ctx.globalAlpha = 0.35 + Math.sin(time * 3) * 0.1;
            ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 1.2 / s;
            ctx.shadowColor = '#ec4899'; ctx.shadowBlur = 20;
            ctx.beginPath();
            for (let t = 0; t <= Math.PI * 2 + 0.1; t += 0.06) {
                const hx = 16 * Math.pow(Math.sin(t), 3);
                const hy = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                t < 0.01 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
            }
            ctx.closePath(); ctx.stroke();
            // Heart fill
            ctx.globalAlpha = 0.06 + Math.sin(time * 2.5) * 0.03;
            const hg = ctx.createRadialGradient(0, 5, 0, 0, 5, 18);
            hg.addColorStop(0, '#f472b6'); hg.addColorStop(1, 'rgba(244,114,182,0)');
            ctx.fillStyle = hg; ctx.fill();
            // Inner glow
            ctx.globalAlpha = 0.15; ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = '#fda4af'; ctx.fill();
            ctx.restore();
        }

        function bfDrawHUD(ctx, W, eva, malus) {
            const bw = W * 0.35, bh = 10, y = 16, pad = 10;
            ctx.shadowBlur = 0;
            // Eva HP
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.roundRect(pad, y, bw, bh, 4); ctx.fill();
            const eg = ctx.createLinearGradient(pad, 0, pad + bw, 0);
            if (eva.shield.active) { eg.addColorStop(0, '#f472b6'); eg.addColorStop(1, '#ec4899'); }
            else { eg.addColorStop(0, '#f2d06b'); eg.addColorStop(1, '#c9a84c'); }
            ctx.fillStyle = eg;
            ctx.beginPath(); ctx.roundRect(pad, y, bw * Math.max(0, eva.hp / eva.maxHp), bh, 4); ctx.fill();
            ctx.strokeStyle = eva.shield.active ? 'rgba(244,114,182,0.5)' : 'rgba(201,168,76,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(pad, y, bw, bh, 4); ctx.stroke();
            ctx.fillStyle = eva.shield.active ? '#f472b6' : '#f2d06b';
            ctx.font = `700 ${W * 0.026}px Inter, sans-serif`;
            ctx.textAlign = 'left';
            ctx.fillText(`Eva  ${eva.hp}/${eva.maxHp}`, pad, y - 4);
            // Shield timer
            if (eva.shield.active) {
                ctx.fillStyle = '#fda4af';
                ctx.font = `600 ${W * 0.02}px Inter, sans-serif`;
                ctx.fillText(`🛡️ ${eva.shield.timer.toFixed(1)}s`, pad + bw + 5, y + bh - 1);
            }
            // Malus HP
            const mx = W - pad - bw;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.roundRect(mx, y, bw, bh, 4); ctx.fill();
            const mg = ctx.createLinearGradient(mx, 0, mx + bw, 0);
            if (malus.phase === 2) { mg.addColorStop(0, '#ef4444'); mg.addColorStop(1, '#dc2626'); }
            else { mg.addColorStop(0, '#c4263d'); mg.addColorStop(1, '#8b1a2e'); }
            ctx.fillStyle = mg;
            ctx.beginPath(); ctx.roundRect(mx, y, bw * Math.max(0, malus.hp / malus.maxHp), bh, 4); ctx.fill();
            ctx.strokeStyle = malus.phase === 2 ? 'rgba(239,68,68,0.5)' : 'rgba(196,38,61,0.4)';
            ctx.beginPath(); ctx.roundRect(mx, y, bw, bh, 4); ctx.stroke();
            ctx.fillStyle = malus.phase === 2 ? '#fca5a5' : '#ef4444';
            ctx.textAlign = 'right';
            ctx.fillText(`Malus  ${malus.hp}/${malus.maxHp}`, W - pad, y - 4);
            // Phase indicator
            if (malus.phase >= 1 && malus.hp > 0) {
                ctx.font = `600 ${W * 0.018}px Inter, sans-serif`;
                ctx.fillStyle = malus.phase === 2 ? '#fca5a5' : '#f87171';
                ctx.globalAlpha = 0.6 + Math.sin(bf.time * 4) * 0.2;
                ctx.fillText(malus.phase === 2 ? '🔥 RAGE' : '⚠️ ENRAGÉ', W - pad, y + bh + 14);
                ctx.globalAlpha = 1;
            }
        }


        /* ─────────────────────────────────────────────────────────────
           BOOT 🚀
        ────────────────────────────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', init);
    </script>
