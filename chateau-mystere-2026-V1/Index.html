                    "On parle de Rouen",
                    "Cette ville est surnommée la ville aux cent clochers...",
                    "Mais il en est un en plus que seule toi connaît. 100+1=101"
                ]
            },
        ];


        /* ─────────────────────────────────────────────────────────────
           CONFIGURATION
        ────────────────────────────────────────────────────────────── */
        const GAME_DURATION_MS = 72 * 60 * 60 * 1000;                       // 72 h
        const FINAL_UNLOCK_DATE = new Date('2026-07-19T02:00:00').getTime();  // Dimanche 19 juillet 2026, 02:00
        let DEBUG = new URLSearchParams(location.search).get('debug') === 'true' || new URLSearchParams(location.search).has('debug');
        const LS_KEY_INDEX = 'escapeGame_currentIndex';
        const LS_KEY_START = 'escapeGame_startTime';
        const LS_KEY_HINTS = 'escapeGame_hints';
        const LS_KEY_HINTS_TOTAL = 'escapeGame_hintsTotal';
        const LS_KEY_ERRORS_TOTAL = 'escapeGame_errorsTotal';
        const LS_KEY_FINISHED = 'escapeGame_finished';

        /* ─────────────────────────────────────────────────────────────
           STATE
        ────────────────────────────────────────────────────────────── */
        let currentIndex = 0;
        let startTime = null;
        let timerInterval = null;
        let lockInterval = null;
        let hintsUsed = {};  // { enigmeId: [0, 1] }  — tabs revealed
        let totalHintsCount = 0; // Compteur global d'indices demandés
        let totalErrorsCount = 0; // Compteur global d'erreurs commises

        /* ─────────────────────────────────────────────────────────────
           DOM REFS
        ────────────────────────────────────────────────────────────── */
        const $app = document.getElementById('app');
        const $header = document.getElementById('header');
        const $progressW = document.getElementById('progress-bar-wrapper');
        const $progress = document.getElementById('progress-bar');
        const $chrono = document.getElementById('chrono');
        const $stepCur = document.getElementById('step-current');
        const $stepTotal = document.getElementById('step-total');
        const $debugPanel = document.getElementById('debug-panel');

        // Raccourci clavier Alt+D ou Ctrl+Shift+D pour activer/désactiver le debug
        window.addEventListener('keydown', (e) => {
            if ((e.altKey && e.key.toLowerCase() === 'd') || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'd')) {
                DEBUG = !DEBUG;
                if ($debugPanel) {
                    $debugPanel.classList.toggle('visible', DEBUG);
                    if (DEBUG) initDebugSelect();
                }
                alert(DEBUG ? "🛠️ Mode Debug ACTIVÉ ! (Menu en bas à droite)" : "🔒 Mode Debug DÉSACTIVÉ");
            }
        });

        /* ─────────────────────────────────────────────────────────────
           INIT
        ────────────────────────────────────────────────────────────── */
        function init() {
            // Debug
            if (DEBUG && $debugPanel) {
                $debugPanel.classList.add('visible');
                initDebugSelect();
            }

            // Init starfield background
            if (typeof initStars === 'function') {
                initStars('stars-canvas', { count: 120, twinkle: true });
            }

            // Guard: no enigmes
            if (!enigmes.length) {
                renderEmpty();
                return;
            }

            // Restore state
            const savedIndex = localStorage.getItem(LS_KEY_INDEX);
            const savedStart = localStorage.getItem(LS_KEY_START);
            const savedHints = localStorage.getItem(LS_KEY_HINTS);
            const savedDone = localStorage.getItem(LS_KEY_FINISHED);

            if (savedHints) {
                try { hintsUsed = JSON.parse(savedHints); } catch (e) { hintsUsed = {}; }
            }

            const savedHintsTotal = localStorage.getItem(LS_KEY_HINTS_TOTAL);
            if (savedHintsTotal) {
                totalHintsCount = parseInt(savedHintsTotal, 10) || 0;
            }

            const savedErrorsTotal = localStorage.getItem(LS_KEY_ERRORS_TOTAL);
            if (savedErrorsTotal) {
                totalErrorsCount = parseInt(savedErrorsTotal, 10) || 0;
            }

            if (savedDone === 'victory') {
                renderVictory();
                return;
            }

            if (savedStart) {
                startTime = parseInt(savedStart, 10);
            }

            if (savedIndex !== null) {
                currentIndex = parseInt(savedIndex, 10);
                if (currentIndex >= enigmes.length) {
                    renderVictory();
                    return;
                }
            }

            // First visit — show welcome
            if (!savedStart) {
                renderWelcome();
                return;
            }

            // Resume
            showHeader();
            startChrono();
            renderEnigma(currentIndex);
        }

        /* ─────────────────────────────────────────────────────────────
           WELCOME
        ────────────────────────────────────────────────────────────── */
        function renderWelcome() {
            $app.innerHTML = `
        <div class="welcome-screen">
          <p class="title-eyebrow reveal" data-delay="1">Une aventure secrète pour notre anniversaire</p>
          <p class="welcome-text reveal" data-delay="1" id="welcome-tw"></p>

          <div class="ornament reveal" data-delay="2">
            <div class="ornament-line"></div>
            <span class="ornament-icon">✦</span>
            <div class="ornament-line"></div>
          </div>

          <!-- Sceau cliquable centré au milieu de la page -->
          <div class="seal-interactive reveal" data-delay="2" onclick="startGame()" role="button" tabindex="0" title="Cliquer pour commencer l'aventure">
            <div class="seal-container">
              <img src="assets/unlock_seal.jpg" alt="Commencer le jeu" class="seal-img" onerror="this.src='assets/chateau%20de%20loin.jpg'">
            </div>
            <p class="seal-prompt">Alors prête ?</p>
          </div>

          <!-- Welcome rules en dessous (désactivées pour l'instant)
          <ul class="welcome-rules reveal" data-delay="3">
            <li>Résous chaque énigme pour débloquer la suivante et découvrir ses mystères</li>
            <li>Le chrono démarre dès que tu appuies sur le sceau pour commencer</li>
            <li>Des indices progressifs sont à ta disposition en cas de besoin</li>
          </ul>
          -->

          <!-- Joyeux anniversaire tout en bas de la page avec cœur métal doré animé -->
          <div class="footer-anniversary reveal" data-delay="4">
            <div class="heart-metal-container">
              <svg class="heart-svg" viewBox="0 0 24 24" fill="url(#gold-metal-grad)" stroke="#ffe898" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                  <linearGradient id="gold-metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f2d06b" />
                    <stop offset="25%" stop-color="#c9a84c" />
                    <stop offset="50%" stop-color="#7a5f28" />
                    <stop offset="75%" stop-color="#f2d06b" />
                    <stop offset="100%" stop-color="#4a3814" />
                  </linearGradient>
                </defs>
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                <path d="M12 17l-5-4.5C5 10.5 3.5 9 3.5 7.5 3.5 5.8 4.8 4.5 6.5 4.5c1.2 0 2.4.7 3 1.8l2.5 4.5 2.5-4.5c.6-1.1 1.8-1.8 3-1.8 1.7 0 3 1.3 3 3 0 1.5-1.5 3-3.5 5L12 17z" fill="none" stroke="rgba(255, 232, 152, 0.45)" stroke-width="0.5"/>
              </svg>
            </div>
          </div>
        </div>
      `;

            // Start typewriter animation for welcome text
            const twEl = document.getElementById('welcome-tw');
            if (twEl && typeof typewriter === 'function') {
                typewriter(twEl, "Mon amour, pour notre anniversaire de rencontre, je t'ai préparé un Escape Game secret.\nAttention, le trésor apparaîtra au jour de notre anniversaire. Tu as donc un temps imparti pour résoudre toutes les énigmes et y accéder...", 35, 400);
            }
        }

        function startGame() {
            startTime = Date.now();
            localStorage.setItem(LS_KEY_START, startTime);
            localStorage.setItem(LS_KEY_INDEX, 0);
            showHeader();
            startChrono();
            renderEnigma(0);
        }

        /* ─────────────────────────────────────────────────────────────
           HEADER / CHRONO
        ────────────────────────────────────────────────────────────── */
        function showHeader() {
            if ($header) $header.classList.remove('hidden');
            if ($progressW) $progressW.classList.remove('hidden');
            if ($stepTotal) $stepTotal.textContent = enigmes.length;
            updateProgress();
        }

        function hideHeader() {
            if ($header) $header.classList.add('hidden');
            if ($progressW) $progressW.classList.add('hidden');
            if (timerInterval) clearInterval(timerInterval);
        }

        function updateProgress() {
            if ($stepCur) $stepCur.textContent = currentIndex + 1;
            const pct = (currentIndex / enigmes.length) * 100;
            if ($progress) $progress.style.width = pct + '%';
            const $hc = document.getElementById('hint-total-count');
            if ($hc) $hc.textContent = totalHintsCount;
            const $ec = document.getElementById('error-total-count');
            if ($ec) $ec.textContent = totalErrorsCount;
        }

        function startChrono() {
            if (timerInterval) clearInterval(timerInterval);
            tickChrono();
            timerInterval = setInterval(tickChrono, 1000);
        }

        function tickChrono() {
            const elapsed = Date.now() - startTime;
            const remaining = GAME_DURATION_MS - elapsed;
            const absRemaining = Math.max(0, remaining);
            const h = Math.floor(absRemaining / 3600000);
            const m = Math.floor((absRemaining % 3600000) / 60000);
            const s = Math.floor((absRemaining % 60000) / 1000);

            $chrono.textContent =
                String(h).padStart(2, '0') + ':' +
                String(m).padStart(2, '0') + ':' +
                String(s).padStart(2, '0');

            // Color urgency
            if (remaining < 3600000) {
                $chrono.style.color = 'var(--error-red)';
                $chrono.style.textShadow = '0 0 20px var(--error-red), 0 0 60px #ef444422';
            } else {
                $chrono.style.color = '';
                $chrono.style.textShadow = '';
            }
        }

        /* ─────────────────────────────────────────────────────────────
           RENDER ENIGMA
        ────────────────────────────────────────────────────────────── */
        function renderEnigma(index) {
            const e = enigmes[index];
            if (!e) return;

            // Temporal lock: only blocks enigmas explicitly marked with temporalLock: true
            if (e.temporalLock && !DEBUG && Date.now() < FINAL_UNLOCK_DATE) {
                renderTemporalLock();
                return;
            }

            updateProgress();

            const imageHtml = e.image
                ? `<img src="${e.image}" alt="" onerror="this.style.display='none'" class="enigma-image" loading="lazy" onclick="openLightbox(this.src)" title="Cliquer pour agrandir">`
                : '';

            let interactionHtml = '';

            switch (e.type) {
                case 'date':
                    interactionHtml = `
            <div class="date-picker-group">
              <input type="date" class="date-picker-input" id="date-input">
            </div>
            <button class="btn btn-primary" id="btn-validate" onclick="validateDateAnswer()">
              Valider la date
            </button>
          `;
                    break;

                case 'choice':
                    interactionHtml = `
            <div class="choices-grid" id="choices-grid">
              ${(e.choix || []).map((c, i) => `
                <button class="btn-choice" id="choice-${i}" onclick="handleChoice(${i}, '${escapeAttr(c)}')">${c}</button>
              `).join('')}
            </div>
          `;
                    break;

                case 'drawing':
                    interactionHtml = `
            <div class="drawing-area">
              <canvas id="draw-canvas" width="600" height="480"></canvas>
              <div class="drawing-toolbar">
                <button class="btn" onclick="clearCanvas()">🗑 Effacer</button>
                <button class="btn" onclick="undoCanvas()">↩ Annuler</button>
              </div>
            </div>
            <div class="input-group">
              <input type="text" class="input-answer" id="answer-input"
                     placeholder="Ta réponse…"
                     autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <button class="btn btn-primary" id="btn-validate" onclick="validateAnswer()">
              Valider ma réponse
            </button>
          `;
                    break;

                case 'gps':
                case 'text':
                default:
                    interactionHtml = `
            <div class="input-group">
              <input type="text" class="input-answer" id="answer-input"
                     placeholder="Ta réponse…"
                     autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <button class="btn btn-primary" id="btn-validate" onclick="validateAnswer()">
              Valider ma réponse
            </button>
          `;
                    break;
            }

            $app.innerHTML = `
        <div class="enigma-card">
          <div class="card-badge">
            <div class="card-num">${index + 1}</div>
            <span class="card-icon">🗝️</span>
          </div>
          <h1 class="enigma-title">${e.titre}</h1>
          ${imageHtml}
          <div class="enigma-description">${formatText(e.description)}</div>
          ${interactionHtml}
          <div class="feedback" id="feedback"></div>
          ${renderHints(e)}
        </div>
      `;

            // Focus input
            const input = document.getElementById('answer-input');
            if (input) {
                input.addEventListener('keydown', (ev) => {
                    if (ev.key === 'Enter') validateAnswer();
                });
            }

            // Init drawing canvas
            if (e.type === 'drawing') initCanvas();
        }

        /* ─────────────────────────────────────────────────────────────
           HINTS SYSTEM
        ────────────────────────────────────────────────────────────── */
        function renderHints(enigme) {
            if (!enigme.indices || !enigme.indices.length) return '';

            const labels = ['Indice 1', 'Indice 2', 'Solution'];
            const revealed = hintsUsed[enigme.id] || [];

            // Progressive: tab i only visible if i===0 or tab i-1 already revealed
            const tabs = enigme.indices.map((_, i) => {
                const isRevealed = revealed.includes(i);
                const isUnlocked = (i === 0) || revealed.includes(i - 1);
                if (!isUnlocked) return ''; // Don't render the tab at all
                const cls = isRevealed ? 'revealed' : '';
                return `<button class="hint-tab ${cls}" id="hint-tab-${i}" onclick="revealHint(${enigme.id}, ${i})">${labels[i] || 'Indice ' + (i + 1)}</button>`;
            }).join('');

            // Show the last revealed hint by default
            let contentHtml = '<div class="hint-content" id="hint-body"></div>';
            if (revealed.length > 0) {
                const lastIdx = revealed[revealed.length - 1];
                contentHtml = `<div class="hint-content visible" id="hint-body">${formatText(enigme.indices[lastIdx])}</div>`;
            }

            return `
        <div class="hints-section">
          <div class="hints-header">💡 Besoin d'aide ?</div>
          <div class="hints-tabs" id="hints-tabs-container">${tabs}</div>
          ${contentHtml}
        </div>
      `;
        }

        function revealHint(enigmeId, hintIndex) {
            if (!hintsUsed[enigmeId]) hintsUsed[enigmeId] = [];
            if (!hintsUsed[enigmeId].includes(hintIndex)) {
                hintsUsed[enigmeId].push(hintIndex);
                localStorage.setItem(LS_KEY_HINTS, JSON.stringify(hintsUsed));

                // Incrémenter le compteur global
                totalHintsCount++;
                localStorage.setItem(LS_KEY_HINTS_TOTAL, totalHintsCount);
            }

            const enigme = enigmes.find(e => e.id === enigmeId);
            if (!enigme) return;

            // Update tab styling
            const tab = document.getElementById('hint-tab-' + hintIndex);
            if (tab) {
                // Remove active from all
                document.querySelectorAll('.hint-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active', 'revealed');
            }

            // Show content
            const body = document.getElementById('hint-body');
            if (body) {
                body.className = 'hint-content visible';
                body.innerHTML = formatText(enigme.indices[hintIndex]);
            }

            // Update counter in DOM
            const counterEl = document.getElementById('hint-total-count');
            if (counterEl) counterEl.textContent = totalHintsCount;

            // Reveal next tab if it exists and isn't already shown
            const nextIndex = hintIndex + 1;
            if (nextIndex < enigme.indices.length && !document.getElementById('hint-tab-' + nextIndex)) {
                const labels = ['Indice 1', 'Indice 2', 'Solution'];
                const container = document.getElementById('hints-tabs-container');
                if (container) {
                    const newBtn = document.createElement('button');
                    newBtn.className = 'hint-tab';
                    newBtn.id = 'hint-tab-' + nextIndex;
                    newBtn.textContent = labels[nextIndex] || 'Indice ' + (nextIndex + 1);
                    newBtn.onclick = () => revealHint(enigmeId, nextIndex);
                    newBtn.style.animation = 'fade-in 0.4s ease';
                    container.appendChild(newBtn);
                }
            }
        }

        /* ─────────────────────────────────────────────────────────────
           VALIDATE ANSWER
        ────────────────────────────────────────────────────────────── */
        function validateAnswer() {
            const input = document.getElementById('answer-input');
            if (!input) return;

            const answer = input.value.trim().toUpperCase();
            const expected = enigmes[currentIndex].reponseAttendue;
            let isCorrect = false;

            if (Array.isArray(expected)) {
                isCorrect = expected.some(val => String(val).trim().toUpperCase() === answer);
            } else if (typeof expected === 'string') {
                isCorrect = answer === expected.trim().toUpperCase();
            }

            if (isCorrect) {
                showFeedback('success', '✅ Bonne réponse ! Bien joué.');
                input.disabled = true;
                const btn = document.getElementById('btn-validate');
                if (btn) btn.disabled = true;
                setTimeout(() => handleSuccess(), 1000);
            } else {
                showFeedback('error', '❌ Attention, une erreur vient d\'être ajoutée ! Plus il y a d\'erreurs, plus cela complique une des étapes finales !');
                input.classList.add('error');
                setTimeout(() => input.classList.remove('error'), 600);
            }
        }

        function validateDateAnswer() {
            const input = document.getElementById('date-input');
            if (!input || !input.value) {
                showFeedback('error', '📅 Sélectionne une date dans le calendrier.');
                return;
            }

            const answer = input.value; // format YYYY-MM-DD
            const expected = enigmes[currentIndex].reponseAttendue;

            // reponseAttendue can be an array of accepted dates or a single string
            const acceptedDates = Array.isArray(expected) ? expected : [expected];

            if (acceptedDates.includes(answer)) {
                showFeedback('success', '✅ Bonne date ! Bien joué.');
                input.disabled = true;
                input.classList.add('correct');
                const btn = document.getElementById('btn-validate');
                if (btn) btn.disabled = true;
                setTimeout(() => handleSuccess(), 1000);
            } else {
                showFeedback('error', '❌ Attention, une erreur vient d\'être ajoutée ! Plus il y a d\'erreurs, plus cela complique une des étapes finales !');
                input.classList.add('error');
                setTimeout(() => input.classList.remove('error'), 600);
            }
        }

        function handleChoice(index, value) {
            const expected = enigmes[currentIndex].reponseAttendue.trim().toUpperCase();
            const btn = document.getElementById('choice-' + index);

            if (value.trim().toUpperCase() === expected) {
                btn.classList.add('correct');
                showFeedback('success', '✅ Bonne réponse ! Bien joué.');
                // Disable all
                document.querySelectorAll('.btn-choice').forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; });
                setTimeout(() => handleSuccess(), 1000);
            } else {
                btn.classList.add('wrong');
                showFeedback('error', '❌ Mauvais choix. Essaie encore.');
                setTimeout(() => {
                    btn.classList.remove('wrong');
                }, 700);
            }
        }

        function showFeedback(type, message) {
            const $fb = document.getElementById('feedback');
            if (!$fb) return;
            $fb.className = 'feedback ' + type;
            $fb.textContent = message;
            if (type === 'error' && message.includes('❌')) {
                totalErrorsCount++;
                localStorage.setItem(LS_KEY_ERRORS_TOTAL, totalErrorsCount);
                const $ec = document.getElementById('error-total-count');
                if ($ec) $ec.textContent = totalErrorsCount;
            }
        }

        /* ─────────────────────────────────────────────────────────────
           SUCCESS SCREEN & ADVANCE
        ────────────────────────────────────────────────────────────── */
        function handleSuccess() {
            const currentEnigma = enigmes[currentIndex];
            if (currentEnigma && currentEnigma.succes) {
                renderSuccessScreen(currentEnigma.succes);
            } else {
                advanceToNext();
            }
        }

        function renderSuccessScreen(succes) {
            const imageHtml = succes.image
                ? `<img src="${succes.image}" alt="" onerror="this.style.display='none'" class="enigma-image" loading="lazy" onclick="openLightbox(this.src)" title="Cliquer pour agrandir" style="margin-bottom: 30px;">`
                : '';

            const titleText = succes.titre || 'Félicitations !';
            const descText = succes.description
                ? `<div class="enigma-description" style="margin-bottom: 40px;">${formatText(succes.description)}</div>`
                : '';
            const btnText = succes.bouton || 'Énigme suivante ↗';

            $app.innerHTML = `
                <div class="enigma-card" style="text-align: center; border-color: rgba(201, 168, 76, 0.6); box-shadow: 0 0 35px rgba(201, 168, 76, 0.25);">
                    <div style="margin: 0 auto 20px; font-size: 2.2rem; filter: drop-shadow(0 0 10px rgba(201, 168, 76, 0.5));">✨</div>
                    <h1 class="enigma-title" style="color: var(--clr-gold-bright);">${titleText}</h1>
                    ${imageHtml}
                    ${descText}
                    <div style="margin-top: 20px;">
                        <button class="btn btn-primary" onclick="advanceToNext()">${btnText}</button>
                    </div>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function advanceToNext() {
            currentIndex++;
            localStorage.setItem(LS_KEY_INDEX, currentIndex);

            if (currentIndex >= enigmes.length) {
                // All enigmas done — always show countdown (debug has a "simulate end" button)
                localStorage.setItem(LS_KEY_FINISHED, 'lock');
                renderTemporalLock();
            } else {
                renderEnigma(currentIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        /* ─────────────────────────────────────────────────────────────
           DEBUG — SKIP & JUMP
        ────────────────────────────────────────────────────────────── */
        function skipStep() {
            advanceToNext();
        }

        function debugForceCountdownEnd() {
            // Simulates what happens when the countdown reaches zero
            if (lockInterval) clearInterval(lockInterval);
            const $lc = document.getElementById('lock-countdown');
            const $action = document.getElementById('lock-action-container');
            if ($lc) {
                $lc.innerHTML = `
                    <div class="lock-countdown-unit"><div class="lock-countdown-value">00</div><div class="lock-countdown-label">Jours</div></div>
                    <div class="lock-countdown-unit"><div class="lock-countdown-value">00</div><div class="lock-countdown-label">Heures</div></div>
                    <div class="lock-countdown-unit"><div class="lock-countdown-value">00</div><div class="lock-countdown-label">Minutes</div></div>
                    <div class="lock-countdown-unit"><div class="lock-countdown-value">00</div><div class="lock-countdown-label">Secondes</div></div>
                `;
            }
            if ($action) {
                $action.innerHTML = `<button class="btn btn-primary" style="animation: pulse-glow 2s infinite; width: 100%;" onclick="renderVictory()">🏆 DÉCOUVRIR LE DERNIER INDICE ↗</button>
                    <div style="font-size: 0.7rem; color: #ef4444; margin-top: 8px;">(Fin simulée — mode Debug)</div>`;
            }
        }

        function initDebugSelect() {
            const $sel = document.getElementById('debug-select');
            if (!$sel) return;
            if ($sel.options.length > 1) return; // Already initialized
            $sel.innerHTML = '<option value="">🎯 Aller à l\'étape...</option>' +
                '<option value="welcome">🏠 Accueil</option>' +
                enigmes.map((e, idx) => `<option value="${idx}">Étape ${idx + 1}</option>`).join('') +
                '<option value="lock">🔒 Décompte final</option>' +
                '<option value="victory">🏆 Victoire</option>';
        }

        function jumpToEnigma(val) {
            if (val === '') return;
            const $sel = document.getElementById('debug-select');
            if ($sel) $sel.value = '';

            if (val === 'welcome') { hideHeader(); renderWelcome(); return; }
            if (val === 'victory') { showHeader(); renderVictory(); return; }
            if (val === 'lock') { showHeader(); renderTemporalLock(); return; }

            const idx = parseInt(val, 10);
            if (!isNaN(idx) && enigmes[idx]) {
                if (!startTime) {
                    startTime = Date.now();
                    localStorage.setItem(LS_KEY_START, startTime);
                    startChrono();
                }
                currentIndex = idx;
                localStorage.setItem(LS_KEY_INDEX, currentIndex);
                showHeader();
                renderEnigma(currentIndex);
            }
        }

        /* ─────────────────────────────────────────────────────────────
           LIGHTBOX
        ────────────────────────────────────────────────────────────── */
        function openLightbox(src) {
            const $lb = document.getElementById('image-lightbox');
            const $img = document.getElementById('lightbox-img');
            if ($lb && $img) {
                $img.src = src;
                $lb.style.display = 'flex';
                setTimeout(() => $img.style.transform = 'scale(1)', 10);
            }
        }

        function closeLightbox() {
            const $lb = document.getElementById('image-lightbox');
            const $img = document.getElementById('lightbox-img');
            if ($lb && $img) {
                $img.style.transform = 'scale(0.95)';
                setTimeout(() => $lb.style.display = 'none', 150);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        /* ─────────────────────────────────────────────────────────────
           TEMPORAL LOCK
        ────────────────────────────────────────────────────────────── */
        function renderTemporalLock() {
            showHeader();
            if ($stepCur) $stepCur.textContent = enigmes.length;
            if ($progress) $progress.style.width = '100%';

            $app.innerHTML = `
        <div class="lock-screen">


          <div class="luxury-card">
            <div class="icon-metallic">⏳</div>
            <h1 class="title-main">ULTIME <span class="gold">MYSTÈRE</span></h1>
            
            <div class="separator-ornate">✦</div>
            <p>Je savais que tu réussirais.\n Bravo ! Quelle sagacité. \n Il ne reste plus qu'une étape, qui sera dévoilée en temps et en heure. Tu te souviens de la date ? \n \n Il ne reste plus qu'à attendre...</p>

            <div class="lock-countdown" id="lock-countdown"></div>
            <div id="lock-action-container" style="margin-top: 24px;"></div>
          </div>
        </div>
      `;

            if (lockInterval) clearInterval(lockInterval);
            tickLockCountdown();
            lockInterval = setInterval(tickLockCountdown, 1000);
        }

        function tickLockCountdown() {
            const diff = FINAL_UNLOCK_DATE - Date.now();
            const $lc = document.getElementById('lock-countdown');
            const $action = document.getElementById('lock-action-container');

            if (diff <= 0) {
                clearInterval(lockInterval);
                if ($lc) {
                    $lc.innerHTML = `
                <div class="lock-countdown-unit"><div class="lock-countdown-value">00</div><div class="lock-countdown-label">Jours</div></div>
                <div class="lock-countdown-unit"><div class="lock-countdown-value">00</div><div class="lock-countdown-label">Heures</div></div>
                <div class="lock-countdown-unit"><div class="lock-countdown-value">00</div><div class="lock-countdown-label">Minutes</div></div>
                <div class="lock-countdown-unit"><div class="lock-countdown-value">00</div><div class="lock-countdown-label">Secondes</div></div>
              `;
                }
                if ($action) {
                    $action.innerHTML = `<button class="btn btn-primary" style="animation: pulse-glow 2s infinite; width: 100%;" onclick="renderVictory()">🏆 DÉCOUVRIR LE DERNIER INDICE ↗</button>`;
                }
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            if ($lc) {
                $lc.innerHTML = `
        <div class="lock-countdown-unit">
          <div class="lock-countdown-value">${String(d).padStart(2, '0')}</div>
          <div class="lock-countdown-label">Jours</div>
        </div>
        <div class="lock-countdown-unit">
          <div class="lock-countdown-value">${String(h).padStart(2, '0')}</div>
          <div class="lock-countdown-label">Heures</div>
        </div>
        <div class="lock-countdown-unit">
          <div class="lock-countdown-value">${String(m).padStart(2, '0')}</div>
          <div class="lock-countdown-label">Minutes</div>
        </div>
        <div class="lock-countdown-unit">
          <div class="lock-countdown-value">${String(s).padStart(2, '0')}</div>
          <div class="lock-countdown-label">Secondes</div>
        </div>
      `;
            }

            if ($action && DEBUG) {
                // Debug: show the simulate-end button below the live countdown
                if (!document.getElementById('debug-force-end')) {
                    const debugBtn = document.createElement('div');
                    debugBtn.id = 'debug-force-end';
                    debugBtn.style.cssText = 'margin-top: 16px;';
                    debugBtn.innerHTML = `<button class="btn" style="background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #ef4444; font-size: 0.78rem; padding: 8px 18px;" onclick="debugForceCountdownEnd()">⚡ Simuler la fin du countdown</button><div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">(Debug uniquement)</div>`;
                    $action.appendChild(debugBtn);
                }
            } else if ($action && !DEBUG) {
                $action.innerHTML = '';
            }
        }

        /* ─────────────────────────────────────────────────────────────
           END SCREENS
        ────────────────────────────────────────────────────────────── */
        function renderVictory() {
            if (timerInterval) clearInterval(timerInterval);
            showHeader();
            if ($stepCur) $stepCur.textContent = enigmes.length;
            if ($progress) $progress.style.width = '100%';

            const elapsed = startTime ? Date.now() - startTime : 0;
            const totalH = Math.floor(elapsed / 3600000);
            const totalM = Math.floor((elapsed % 3600000) / 60000);
            const totalHintsCount = Object.values(hintsUsed).reduce((sum, arr) => sum + arr.length, 0);

            $app.innerHTML = `
        <div class="end-screen victory">

          <div class="luxury-card">
            <div class="icon-metallic">🪎</div>
            <h1 class="title-main">Le trésor</h1>   
            <div class="separator-ornate">✦</div>
            

            <div class="final-clue-box" style="margin: 24px 0; padding: 20px; background: radial-gradient(circle at center, rgba(201, 168, 76, 0.2), rgba(10, 8, 14, 0.8)); border: 1px solid rgba(254, 240, 138, 0.6); border-radius: var(--radius-md); box-shadow: 0 0 25px rgba(201, 168, 76, 0.25);">
              <h3 style="color: #fef08a; font-family: var(--font-display); font-size: 1.15rem; margin-bottom: 10px; text-shadow: 0 0 12px rgba(201,168,76,0.9); letter-spacing: 1px;">🔑 L'ULTIME INDICE</h3>
              <p style="font-size: 1.1rem; color: #ffffff; margin-bottom: 0; font-style: normal; line-height: 1.6;">Retourne sur les lieux de notre premier baiser.</p>
            </div>

            <div class="success-stats">
              <div class="stat">
                <div class="stat-value">${totalH}h ${String(totalM).padStart(2, '0')}m</div>
                <div class="stat-label">Temps total</div>
              </div>
              <div class="stat">
                <div class="stat-value">${enigmes.length}</div>
                <div class="stat-label">Énigmes</div>
              </div>
              <div class="stat">
                <div class="stat-value">${totalHintsCount}</div>
                <div class="stat-label">Indices</div>
              </div>
              <div class="stat">
                <div class="stat-value">${totalErrorsCount}</div>
                <div class="stat-label">Erreurs</div>
              </div>
            </div>
          </div>

          <div style="margin-top: 30px;">
            <button class="btn btn-primary" onclick="resetGame()">🔄 Recommencer l'aventure ↗</button>
          </div>
        </div>
      `;

            spawnConfetti();
        }

        function renderEmpty() {
            $app.innerHTML = `
        <div class="end-screen">
          <div class="emoji-big">🏰</div>
          <h1>Nuit Électrique au Château</h1>
          <p>Les énigmes ne sont pas encore configurées. Remplissez le tableau <code>enigmes</code> dans le code source pour lancer l'aventure.</p>
        </div>
      `;
        }

        /* ─────────────────────────────────────────────────────────────
           RESET
        ────────────────────────────────────────────────────────────── */
        function resetGame() {
            // Supprimer toutes les clés du jeu dans localStorage
            Object.keys(localStorage)
                .filter(k => k.startsWith('escapeGame_'))
                .forEach(k => localStorage.removeItem(k));
            currentIndex = 0;
            startTime = null;
            hintsUsed = {};
            totalHintsCount = 0;
            totalErrorsCount = 0;
            location.reload();
        }

        /* ─────────────────────────────────────────────────────────────
           DRAWING CANVAS (for type "drawing")
        ────────────────────────────────────────────────────────────── */
        let canvasCtx = null;
        let isDrawing = false;
        let drawHistory = [];

        function initCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas) return;

            // Set actual size
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;

            canvasCtx = canvas.getContext('2d');
            canvasCtx.scale(2, 2);
            canvasCtx.strokeStyle = '#f1f5f9';
            canvasCtx.lineWidth = 3;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';

            // Save initial state
            drawHistory = [canvasCtx.getImageData(0, 0, canvas.width, canvas.height)];

            // Pointer events
            canvas.addEventListener('pointerdown', (e) => {
                isDrawing = true;
                canvasCtx.beginPath();
                const pos = getCanvasPos(canvas, e);
                canvasCtx.moveTo(pos.x, pos.y);
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!isDrawing) return;
                const pos = getCanvasPos(canvas, e);
                canvasCtx.lineTo(pos.x, pos.y);
                canvasCtx.stroke();
            });

            canvas.addEventListener('pointerup', () => {
                isDrawing = false;
                drawHistory.push(canvasCtx.getImageData(0, 0, canvas.width, canvas.height));
            });

            canvas.addEventListener('pointerleave', () => {
                isDrawing = false;
            });
        }

        function getCanvasPos(canvas, e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function clearCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas || !canvasCtx) return;
            canvasCtx.clearRect(0, 0, canvas.width / 2, canvas.height / 2);
            drawHistory = [canvasCtx.getImageData(0, 0, canvas.width, canvas.height)];
        }

        function undoCanvas() {
            const canvas = document.getElementById('draw-canvas');
            if (!canvas || !canvasCtx || drawHistory.length <= 1) return;
            drawHistory.pop();
            canvasCtx.putImageData(drawHistory[drawHistory.length - 1], 0, 0);
        }

        /* ─────────────────────────────────────────────────────────────
           CONFETTI 🎊
        ────────────────────────────────────────────────────────────── */
        function spawnConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            const colors = ['#10b981', '#7c3aed', '#2563eb', '#f59e0b', '#ef4444', '#ec4899', '#06b6d4'];

            for (let i = 0; i < 80; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (Math.random() * 8 + 6) + 'px';
                piece.style.height = (Math.random() * 8 + 6) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(piece);
            }

            setTimeout(() => container.remove(), 5000);
        }

        /* ─────────────────────────────────────────────────────────────
           UTILITIES
        ────────────────────────────────────────────────────────────── */
        function formatText(text) {
            return text.replace(/\n/g, '<br>');
        }

        function escapeAttr(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        /* ─────────────────────────────────────────────────────────────
           TYPEWRITER & STARS (from pour-toi version)
        ────────────────────────────────────────────────────────────── */
        function typewriter(element, text, speed = 30, initialDelay = 500) {
            if (!element) return;
            element.innerHTML = '<span class="tw-text"></span><span class="tw-cursor"></span>';
            const textSpan = element.querySelector('.tw-text');
            let i = 0;
            setTimeout(() => {
                const interval = setInterval(() => {
                    if (i < text.length) {
                        textSpan.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++;
                    } else {
                        clearInterval(interval);
                        const cursor = element.querySelector('.tw-cursor');
                        if (cursor) setTimeout(() => cursor.style.display = 'none', 3000);
                    }
                }, speed);
            }, initialDelay);
        }

        function initStars(canvasId, options = {}) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const count = options.count || 100;
            const stars = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.8 + 0.2,
                    speed: Math.random() * 0.02 + 0.005,
                    twinkleSpeed: Math.random() * 0.03 + 0.01,
                    twinkleVal: Math.random() * Math.PI
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    star.twinkleVal += star.twinkleSpeed;
                    const currentOpacity = star.opacity * (0.6 + 0.4 * Math.sin(star.twinkleVal));
                    ctx.fillStyle = `rgba(255, 255, 255, ${currentOpacity})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = canvas.height;
                        star.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        /* ─────────────────────────────────────────────────────────────
           BOOT 🚀
        ────────────────────────────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', init);
    </script>
