            box-shadow: 0 0 20px rgba(254, 240, 138, 0.6), 0 0 40px rgba(201, 168, 76, 0.3);
            animation: gem-pulse 1.5s ease-in-out infinite;
            transform: rotate(45deg) scale(1.1);
        }

        .gem-hotspot.selected::before {
            border-color: rgba(254, 240, 138, 0.4);
        }

        .gem-hotspot.correct {
            border-color: var(--neon-green) !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.7), 0 0 50px rgba(16, 185, 129, 0.3) !important;
            animation: gem-success 0.6s ease forwards !important;
        }

        .gem-hotspot.wrong {
            border-color: var(--error-red) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.7), 0 0 50px rgba(239, 68, 68, 0.3) !important;
            animation: shake 0.5s ease, gem-wrong-fade 0.8s ease 0.5s forwards !important;
        }

        @keyframes gem-pulse {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(254, 240, 138, 0.6), 0 0 40px rgba(201, 168, 76, 0.3);
            }

            50% {
                box-shadow: 0 0 30px rgba(254, 240, 138, 0.9), 0 0 60px rgba(201, 168, 76, 0.5);
            }
        }

        @keyframes gem-success {
            0% {
                transform: rotate(45deg) scale(1.1);
            }

            50% {
                transform: rotate(45deg) scale(1.25);
            }

            100% {
                transform: rotate(45deg) scale(1.1);
            }
        }

        @keyframes gem-wrong-fade {
            to {
                border-color: transparent;
                box-shadow: none;
            }
        }

        .gems-selection-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: var(--gap-md) auto;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            max-width: 300px;
        }

        .gem-slot {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px dashed rgba(201, 168, 76, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .gem-slot.filled {
            border-style: solid;
            border-color: rgba(201, 168, 76, 0.6);
            background: rgba(201, 168, 76, 0.1);
        }

        .gem-slot-separator {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .gems-instruction {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: var(--gap-sm);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .gems-reset-btn {
            display: block;
            margin: var(--gap-sm) auto 0;
            padding: 6px 16px;
            font-size: 0.72rem;
            font-family: var(--font-ui);
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }

        .gems-reset-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-secondary);
        }

        /* ────────────────────────── GPS PROXIMITY PUZZLE ─────────────────────── */
        .proximity-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--gap-md);
            margin: var(--gap-md) auto;
            max-width: 360px;
        }

        .proximity-radar {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, rgba(5, 5, 15, 0.9) 70%);
            border: 2px solid rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.8s ease, border-color 0.8s ease, box-shadow 0.8s ease;
            overflow: hidden;
        }

        .proximity-radar::before {
            content: '';
            position: absolute;
            inset: 15%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        .proximity-radar::after {
            content: '';
            position: absolute;
            inset: 35%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }

        .proximity-radar .radar-sweep {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(255, 255, 255, 0.06) 30deg, transparent 60deg);
            animation: radar-spin 3s linear infinite;
        }

        @keyframes radar-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .proximity-distance {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .proximity-distance-value {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            color: #93c5fd;
            text-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
            transition: color 0.8s ease, text-shadow 0.8s ease;
            line-height: 1;
        }

        .proximity-distance-unit {
            font-family: var(--font-ui);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .proximity-coords {
            font-family: var(--font-ui);
            font-size: 0.72rem;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
            text-align: center;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            line-height: 1.6;
            letter-spacing: 0.5px;
            width: 100%;
            transition: border-color 0.5s ease;
        }

        .proximity-status {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-align: center;
            transition: color 0.5s ease;
            min-height: 1.4em;
        }

        .proximity-status.searching {
            animation: pulse-text 2s ease-in-out infinite;
        }

        @keyframes pulse-text {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .proximity-widget.frozen .proximity-radar {
            border-color: var(--neon-green) !important;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.5), 0 0 80px rgba(16, 185, 129, 0.2) !important;
        }

        .proximity-widget.frozen .radar-sweep {
            animation: none;
        }

        .proximity-widget.frozen .proximity-distance-value {
            color: var(--neon-green) !important;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.6) !important;
        }

        .proximity-widget.frozen .proximity-coords {
            border-color: rgba(16, 185, 129, 0.4);
        }

        .proximity-error-msg {
            font-family: var(--font-ui);
            font-size: 0.82rem;
            color: var(--error-red);
            text-align: center;
            padding: 12px;
            background: var(--error-red-dim);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            display: none;
        }

        .proximity-error-msg.visible {
            display: block;
        }

        .proximity-accuracy {
            font-family: var(--font-ui);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 4px;
        }

        /* ────────────────────────── PIANO PUZZLE ────────────────────────── */
        .piano-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 24px auto;
            max-width: 440px;
            width: 100%;
        }

        .piano-keyboard {
            display: flex;
            position: relative;
            width: 340px;
            height: 220px;
            margin: 20px auto;
            padding: 10px;
            background: rgba(15, 12, 25, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            border: 2px solid rgba(201, 168, 76, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(201, 168, 76, 0.15);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .piano-keyboard.disabled {
            pointer-events: none;
        }

        .piano-key {
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .piano-key.white {
            width: 40px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 0 0 6px 6px;
            z-index: 1;
            position: relative;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .piano-key.white.active {
            background: rgba(201, 168, 76, 0.2);
            box-shadow: inset 0 0 15px rgba(201, 168, 76, 0.4);
        }

        .piano-key.black {
            width: 24px;
            height: 120px;
            background: rgba(10, 8, 16, 0.95);
            border: 1px solid rgba(201, 168, 76, 0.45);
            border-radius: 0 0 4px 4px;
            z-index: 5;
            position: absolute;
            transition: background 0.15s, box-shadow 0.15s;
        }

        .piano-key.black.active {
            background: rgba(201, 168, 76, 0.5);
            box-shadow: inset 0 0 10px rgba(242, 208, 107, 0.7);
        }

        .piano-key.success-active {
            background: linear-gradient(135deg, var(--clr-gold), var(--clr-gold-bright)) !important;
            border-color: var(--clr-gold-bright) !important;
            animation: pulseGoldKey 1s infinite alternate;
            z-index: 6;
        }

        .piano-key.success-active .key-label {
            color: #fff !important;
            opacity: 1 !important;
            font-weight: 700;
        }

        .key-label {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-display);
            font-size: 1.15rem;
            color: var(--clr-gold);
            opacity: 0.07;
            pointer-events: none;
            transition: opacity 0.3s, color 0.3s;
        }

        @keyframes pulseGoldKey {
            from {
                box-shadow: 0 0 15px rgba(242, 208, 107, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.7);
            }

            to {
                box-shadow: 0 0 30px rgba(242, 208, 107, 0.95), inset 0 0 15px rgba(255, 255, 255, 1);
            }
        }

        /* ──────────────────────── VICTORY ADDITIONS (CYLUMES & VIENS SEULE) ────────────────────────── */
        .victory-image-wrapper {
            position: relative;
            margin: var(--gap-md) auto var(--gap-lg) auto;
            max-width: 100%;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeInScale 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .victory-image-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.85);
        }

        .victory-image {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .viens-seule-container {
            position: relative;
            margin: var(--gap-lg) auto 0 auto;
            width: 380px;
            max-width: 100%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        #viens-seule-canvas {
            display: block;
            max-width: 100%;
            height: auto;
            overflow: visible;
        }

        /* Ambient glow under the canvas particles */
        .viens-seule-container::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 45px;
            background: radial-gradient(ellipse, rgba(16, 185, 129, 0.12), rgba(196, 116, 140, 0.08), transparent 70%);
            filter: blur(14px);
            z-index: 1;
            pointer-events: none;
            animation: bgGlowPulse 8s ease-in-out infinite alternate;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.96);
                filter: blur(8px);
            }

            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        @keyframes bgGlowPulse {
            0% {
                transform: scale(0.85);
                opacity: 0.4;
            }

            100% {
                transform: scale(1.25);
                opacity: 0.8;
            }
        }

        /* ────────────────────────── HANGMAN PUZZLE ────────────────────────── */
        .hangman-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 16px auto;
            max-width: 480px;
            width: 100%;
        }

        .hangman-heart-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 14px auto 18px;
            width: 100px;
            height: 100px;
        }

        .hangman-heart {
            width: 82px;
            height: 82px;
            color: var(--clr-gold);
            filter: drop-shadow(0 0 16px rgba(201, 168, 76, 0.65));
            transition: color 0.3s ease, filter 0.3s ease;
        }

        .hangman-heart.error-shake {
            color: #ef4444 !important;
            filter: drop-shadow(0 0 22px rgba(239, 68, 68, 0.9)) !important;
            animation: shake 0.5s ease-in-out;
        }

        .hangman-error-float {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ef4444;
            font-weight: 800;
            font-size: 1.3rem;
            text-shadow: 0 0 12px rgba(239, 68, 68, 0.85);
            pointer-events: none;
            z-index: 10;
            animation: hangmanErrorFloat 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes hangmanErrorFloat {
            0% {
                opacity: 0;
                transform: translate(-50%, -30%) scale(0.75);
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -70%) scale(1.15);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -210%) scale(0.95);
            }
        }

        .hangman-word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px 5px;
            margin: 6px auto 24px;
            max-width: 450px;
            width: 100%;
        }

        .hangman-letter-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 26px;
            height: 40px;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--clr-gold-bright);
            border-bottom: 3px solid var(--clr-gold);
            user-select: none;
            transition: transform 0.25s ease, color 0.25s ease;
        }

        .hangman-letter-box.hyphen {
            border-bottom: none;
            color: var(--clr-gold);
            width: 16px;
            font-size: 1.4rem;
        }

        .hangman-letter-box.revealed {
            animation: hangmanLetterPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes hangmanLetterPop {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .hangman-keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 460px;
            margin: 8px auto 6px;
            padding: 0 2px;
        }

        .hangman-keyboard-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }

        .hangman-key {
            flex: 1;
            height: 46px;
            min-width: 28px;
            max-width: 42px;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            background: var(--bg-card-hover);
            color: var(--text-primary);
            font-size: 1.08rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
            transition: all 0.2s ease;
            padding: 0;
        }

        .hangman-key:active:not(:disabled) {
            transform: scale(0.92);
            background: var(--clr-gold);
            color: #000;
        }

        .hangman-key:disabled {
            opacity: 0.35;
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.25);
            cursor: default;
            box-shadow: none;
            transform: none;
        }

        .hangman-key.guessed-correct:disabled {
            opacity: 0.85;
            background: rgba(201, 168, 76, 0.22);
            border-color: var(--clr-gold);
            color: var(--clr-gold-bright);
        }

        .hangman-key.guessed-wrong:disabled {
            opacity: 0.35;

        /* ─────────────────────────────────────────────────────────────

        let hintsUsed = {};  // { enigmeId: [0, 1] }  — tabs revealed

        /* ─────────────────────────────────────────────────────────────

            if ((e.altKey && e.key.toLowerCase() === 'd') || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'd')) {

        /* ─────────────────────────────────────────────────────────────
           INIT
        ────────────────────────────────────────────────────────────── */
        function init() {
            // Debug
            if (DEBUG && $debugPanel) {
                $debugPanel.classList.add('visible');

            // Init starfield background
            if (typeof initStars === 'function') {
                initStars('stars-canvas', { count: 120, twinkle: true });
            }

            // Guard: no enigmes
            if (!enigmes.length) {
                renderEmpty();
                return;
            }

            // Restore state
            const savedIndex = localStorage.getItem(LS_KEY_INDEX);
            const savedStart = localStorage.getItem(LS_KEY_START);
            const savedHints = localStorage.getItem(LS_KEY_HINTS);
            const savedDone = localStorage.getItem(LS_KEY_FINISHED);

            if (savedHints) {
                try { hintsUsed = JSON.parse(savedHints); } catch (e) { hintsUsed = {}; }
            }

            const savedHintsTotal = localStorage.getItem(LS_KEY_HINTS_TOTAL);
            if (savedHintsTotal) {
                totalHintsCount = parseInt(savedHintsTotal, 10) || 0;
            }

            const savedErrorsTotal = localStorage.getItem(LS_KEY_ERRORS_TOTAL);
            if (savedErrorsTotal) {
                totalErrorsCount = parseInt(savedErrorsTotal, 10) || 0;
            }

            if (savedDone === 'victory') {
                renderVictory();
                return;
            }

            if (savedStart) {
                startTime = parseInt(savedStart, 10);
            }

            if (savedIndex !== null) {
                currentIndex = parseInt(savedIndex, 10);
                if (currentIndex >= enigmes.length) {
                    renderVictory();
                    return;
                }
            }

            // First visit — show welcome
            if (!savedStart) {
                renderWelcome();
                return;
            }

            // Resume
            showHeader();
            startChrono();
            renderEnigma(currentIndex);
        }

        /* ─────────────────────────────────────────────────────────────

        ────────────────────────────────────────────────────────────── */
        function renderWelcome() {

          <!-- Joyeux anniversaire tout en bas de la page avec cœur métal doré animé -->
          <div class="footer-anniversary reveal" data-delay="4">
            <div class="heart-metal-container">
              <svg class="heart-svg" viewBox="0 0 24 24" fill="url(#gold-metal-grad)" stroke="#ffe898" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">

                <path d="M12 17l-5-4.5C5 10.5 3.5 9 3.5 7.5 3.5 5.8 4.8 4.5 6.5 4.5c1.2 0 2.4.7 3 1.8l2.5 4.5 2.5-4.5c.6-1.1 1.8-1.8 3-1.8 1.7 0 3 1.3 3 3 0 1.5-1.5 3-3.5 5L12 17z" fill="none" stroke="rgba(255, 232, 152, 0.45)" stroke-width="0.5"/>

      `;

            // Start typewriter animation for welcome text
            const twEl = document.getElementById('welcome-tw');
            if (twEl && typeof typewriter === 'function') {
                typewriter(twEl, "Mon amour, pour notre anniversaire de rencontre, je t'ai préparé un Escape Game secret. \n Prends ton temps. \n Ou pas. \n Seule. Ou avec de l'aide. \n Fais comme tu veux. \n \n Ou comme tu peux...", 35, 400);

        function startGame() {
            startTime = Date.now();
            localStorage.setItem(LS_KEY_START, startTime);
            localStorage.setItem(LS_KEY_INDEX, 0);
            showHeader();
            startChrono();
            renderEnigma(0);

        /* ─────────────────────────────────────────────────────────────
           HEADER / CHRONO
        ────────────────────────────────────────────────────────────── */
        function showHeader() {
            if ($header) $header.classList.remove('hidden');
            if ($progressW) $progressW.classList.remove('hidden');
            updateChronoVisibility();
            updateProgress();
        }

        function hideHeader() {
            if ($header) $header.classList.add('hidden');
            if ($progressW) $progressW.classList.add('hidden');
            if (timerInterval) clearInterval(timerInterval);
        }

        function updateChronoVisibility(forceShow = false) {
            const $wrap = document.getElementById('header-chrono-wrap');
            if (!$wrap) return;
            if (currentIndex === 0 && !forceShow && !window._enigma1ChronoUnlocked) {
                $wrap.classList.add('hidden');
            } else {
                $wrap.classList.remove('hidden');
            }
        }

        function updateProgress() {
            if ($stepCur) $stepCur.textContent = currentIndex + 1;
            if ($stepTotal) $stepTotal.textContent = enigmes.length;
            const pct = (currentIndex / enigmes.length) * 100;
            if ($progress) $progress.style.width = pct + '%';
            const $hc = document.getElementById('hint-total-count');
            if ($hc) $hc.textContent = totalHintsCount;
            const $ec = document.getElementById('error-total-count');
            if ($ec) $ec.textContent = totalErrorsCount;
        }

        function startChrono() {
            if (timerInterval) clearInterval(timerInterval);
            tickChrono();
            timerInterval = setInterval(tickChrono, 1000);
        }

        function tickChrono() {
            const diff = FINAL_UNLOCK_DATE - Date.now();

            if (diff <= 0) {
                $chrono.textContent = "00:00:00:00";
                $chrono.style.color = 'var(--clr-crimson-bright)';
                $chrono.style.textShadow = '0 0 20px var(--clr-crimson-bright), 0 0 60px rgba(196, 38, 61, 0.5)';
                $chrono.style.animation = 'pulse-glow 1s infinite';
                return;
            } else {
                $chrono.style.animation = '';
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            $chrono.textContent =
                String(d).padStart(2, '0') + ':' +
                String(h).padStart(2, '0') + ':' +
                String(m).padStart(2, '0') + ':' +
                String(s).padStart(2, '0');

            if (diff <= 2 * 3600000) { // <= 2h
                $chrono.style.color = 'var(--clr-crimson-bright)';
                $chrono.style.textShadow = '0 0 20px var(--clr-crimson-bright), 0 0 60px rgba(196, 38, 61, 0.5)';
                $chrono.style.animation = 'pulse-glow 1s infinite';
            } else if (diff <= 24 * 3600000) { // <= 24h
                $chrono.style.color = 'var(--error-red)';
                $chrono.style.textShadow = '0 0 15px var(--error-red), 0 0 45px rgba(239, 68, 68, 0.4)';
            } else if (diff <= 48 * 3600000) { // <= 48h
                $chrono.style.color = 'var(--clr-gold-bright)';
                $chrono.style.textShadow = '0 0 15px var(--clr-gold-bright), 0 0 40px rgba(242, 208, 107, 0.3)';
            } else if (diff <= 72 * 3600000) { // <= 72h
                $chrono.style.color = 'var(--clr-gold)';
                $chrono.style.textShadow = '0 0 10px var(--clr-gold)';
            } else { // > 72h
                $chrono.style.color = '';
                $chrono.style.textShadow = '';
            }
        }

        /* ─────────────────────────────────────────────────────────────
           CAROUSEL HELPER FUNCTIONS
        ────────────────────────────────────────────────────────────── */
        /* Gestion mémoire et préchargement intelligent du carrousel */
        function preloadCarouselNeighbors(images, currentIdx) {
            if (!images || !images.length) return;
            const total = images.length;
            if (!window._carouselPreloadCache) {
                window._carouselPreloadCache = new Map();
            }
            const cache = window._carouselPreloadCache;

            // Fenêtre glissante restreinte pour ne pas surcharger la mémoire
            const desiredIndices = new Set([
                currentIdx,
                (currentIdx + 1) % total,
                (currentIdx + 2) % total,
                (currentIdx - 1 + total) % total,
                (currentIdx - 2 + total) % total
            ]);

            // Libération explicite de la mémoire des images hors de la zone active
            for (const [key, img] of cache.entries()) {
                if (!desiredIndices.has(key)) {
                    img.src = '';
                    cache.delete(key);
                }
            }

            // Préchargement asynchrone hors du thread principal
            desiredIndices.forEach(idx => {
                if (!cache.has(idx)) {
                    const preloadImg = new Image();
                    preloadImg.decoding = 'async';
                    preloadImg.src = images[idx];
                    cache.set(idx, preloadImg);
                }
            });
        }

        function initCarouselThumbsObserver() {
            const thumbsBar = document.getElementById('carousel-thumbs-bar');
            if (!thumbsBar) return;

            if (window._carouselThumbsObserver) {
                window._carouselThumbsObserver.disconnect();
            }

            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        if (img.dataset.src) {
                            img.src = img.dataset.src;
                            img.removeAttribute('data-src');
                            obs.unobserve(img);
                        }
                    }
                });
            }, {
                root: thumbsBar,
                rootMargin: '200px'
            });

            window._carouselThumbsObserver = observer;
            thumbsBar.querySelectorAll('.carousel-thumb[data-src]').forEach(thumb => {
                observer.observe(thumb);
            });
        }

        function renderCarouselHtml(images, currentIdx = 0) {
            if (!images || images.length === 0) return '';
            const total = images.length;
            const currentSrc = images[currentIdx];

            const thumbsHtml = images.map((src, idx) => {
                const isNear = Math.abs(idx - currentIdx) <= 5 || idx < 7;
                return `
                <img ${isNear ? `src="${src}"` : `data-src="${src}" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E"`}
                     alt="Photo ${idx + 1}"
                     class="carousel-thumb ${idx === currentIdx ? 'active' : ''}"
                     id="carousel-thumb-${idx}"
                     onclick="goCarousel(${idx})"
                     loading="lazy"
                     decoding="async">
            `;
            }).join('');

            return `
              <div class="enigma-carousel" id="enigma-carousel">
                <div class="carousel-main-wrapper" id="carousel-main-wrapper">
                  <div class="carousel-counter-badge" id="carousel-counter">${currentIdx + 1} / ${total}</div>
                  <button class="carousel-btn prev" onclick="moveCarousel(-1)" title="Photo précédente">←</button>
                  <img src="${currentSrc}" alt="Photo ${currentIdx + 1}" class="carousel-main-img" id="carousel-main-img" onclick="openLightbox(this.src)" title="Cliquer pour agrandir" decoding="async" fetchpriority="high">
                  <button class="carousel-btn next" onclick="moveCarousel(1)" title="Photo suivante">→</button>
                </div>
                <div class="carousel-thumbs-bar" id="carousel-thumbs-bar">
                  ${thumbsHtml}
                </div>
              </div>
            `;
        }

        function moveCarousel(step) {
            const e = enigmes[currentIndex];
            if (!e || !e.images || e.images.length === 0) return;
            const total = e.images.length;
            window._carouselIndex = ((window._carouselIndex || 0) + step + total) % total;
            updateCarouselView();
        }

        function goCarousel(idx) {
            const e = enigmes[currentIndex];
            if (!e || !e.images || e.images.length === 0) return;
            if (idx >= 0 && idx < e.images.length) {
                window._carouselIndex = idx;
                updateCarouselView();
            }
        }

        function updateCarouselView() {
            const e = enigmes[currentIndex];
            if (!e || !e.images) return;
            const idx = window._carouselIndex || 0;
            const mainImg = document.getElementById('carousel-main-img');
            const counter = document.getElementById('carousel-counter');

            // 1. Préchargement de la fenêtre active & nettoyage mémoire
            preloadCarouselNeighbors(e.images, idx);

            // 2. Transition fluide et sans scintillement de l'image principale
            if (mainImg) {
                const targetSrc = e.images[idx];
                window._carouselLoadToken = (window._carouselLoadToken || 0) + 1;
                const currentToken = window._carouselLoadToken;

                if (mainImg.getAttribute('src') === targetSrc) {
                    mainImg.style.opacity = '1';
                } else {
                    mainImg.style.opacity = '0.35';
                    const applySrc = () => {
                        if (window._carouselLoadToken !== currentToken) return;
                        mainImg.src = targetSrc;
                        mainImg.style.opacity = '1';
                    };

                    const cachedImg = window._carouselPreloadCache && window._carouselPreloadCache.get(idx);
                    if (cachedImg && cachedImg.complete && cachedImg.naturalWidth > 0) {
                        applySrc();
                    } else {
                        const loader = new Image();
                        loader.decoding = 'async';
                        loader.onload = applySrc;
                        loader.onerror = applySrc;
                        loader.src = targetSrc;
                        if (loader.complete) applySrc();
                    }
                }
            }

            // 3. Mise à jour du badge compteur
            if (counter) {
                counter.innerText = `${idx + 1} / ${e.images.length}`;
            }

            // 4. Hydratation et mise en valeur de la miniature active
            const thumbs = document.querySelectorAll('.carousel-thumb');
            thumbs.forEach((thumb, i) => {
                if (i === idx) {
                    if (thumb.dataset && thumb.dataset.src) {
                        thumb.src = thumb.dataset.src;
                        thumb.removeAttribute('data-src');
                    }
                    thumb.classList.add('active');
                    thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    thumb.classList.remove('active');
                }
            });
        }

        function initCarouselTouch() {
            const wrapper = document.getElementById('carousel-main-wrapper');
            if (!wrapper) return;
            let startX = 0;
            wrapper.addEventListener('touchstart', e => {
                startX = e.changedTouches[0].screenX;
            }, { passive: true });
            wrapper.addEventListener('touchend', e => {
                const endX = e.changedTouches[0].screenX;
                const diff = startX - endX;
                if (Math.abs(diff) > 40) {
                    if (diff > 0) moveCarousel(1);
                    else moveCarousel(-1);
                }
            }, { passive: true });
        }

        function initCarouselSmartLoader() {
            initCarouselTouch();
            initCarouselThumbsObserver();
            const e = enigmes[currentIndex];
            if (e && e.images) {
                preloadCarouselNeighbors(e.images, window._carouselIndex || 0);
            }
        }

        window.addEventListener('keydown', (ev) => {
            if (document.getElementById('enigma-carousel') && document.activeElement.tagName !== 'INPUT') {
                if (ev.key === 'ArrowLeft') moveCarousel(-1);
                else if (ev.key === 'ArrowRight') moveCarousel(1);
            }
        });

        /* ─────────────────────────────────────────────────────────────
           RENDER ENIGMA
        ────────────────────────────────────────────────────────────── */

            if (window._e1Timer) { clearInterval(window._e1Timer); window._e1Timer = null; }
            if (window._cleanupScannerResize) { window.removeEventListener('resize', window._cleanupScannerResize); window._cleanupScannerResize = null; }

            const notifyBadge = document.getElementById('header-chrono-notify');

                  <canvas id="scanner-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; border-radius: 4px;"></canvas>
                </div>

          `;
                    break;

                case 'date':
                    interactionHtml = `
            <div class="date-picker-group">
              <input type="date" class="date-picker-input" id="date-input">
            </div>

                    break;

                case 'choice':

        /* ─────────────────────────────────────────────────────────────
           HINTS SYSTEM
        ────────────────────────────────────────────────────────────── */
        function renderHints(enigme) {
            if (!enigme.indices || !enigme.indices.length) return '';

            const labels = ['Indice 1', 'Indice 2', 'Solution'];
            const revealed = hintsUsed[enigme.id] || [];

            // Progressive: tab i only visible if i===0 or tab i-1 already revealed
            const tabs = enigme.indices.map((_, i) => {
                const isRevealed = revealed.includes(i);
                const isUnlocked = (i === 0) || revealed.includes(i - 1);
                if (!isUnlocked) return ''; // Don't render the tab at all
                const cls = isRevealed ? 'revealed' : '';

                if (isRevealed) {
                    return `<button class="hint-tab ${cls}" id="hint-tab-${i}" onclick="revealHint(${enigme.id}, ${i})">${labels[i] || 'Indice ' + (i + 1)}</button>`;
                } else {
                    return `<button class="hint-tab" id="hint-tab-${i}" onclick="confirmHint(${enigme.id}, ${i}, this)">${labels[i] || 'Indice ' + (i + 1)}</button>`;
                }
            }).join('');

            // Show the last revealed hint by default
            let contentHtml = '<div class="hint-content" id="hint-body"></div>';
            if (revealed.length > 0) {
                const lastIdx = revealed[revealed.length - 1];
                contentHtml = `<div class="hint-content visible" id="hint-body">${formatText(enigme.indices[lastIdx])}</div>`;
            }

            return `
        <div class="hints-section">
          <div class="hints-header">💡 Besoin d'aide ?</div>
          <div class="hints-tabs" id="hints-tabs-container">${tabs}</div>
          ${contentHtml}
        </div>
      `;
        }

        function confirmHint(enigmeId, hintIndex, btn) {
            if (btn.classList.contains('confirming')) return;
            btn.classList.add('confirming');
            btn.onclick = null;
            btn.innerHTML = `
                <span class="hint-confirm-btn" onclick="event.stopPropagation(); revealHint(${enigmeId}, ${hintIndex})" title="Valider">✅</span>
                <span class="hint-cancel-btn" onclick="event.stopPropagation(); cancelHint(${enigmeId}, ${hintIndex}, this)" title="Annuler">❌</span>
            `;
        }

        function cancelHint(enigmeId, hintIndex, element) {
            const btn = element.closest('.hint-tab');
            if (btn) {
                const labels = ['Indice 1', 'Indice 2', 'Solution'];
                btn.innerHTML = labels[hintIndex] || 'Indice ' + (hintIndex + 1);
                btn.classList.remove('confirming');
                btn.onclick = function () { confirmHint(enigmeId, hintIndex, this); };
            }
        }

        function revealHint(enigmeId, hintIndex) {
            if (!hintsUsed[enigmeId]) hintsUsed[enigmeId] = [];
            if (!hintsUsed[enigmeId].includes(hintIndex)) {
                hintsUsed[enigmeId].push(hintIndex);
                localStorage.setItem(LS_KEY_HINTS, JSON.stringify(hintsUsed));

                // Incrémenter le compteur global
                totalHintsCount++;
                localStorage.setItem(LS_KEY_HINTS_TOTAL, totalHintsCount);
                if (totalHintsCount === 1 && !localStorage.getItem(LS_KEY_HINT_BUBBLE)) {
                    localStorage.setItem(LS_KEY_HINT_BUBBLE, '1');
                    triggerHintNotifyBubble();
                }
            }

            const enigme = enigmes.find(e => e.id === enigmeId);
            if (!enigme) return;

            // Update tab styling
            const tab = document.getElementById('hint-tab-' + hintIndex);
            if (tab) {
                // Restore text if it was confirming
                const labels = ['Indice 1', 'Indice 2', 'Solution'];
                tab.innerHTML = labels[hintIndex] || 'Indice ' + (hintIndex + 1);
                tab.classList.remove('confirming');
                tab.onclick = function () { revealHint(enigmeId, hintIndex); };

                // Remove active from all
                document.querySelectorAll('.hint-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active', 'revealed');
            }

            // Si le prochain indice est désormais débloqué, on l'ajoute au DOM s'il n'y est pas encore
            if (hintIndex + 1 < enigme.indices.length) {
                const nextTabId = 'hint-tab-' + (hintIndex + 1);
                if (!document.getElementById(nextTabId)) {
                    const tabsContainer = document.getElementById('hints-tabs-container');
                    if (tabsContainer) {
                        const labels = ['Indice 1', 'Indice 2', 'Solution'];
                        const nextLabel = labels[hintIndex + 1] || 'Indice ' + (hintIndex + 2);
                        const newTab = document.createElement('button');
                        newTab.className = 'hint-tab';
                        newTab.id = nextTabId;
                        newTab.innerHTML = nextLabel;
                        newTab.onclick = function () { confirmHint(enigmeId, hintIndex + 1, this); };
                        tabsContainer.appendChild(newTab);
                    }
                }
            }

            // Show content
            const body = document.getElementById('hint-body');
            if (body) {
                body.className = 'hint-content visible';
                body.innerHTML = formatText(enigme.indices[hintIndex]);
            }

            // Update counter in DOM
            const counterEl = document.getElementById('hint-total-count');
            if (counterEl) counterEl.textContent = totalHintsCount;

            // Reveal next tab if it exists and isn't already shown
            const nextIndex = hintIndex + 1;
            if (nextIndex < enigme.indices.length && !document.getElementById('hint-tab-' + nextIndex)) {
                const labels = ['Indice 1', 'Indice 2', 'Solution'];
                const container = document.getElementById('hints-tabs-container');
                if (container) {
                    const newBtn = document.createElement('button');
                    newBtn.className = 'hint-tab';
                    newBtn.id = 'hint-tab-' + nextIndex;
                    newBtn.textContent = labels[nextIndex] || 'Indice ' + (nextIndex + 1);
                    newBtn.onclick = () => revealHint(enigmeId, nextIndex);
                    newBtn.style.animation = 'fade-in 0.4s ease';
                    container.appendChild(newBtn);
                }
            }
        }

        function handleFruitWheelScroll(wheel) {

            const selectedIndex = Math.round(scrollOffset / itemHeight);

            const items = wheel.querySelectorAll('.counter-item');
            items.forEach((item, idx) => {

                    wheel.scrollTop += cycleHeight * 7;
                } else if (wheel.scrollTop > cycleHeight * 11) {
                    wheel.scrollTop -= cycleHeight * 7;
                }
            }, 120);

        /* ────────────────────────── CLOCK PUZZLE LOGIC ──────────────────────── */
        let _clockHours = 0;
        let _clockMinutes = 0;
        let _clockMode = 'hour';
        let _clockIsDragging = false;

        function initClockPuzzle() {
            _clockHours = 0;
            _clockMinutes = 0;
            _clockMode = 'hour';
            _clockIsDragging = false;

            const ticksContainer = document.getElementById('clock-ticks');
            const numsContainer = document.getElementById('clock-numbers');
            if (ticksContainer) {
                let ticksHtml = '';
                for (let i = 0; i < 60; i++) {
                    const deg = i * 6;
                    const isHour = i % 5 === 0;
                    const h = isHour ? 12 : 6;
                    const w = isHour ? 2 : 1;
                    const bg = isHour ? 'var(--clr-gold)' : 'rgba(255,255,255,0.25)';
                    ticksHtml += `<div class="clock-tick" style="transform: rotate(${deg}deg);"><div style="width:${w}px; height:${h}px; background:${bg}; margin: 0 auto; border-radius:1px;"></div></div>`;
                }
                ticksContainer.innerHTML = ticksHtml;
            }

            if (numsContainer) {
                let numsHtml = '';
                for (let i = 1; i <= 12; i++) {
                    const deg = (i * 30) - 90;
                    const rad = deg * (Math.PI / 180);
                    const radiusPct = 38;
                    const x = 50 + radiusPct * Math.cos(rad);
                    const y = 50 + radiusPct * Math.sin(rad);
                    numsHtml += `<div class="clock-num" style="left: ${x}%; top: ${y}%;">${i}</div>`;
                }
                numsContainer.innerHTML = numsHtml;
            }

            updateClockDisplay();
            setClockMode('hour');

            window.removeEventListener('mouseup', endClockDrag);
            window.removeEventListener('touchend', endClockDrag);
            window.removeEventListener('mousemove', moveClockDrag);
            window.removeEventListener('touchmove', moveClockDrag);

            window.addEventListener('mouseup', endClockDrag);
            window.addEventListener('touchend', endClockDrag);
            window.addEventListener('mousemove', moveClockDrag);
            window.addEventListener('touchmove', moveClockDrag, { passive: false });
        }

        function startClockDrag(event) {
            if (event.target && (event.target.tagName === 'BUTTON' || event.target.closest('button'))) return;
            _clockIsDragging = true;
            handleClockInput(event);
            if (event.preventDefault) event.preventDefault();
        }

        function moveClockDrag(event) {
            if (!_clockIsDragging) return;
            handleClockInput(event);
            if (event.preventDefault) event.preventDefault();
        }

        function endClockDrag() {
            _clockIsDragging = false;
        }

        function handleClockInput(event) {
            const face = document.getElementById('clock-face');
            if (!face) return;
            const rect = face.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let clientX = 0;
            let clientY = 0;
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else if (event.clientX !== undefined) {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            const dx = clientX - centerX;
            const dy = clientY - centerY;
            let deg = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
            if (deg < 0) deg += 360;

            if (_clockMode === 'hour') {
                let h = Math.round(deg / 30) % 12;
                if (h === 0) h = 12;
                _clockHours = h;
            } else {
                let m = Math.round(deg / 6) % 60;
                _clockMinutes = m;
            }
            updateClockDisplay();
        }

        function setClockMode(mode) {
            _clockMode = mode;
            document.querySelectorAll('.clock-mode-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-mode-${mode}`);
            if (activeBtn) activeBtn.classList.add('active');

            const hHand = document.getElementById('clock-hand-hour');
            const mHand = document.getElementById('clock-hand-minute');
            if (hHand) hHand.classList.toggle('active-hand', mode === 'hour');
            if (mHand) mHand.classList.toggle('active-hand', mode === 'minute');
        }

        function updateClockDisplay() {
            const hHand = document.getElementById('clock-hand-hour');
            const mHand = document.getElementById('clock-hand-minute');
            const readout = document.getElementById('clock-readout');

            if (hHand) {
                const hDeg = (_clockHours % 12) * 30 + (_clockMinutes * 0.5);
                hHand.style.transform = `rotate(${hDeg}deg)`;
            }
            if (mHand) {
                const mDeg = _clockMinutes * 6;
                mHand.style.transform = `rotate(${mDeg}deg)`;
            }

            const hStr = String(_clockHours).padStart(2, '0');
            const mStr = String(_clockMinutes).padStart(2, '0');

            if (readout) readout.textContent = `${hStr} h ${mStr} m`;
        }

        function validateClockAnswer() {
            const totalMinutes = _clockHours * 60 + _clockMinutes;

        }

        /* ────────────────────────── PIANO PUZZLE LOGIC ──────────────────────── */
        let pianoAudioCtx = null;
        let activeOscillators = {};
        let pressedNotes = new Set();
        let pianoSuccessTimer = null;
        let pianoSolved = false;

        function getPianoAudioContext() {
            if (!pianoAudioCtx) {
                pianoAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (pianoAudioCtx.state === 'suspended') {
                pianoAudioCtx.resume();
            }
            return pianoAudioCtx;
        }

        function playNote(freq, noteId) {
            try {
                const ctx = getPianoAudioContext();
                stopNote(noteId);

                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(parseFloat(freq), ctx.currentTime);

                osc.connect(gainNode);
                gainNode.connect(ctx.destination);

                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.02);

                osc.start();
                activeOscillators[noteId] = { osc, gainNode, freq };
            } catch (err) {
                console.error("Error playing note:", err);
            }
        }

        function stopNote(noteId) {
            const activeNode = activeOscillators[noteId];
            if (activeNode) {
                try {
                    const ctx = getPianoAudioContext();
                    const gainNode = activeNode.gainNode;
                    const osc = activeNode.osc;

                    gainNode.gain.setValueAtTime(gainNode.gain.value, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);

                    setTimeout(() => {
                        try {
                            osc.stop();
                            osc.disconnect();
                        } catch (e) { }
                    }, 100);
                } catch (err) {
                    console.error("Error stopping note:", err);
                }
                delete activeOscillators[noteId];
            }
        }

        function checkPianoValidation() {
            if (pianoSolved) return;

            const isAActive = pressedNotes.has("A");
            const isEActive = pressedNotes.has("E");

            if (isAActive && isEActive) {
                if (!pianoSuccessTimer) {
                    pianoSuccessTimer = setTimeout(() => {
                        triggerPianoSuccess();
                    }, 1000);
                }
            } else {
                if (pianoSuccessTimer) {
                    clearTimeout(pianoSuccessTimer);
                    pianoSuccessTimer = null;
                }
            }
        }

        function triggerPianoSuccess() {
            pianoSolved = true;
            if (pianoSuccessTimer) {
                clearTimeout(pianoSuccessTimer);
                pianoSuccessTimer = null;
            }

            // Stop all active notes
            Object.keys(activeOscillators).forEach(noteId => stopNote(noteId));
            pressedNotes.clear();

            // Block keyboard UI
            const kbd = document.getElementById('piano-keyboard');
            if (kbd) kbd.classList.add('disabled');

            // Remove active classes from keys
            const keys = document.querySelectorAll('.piano-key');
            keys.forEach(k => k.classList.remove('active'));

            // Illuminate A and E in bright gold
            const keyA = document.querySelector('.piano-key[data-note="A"]');
            const keyE = document.querySelector('.piano-key[data-note="E"]');
            if (keyA) keyA.classList.add('success-active');
            if (keyE) keyE.classList.add('success-active');

            // Display success feedback
            showFeedback('success', '✨ Magnifique ! L\'accord parfait A & E a retenti pendant 1 seconde. ✨');

            // Call handleSuccess after 4 seconds
            setTimeout(() => {
                handleSuccess();
            }, 4000);
        }

        function initHangmanPuzzle(enigme) {

        function initScannerPuzzle(enigme) {
            const canvas = document.getElementById('scanner-canvas');
            const bg = document.getElementById('scanner-bg');
            if (!canvas || !bg) return;

            const ctx = canvas.getContext('2d');
            const imgReveal = new Image();
            imgReveal.src = enigme.imageRevelee;

            let isInteracting = false;
            let spotlightOpacity = 0;
            let lastX = 0;
            let lastY = 0;
            let fadeReq = null;

            const resizeCanvas = () => {
                const rect = bg.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                if (!isInteracting && spotlightOpacity > 0) {
                    drawSpotlight(lastX, lastY, spotlightOpacity);
                }
            };

            bg.onload = resizeCanvas;
            if (bg.complete) {
                resizeCanvas();
            }

            const onResize = () => {
                resizeCanvas();
            };
            window.addEventListener('resize', onResize);
            if (window._cleanupScannerResize) {
                window.removeEventListener('resize', window._cleanupScannerResize);
            }
            window._cleanupScannerResize = onResize;

            const drawSpotlight = (x, y, opacity) => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (opacity <= 0) return;
                ctx.save();
                ctx.globalAlpha = opacity;
                ctx.beginPath();
                ctx.arc(x, y, 60, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(imgReveal, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            };

            const fadeOut = () => {
                if (isInteracting) return;
                spotlightOpacity -= 0.05; // Fade out over ~300ms (20 frames)
                if (spotlightOpacity <= 0) {
                    spotlightOpacity = 0;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                } else {
                    drawSpotlight(lastX, lastY, spotlightOpacity);
                    fadeReq = requestAnimationFrame(fadeOut);
                }
            };

            const startFadeOut = () => {
                isInteracting = false;
                if (fadeReq) cancelAnimationFrame(fadeReq);
                fadeReq = requestAnimationFrame(fadeOut);
            };

            const handleMove = (clientX, clientY) => {
                if (!imgReveal.complete) return;
                isInteracting = true;
                if (fadeReq) {
                    cancelAnimationFrame(fadeReq);
                    fadeReq = null;
                }
                spotlightOpacity = 1;

                const rect = canvas.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                lastX = x;
                lastY = y;

                drawSpotlight(x, y, 1);

                // Show input block immediately upon first scan interaction anywhere on page 2
                const inputBlock = document.getElementById('scanner-input-block');
                if (inputBlock && inputBlock.classList.contains('hidden')) {
                    inputBlock.classList.remove('hidden');
                    setTimeout(() => {
                        inputBlock.style.opacity = '1';
                        inputBlock.style.maxHeight = '150px';
                        inputBlock.style.margin = '10px 0 20px 0';
                        inputBlock.style.pointerEvents = 'auto';
                    }, 50);
                }
            };

            // Touch events
            canvas.addEventListener('touchstart', (ev) => {
                ev.preventDefault();
                if (ev.touches.length > 0) {
                    handleMove(ev.touches[0].clientX, ev.touches[0].clientY);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (ev) => {
                ev.preventDefault();
                if (ev.touches.length > 0) {
                    handleMove(ev.touches[0].clientX, ev.touches[0].clientY);
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (ev) => {
                ev.preventDefault();
                startFadeOut();
            }, { passive: false });

            // Mouse events
            let isDrawing = false;
            canvas.addEventListener('mousedown', (ev) => {
                isDrawing = true;
                handleMove(ev.clientX, ev.clientY);
            });

            canvas.addEventListener('mousemove', (ev) => {
                if (isDrawing) {
                    handleMove(ev.clientX, ev.clientY);
                }
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
                startFadeOut();
            });

            canvas.addEventListener('mouseleave', () => {
                if (isDrawing) {
                    isDrawing = false;
                }
                startFadeOut();
            });
        }

        function initPianoPuzzle() {
            // Reset state
            pianoSolved = false;
            pressedNotes.clear();
            if (pianoSuccessTimer) {
                clearTimeout(pianoSuccessTimer);
                pianoSuccessTimer = null;
            }
            // Stop any dangling oscillators
            Object.keys(activeOscillators).forEach(noteId => stopNote(noteId));
            activeOscillators = {};

            const keys = document.querySelectorAll('.piano-key');
            keys.forEach(key => {
                const freq = key.getAttribute('data-freq');
                const noteId = key.getAttribute('data-note');

                // Touch support
                key.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (pianoSolved) return;
                    playNote(freq, noteId);
                    pressedNotes.add(noteId);
                    key.classList.add('active');
                    checkPianoValidation();
                });

                key.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    if (pianoSolved) return;
                    stopNote(noteId);
                    pressedNotes.delete(noteId);
                    key.classList.remove('active');
                    checkPianoValidation();
                });

                key.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    if (pianoSolved) return;
                    stopNote(noteId);
                    pressedNotes.delete(noteId);
                    key.classList.remove('active');
                    checkPianoValidation();
                });

                // Mouse support
                key.addEventListener('mousedown', (e) => {
                    if (pianoSolved) return;
                    playNote(freq, noteId);
                    pressedNotes.add(noteId);
                    key.classList.add('active');
                    checkPianoValidation();
                });

                key.addEventListener('mouseup', (e) => {
                    if (pianoSolved) return;
                    stopNote(noteId);
                    pressedNotes.delete(noteId);
                    key.classList.remove('active');
                    checkPianoValidation();
                });

                key.addEventListener('mouseleave', (e) => {
                    if (pianoSolved) return;
                    stopNote(noteId);
                    pressedNotes.delete(noteId);
                    key.classList.remove('active');
                    checkPianoValidation();
                });
            });
        }

        // Global key event listeners for keyboard backup (and testing)
        document.addEventListener('keydown', (e) => {
            const kbd = document.getElementById('piano-keyboard');
            if (!kbd || pianoSolved) return;

            const keyName = e.key.toLowerCase();
            let targetNote = null;
            if (keyName === 'a') targetNote = 'A';
            else if (keyName === 'e') targetNote = 'E';

            if (targetNote) {

            if (keyName === 'a') targetNote = 'A';

            if (targetNote) {

        function selectGem(gemId) {
            if (window.event && window.event.stopPropagation) window.event.stopPropagation();
            if (!window._gemsSelected) window._gemsSelected = [];

            // Don't allow more than 2
            if (window._gemsSelected.length >= 2) return;

            // Don't allow same gem twice
            if (window._gemsSelected.includes(gemId)) return;

            // Add to selection
            window._gemsSelected.push(gemId);

            // Highlight the gem
            const hotspot = document.getElementById('gem-' + gemId);
            if (hotspot) hotspot.classList.add('selected');

            // Update selection display
            const enigme = enigmes[currentIndex];
            const gemData = enigme.gems.find(g => g.id === gemId);
            const slotIndex = window._gemsSelected.length - 1;
            const slot = document.getElementById('gem-slot-' + slotIndex);
            if (slot && gemData) {
                slot.textContent = gemData.emoji;
                slot.classList.add('filled');
            }

            // If 2 gems selected, validate after short delay
            if (window._gemsSelected.length === 2) {
                setTimeout(() => validateGems(), 500);
            }
        }

        function validateGems() {
            const enigme = enigmes[currentIndex];
            const expected = enigme.reponseAttendue; // ["rouge", "bleu"]
            const selected = window._gemsSelected;

            const isCorrect = selected.length === expected.length &&
                [...selected].sort().join(',') === [...expected].sort().join(',');

            if (isCorrect) {
                // Mark gems as correct
                selected.forEach(gemId => {
                    const el = document.getElementById('gem-' + gemId);
                    if (el) {
                        el.classList.remove('selected');
                        el.classList.add('correct');
                    }
                });
                showFeedback('success', '✅ Bonne combinaison ! Les pierres s\'illuminent.');
                // Disable all gems
                document.querySelectorAll('.gem-hotspot').forEach(el => {
                    el.style.pointerEvents = 'none';
                });
                setTimeout(() => handleSuccess(), 1200);
            } else {
                // Mark gems as wrong
                selected.forEach(gemId => {
                    const el = document.getElementById('gem-' + gemId);
                    if (el) {
                        el.classList.remove('selected');
                        el.classList.add('wrong');
                    }
                });
                showFeedback('error', '❌ Mauvaise combinaison ! Une erreur vient d\'être ajoutée.');

        /* ────────────────────────── GPS PROXIMITY LOGIC ───────────────────────── */
        function initProximity(enigme) {
            if (window._geoWatchId) { navigator.geolocation.clearWatch(window._geoWatchId); window._geoWatchId = null; }
            if (window._proximityTimer) { clearInterval(window._proximityTimer); window._proximityTimer = null; }

            let isFrozen = false;
            let inZoneSince = null;

            const $widget = document.getElementById('proximity-widget');
            const $status = document.getElementById('prox-status');
            const $dist = document.getElementById('prox-distance');
            const $coords = document.getElementById('prox-coords');
            const $acc = document.getElementById('prox-accuracy');
            const $radar = document.getElementById('prox-radar');

            if (DEBUG && $radar) {
                $radar.title = "DEBUG : Cliquez ici pour simuler que vous êtes sur place (distance = 0m)";
                $radar.style.cursor = "pointer";
                $radar.onclick = () => {
                    if (isFrozen) return;
                    processPosition(enigme.targetLat, enigme.targetLng, 2);
                };
            }

            if (!navigator.geolocation) {
                showProxError("La géolocalisation n'est pas supportée par votre navigateur.");
                return;
            }

            function processPosition(lat, lng, acc) {
                if (isFrozen) return;
                if ($coords) $coords.innerHTML = 'Lat: ' + lat.toFixed(6) + '°<br>Lng: ' + lng.toFixed(6) + '°';
                if ($acc) $acc.textContent = 'Précision GPS : ±' + Math.round(acc) + ' m';

                const dist = getDistanceFromLatLonInKm(lat, lng, enigme.targetLat, enigme.targetLng) * 1000;
                const distRound = Math.round(dist);
                if ($dist) $dist.textContent = distRound;

                if ($status) {
                    $status.classList.remove('searching');
                }

                // Color mapping: interpolate from blue (distance >= 500m) to red (distance <= 0m)
                const ratio = Math.max(0, Math.min(1, (500 - dist) / 500));
                const red = Math.round(37 + (239 - 37) * ratio);
                const green = Math.round(99 + (68 - 99) * ratio);
                const blue = Math.round(235 + (68 - 235) * ratio);
                const rgb = `${red}, ${green}, ${blue}`;

                if ($radar) {
                    $radar.style.background = `radial-gradient(circle, rgba(${rgb}, 0.3) 0%, rgba(5, 5, 15, 0.9) 70%)`;
                    $radar.style.borderColor = `rgba(${rgb}, 0.8)`;
                    $radar.style.boxShadow = `0 0 ${Math.round(20 + 40 * ratio)}px rgba(${rgb}, 0.5)`;
                }
                if ($dist) $dist.style.color = `rgb(${rgb})`;

                // Tolerance check (within GPS accuracy margin of the 0.5m/1m² target center)
                if (dist <= (enigme.toleranceMeters + acc)) {
                    if (!inZoneSince) {
                        inZoneSince = Date.now();
                        if ($status) $status.textContent = '📍 Zone atteinte ! Ne bougez plus (3s)…';
                        window._proximityTimer = setInterval(() => {
                            const elapsed = (Date.now() - inZoneSince) / 1000;
                            if (elapsed >= 3 && !isFrozen) {
                                isFrozen = true;
                                clearInterval(window._proximityTimer);
                                window._proximityTimer = null;
                                if (window._geoWatchId) { navigator.geolocation.clearWatch(window._geoWatchId); window._geoWatchId = null; }

                                if ($widget) $widget.classList.add('frozen');
                                if ($status) $status.textContent = '✅ Position validée !';

                                showFeedback('success', '📍 Cible atteinte avec succès ! Le souvenir se déverrouille…');
                                setTimeout(() => handleSuccess(), 1500);
                            } else if (!isFrozen && $status) {
                                $status.textContent = `📍 Zone atteinte ! Ne bougez plus (${Math.ceil(3 - elapsed)}s)…`;
                            }
                        }, 250);
                    }
                } else {
                    if (inZoneSince) {
                        inZoneSince = null;
                        if (window._proximityTimer) {
                            clearInterval(window._proximityTimer);
                            window._proximityTimer = null;
                        }
                        if ($status) $status.textContent = 'Signal GPS actif — Approchez-vous';
                    } else if ($status && !inZoneSince && $status.textContent === 'Recherche du signal GPS…') {
                        $status.textContent = 'Signal GPS actif — Approchez-vous';
                    }
                }
            }

            window._geoWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    processPosition(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy || 10);
                },
                (err) => {
                    let msg = "Erreur GPS : impossible d'obtenir votre position.";
                    if (err.code === 1) msg = "⚠️ Accès au GPS refusé. Veuillez toucher le bouton 'Autoriser le GPS' ci-dessous ou vérifier les réglages de votre navigateur.";
                    else if (err.code === 2) msg = "⚠️ Position indisponible. Vérifiez l'activation du GPS.";
                    else if (err.code === 3) msg = "⚠️ Délai d'attente dépassé pour le GPS.";
                    showProxError(msg);
                },
                { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
            );
        }

        function requestGpsPermission() {
            if (!navigator.geolocation) {
                showProxError("La géolocalisation n'est pas supportée par votre navigateur.");
                return;
            }
            const $status = document.getElementById('prox-status');
            const $err = document.getElementById('prox-error');
            if ($err) $err.classList.remove('visible');
            if ($status) {
                $status.textContent = 'Demande d\'autorisation GPS…';
                $status.classList.add('searching');
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    if ($err) $err.classList.remove('visible');
                    initProximity(enigmes[currentIndex]);
                    showFeedback('success', '📍 Autorisation GPS accordée avec succès !');
                },
                (err) => {
                    let msg = "Erreur GPS : impossible d'obtenir votre position.";
                    if (err.code === 1) {
                        msg = "⚠️ Autorisation refusée dans le navigateur ! Pour autoriser : sur iPhone (Safari), allez dans Réglages > Confidentialité et sécurité > Service de localisation > Safari > 'Lorsque l'app est active'. Sur Android (Chrome), touchez le cadenas 🔒 dans la barre d'adresse > Autorisations > Localisation > Autoriser. Ensuite, touchez à nouveau le bouton ci-dessous !";
                        showFeedback('error', '⚠️ Accès au GPS bloqué dans les réglages du navigateur.');
                    } else if (err.code === 2) {
                        msg = "⚠️ Position indisponible. Vérifiez que le GPS est activé sur votre téléphone.";
                    } else if (err.code === 3) {
                        msg = "⚠️ Délai d'attente dépassé pour le GPS. Réessayez à l'extérieur ou cliquez à nouveau.";
                        initProximity(enigmes[currentIndex]);
                    }
                    showProxError(msg);
                },

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radius of the earth in km
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

            document.querySelectorAll('.btn-mosaic-zoom').forEach(b => b.classList.remove('active'));

                grid.style.width = `${widthPct}%`;
                grid.style.minWidth = `${widthPct}%`;
                grid.style.gap = `${Math.round(6 * Math.sqrt(level))}px`;
            }

            if (wrapper && level > 1) {
                setTimeout(() => {
                    const scrollLeft = (grid.scrollWidth - wrapper.clientWidth) / 2;
                    if (scrollLeft > 0 && wrapper.scrollLeft === 0) {
                        wrapper.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                    }
                }, 50);

        function updateMosaicBackgroundAttenuation() {
            const grid = document.getElementById('mosaic-grid');
            if (!grid) return;
            const clickedValid = document.querySelectorAll('.mosaic-tile.valid-clicked').length;
            const step = Math.min(30, clickedValid);
            const t = step / 30; // varie de 0 (0 étape) à 1 (30 étapes)

            const opacity = (1 - 0.68 * t).toFixed(3);     // 1.000 -> 0.320
            const saturate = (1 - 0.85 * t).toFixed(3);    // 1.000 -> 0.150
            const brightness = (1 - 0.55 * t).toFixed(3);  // 1.000 -> 0.450

            grid.style.setProperty('--bg-opacity', opacity);
            grid.style.setProperty('--bg-saturate', saturate);
            grid.style.setProperty('--bg-brightness', brightness);
        }
